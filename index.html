<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAP UI5 — Gantt Tree Widget</title>
  <script id="sap-ui-bootstrap"
    src="https://sdk.openui5.org/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ui.table"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true">
  </script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }
  </style>
</head>
<body class="sapUiBody">
  <div id="content" style="height:100%"></div>

<script>
sap.ui.getCore().attachInit(function () {
  "use strict";

  // ── Timeline constants ────────────────────────────────────────────────────
  var TSTART = new Date(2024, 0, 1);
  var TEND   = new Date(2024, 11, 31);
  var TMS    = TEND - TSTART;
  var MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  function parseDate(d) {
    if (!d) return null;
    if (d instanceof Date) return d;
    var m = String(d).match(/\/Date\((\d+)\)\//);
    return m ? new Date(+m[1]) : new Date(d);
  }

  function fmtShort(d) {
    var dt = parseDate(d);
    return dt ? dt.toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "";
  }

  function ms(y, mo, day) {
    return "/Date(" + new Date(y, mo, day).getTime() + ")/";
  }

  // ── Custom GanttBar control ───────────────────────────────────────────────
  sap.ui.core.Control.extend("GanttBar", {
    metadata: {
      properties: {
        taskStart: { type: "string" },
        taskEnd:   { type: "string" },
        progress:  { type: "int", defaultValue: 0 },
        taskType:  { type: "string", defaultValue: "task" }
      }
    },
    renderer: function (oRm, oCtrl) {
      var s   = parseDate(oCtrl.getTaskStart());
      var e   = parseDate(oCtrl.getTaskEnd());
      var pct = oCtrl.getProgress() || 0;
      var tp  = oCtrl.getTaskType() || "task";

      oRm.write('<div');
      oRm.writeControlData(oCtrl);
      oRm.addStyle("position", "relative");
      oRm.addStyle("width",    "100%");
      oRm.addStyle("height",   "44px");
      oRm.writeStyles();
      oRm.write('>');

      // Month grid lines
      for (var i = 0; i <= 11; i++) {
        var lp = (i / 12 * 100).toFixed(3);
        oRm.write(
          '<div style="position:absolute;left:' + lp + '%;top:0;bottom:0;' +
          'border-left:1px solid rgba(0,0,0,0.07);pointer-events:none;"></div>'
        );
      }

      if (s && e) {
        var L = Math.max(0, (s - TSTART) / TMS * 100);
        var W = Math.max(0.3, (e - s) / TMS * 100);

        if (tp === "milestone") {
          oRm.write(
            '<div style="position:absolute;left:calc(' + L + '% - 9px);top:50%;' +
            'transform:translateY(-50%) rotate(45deg);width:16px;height:16px;' +
            'background:#e9730c;border-radius:3px;' +
            'box-shadow:0 1px 4px rgba(0,0,0,.3);" title="Milestone"></div>'
          );
        } else {
          var COLORS = { project: "#0a6ed1", phase: "#1a7fc4", task: "#5ab4d1" };
          var HEIGHTS = { project: "24px", phase: "20px", task: "16px" };
          var col = COLORS[tp]  || COLORS.task;
          var h   = HEIGHTS[tp] || HEIGHTS.task;

          oRm.write(
            '<div style="position:absolute;left:' + L + '%;width:' + W + '%;height:' + h + ';' +
            'top:50%;transform:translateY(-50%);background:' + col + ';' +
            'border-radius:4px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.2);">'
          );
          // Progress fill
          if (pct > 0) {
            oRm.write(
              '<div style="position:absolute;left:0;top:0;height:100%;width:' + pct + '%;' +
              'background:rgba(255,255,255,.25);"></div>'
            );
          }
          // Progress label (only when bar is wide enough)
          if (W > 4) {
            oRm.write(
              '<span style="position:absolute;left:4px;top:50%;transform:translateY(-50%);' +
              'font-size:10px;color:rgba(255,255,255,.9);font-family:72,Arial,sans-serif;' +
              'white-space:nowrap;pointer-events:none;">' + pct + '%</span>'
            );
          }
          oRm.write('</div>');
        }
      }

      oRm.write('</div>');
    }
  });

  // ── Sample data ───────────────────────────────────────────────────────────
  var oData = {
    tasks: [{
      id: "P1", name: "Product Launch 2024", taskType: "project",
      taskStart: ms(2024,0,1), taskEnd: ms(2024,11,31),
      progress: 42, owner: "Project Team", status: "In Progress",
      nodes: [
        {
          id: "P1.1", name: "Phase 1 — Research & Discovery", taskType: "phase",
          taskStart: ms(2024,0,1), taskEnd: ms(2024,2,31),
          progress: 100, owner: "Research Team", status: "Complete",
          nodes: [
            { id:"P1.1.1", name:"Market Analysis",     taskType:"task", taskStart:ms(2024,0,1),  taskEnd:ms(2024,1,15), progress:100, owner:"Alice", status:"Complete",   nodes:[] },
            { id:"P1.1.2", name:"Competitor Research", taskType:"task", taskStart:ms(2024,1,1),  taskEnd:ms(2024,2,15), progress:100, owner:"Bob",   status:"Complete",   nodes:[] },
            { id:"P1.1.3", name:"User Interviews",     taskType:"task", taskStart:ms(2024,1,15), taskEnd:ms(2024,2,31), progress:100, owner:"Alice", status:"Complete",   nodes:[] }
          ]
        },
        {
          id: "P1.2", name: "Phase 2 — Design", taskType: "phase",
          taskStart: ms(2024,3,1), taskEnd: ms(2024,5,30),
          progress: 75, owner: "Design Team", status: "In Progress",
          nodes: [
            { id:"P1.2.1", name:"UI/UX Wireframes", taskType:"task",      taskStart:ms(2024,3,1),  taskEnd:ms(2024,4,15), progress:100, owner:"Carol", status:"Complete",    nodes:[] },
            { id:"P1.2.2", name:"Visual Design",    taskType:"task",      taskStart:ms(2024,4,1),  taskEnd:ms(2024,5,28), progress:60,  owner:"Dave",  status:"In Progress", nodes:[] },
            { id:"P1.2.3", name:"Design Review",    taskType:"milestone", taskStart:ms(2024,5,30), taskEnd:ms(2024,5,30), progress:0,   owner:"All",   status:"Pending",     nodes:[] }
          ]
        },
        {
          id: "P1.3", name: "Phase 3 — Development", taskType: "phase",
          taskStart: ms(2024,6,1), taskEnd: ms(2024,9,31),
          progress: 20, owner: "Dev Team", status: "In Progress",
          nodes: [
            { id:"P1.3.1", name:"Backend APIs",         taskType:"task", taskStart:ms(2024,6,1), taskEnd:ms(2024,8,30), progress:35, owner:"Eve",   status:"In Progress", nodes:[] },
            { id:"P1.3.2", name:"Frontend Development", taskType:"task", taskStart:ms(2024,7,1), taskEnd:ms(2024,9,31), progress:10, owner:"Frank", status:"In Progress", nodes:[] },
            { id:"P1.3.3", name:"Integration Testing",  taskType:"task", taskStart:ms(2024,9,1), taskEnd:ms(2024,9,31), progress:0,  owner:"Team",  status:"Pending",     nodes:[] }
          ]
        },
        {
          id: "P1.4", name: "Phase 4 — Testing & Launch", taskType: "phase",
          taskStart: ms(2024,10,1), taskEnd: ms(2024,11,31),
          progress: 0, owner: "QA Team", status: "Pending",
          nodes: [
            { id:"P1.4.1", name:"QA Testing",     taskType:"task",      taskStart:ms(2024,10,1),  taskEnd:ms(2024,10,30), progress:0, owner:"Grace",     status:"Pending", nodes:[] },
            { id:"P1.4.2", name:"UAT",            taskType:"task",      taskStart:ms(2024,10,15), taskEnd:ms(2024,11,15), progress:0, owner:"Customers", status:"Pending", nodes:[] },
            { id:"P1.4.3", name:"Product Launch", taskType:"milestone", taskStart:ms(2024,11,31), taskEnd:ms(2024,11,31), progress:0, owner:"All",       status:"Pending", nodes:[] }
          ]
        }
      ]
    }]
  };

  var oModel = new sap.ui.model.json.JSONModel(oData);

  // Status → SAP state
  function fmtState(v) {
    return ({ "Complete": "Success", "In Progress": "Warning", "Pending": "None" })[v] || "None";
  }

  // ── Timeline column header ────────────────────────────────────────────────
  var sHdr = '<div style="display:flex;width:100%;height:100%;align-items:center;">';
  MONTHS.forEach(function (m) {
    sHdr += '<div style="flex:1;text-align:center;font-size:11px;font-family:72,Arial,sans-serif;' +
            'color:#32363a;border-right:1px solid #e5e5e5;white-space:nowrap;overflow:hidden;">' +
            m + '</div>';
  });
  sHdr += '</div>';

  // ── Column helper ─────────────────────────────────────────────────────────
  function col(label, tmpl, w, hAlign) {
    return new sap.ui.table.Column({
      label:     new sap.m.Label({ text: label }),
      template:  tmpl,
      width:     w,
      resizable: true,
      hAlign:    hAlign || "Begin"
    });
  }

  // ── Tree Table ────────────────────────────────────────────────────────────
  var oTable = new sap.ui.table.TreeTable({
    visibleRowCountMode: sap.ui.table.VisibleRowCountMode.Auto,
    minAutoRowCount:     10,
    selectionMode:       sap.ui.table.SelectionMode.Single,
    alternateRowColors:  true,
    columnHeaderHeight:  36,
    rowHeight:           44,
    fixedColumnCount:    5,
    columns: [
      col("Task / Milestone",
          new sap.m.Text({ text: "{name}", wrapping: false }),
          "230px"),
      col("Owner",
          new sap.m.Text({ text: "{owner}", wrapping: false }),
          "110px"),
      col("Start",
          new sap.m.Text({ text: { path: "taskStart", formatter: fmtShort }, wrapping: false }),
          "80px"),
      col("End",
          new sap.m.Text({ text: { path: "taskEnd", formatter: fmtShort }, wrapping: false }),
          "80px"),
      col("Done",
          new sap.m.Text({
            text: { path: "progress", formatter: function (v) { return v + "%"; } },
            wrapping: false
          }),
          "55px", "End"),
      // Gantt timeline column
      new sap.ui.table.Column({
        label:     new sap.ui.core.HTML({ content: sHdr }),
        template:  new GanttBar({
                     taskStart: "{taskStart}",
                     taskEnd:   "{taskEnd}",
                     progress:  "{progress}",
                     taskType:  "{taskType}"
                   }),
        width:     "960px",
        resizable: false
      })
    ]
  });

  oTable.bindRows({
    path:       "/tasks",
    parameters: { arrayNames: ["nodes"] }
  });
  oTable.setModel(oModel);

  // Expand top-level project on first load
  var bExpanded = false;
  oTable.attachRowsUpdated(function () {
    if (!bExpanded) {
      bExpanded = true;
      oTable.expandToLevel(1);
    }
  });

  // ── Legend ────────────────────────────────────────────────────────────────
  function legendDot(color, label, shape) {
    var box = shape === "diamond"
      ? '<span style="display:inline-block;width:12px;height:12px;background:' + color + ';border-radius:2px;transform:rotate(45deg);vertical-align:middle;margin-right:6px;"></span>'
      : '<span style="display:inline-block;width:20px;height:' + (shape === "sm" ? "10px" : "14px") + ';background:' + color + ';border-radius:3px;vertical-align:middle;margin-right:6px;"></span>';
    return new sap.ui.core.HTML({
      content: '<div style="display:inline-flex;align-items:center;margin-right:14px;font-size:12px;font-family:72,Arial,sans-serif;color:#32363a;">' +
               box + label + '</div>'
    });
  }

  var oLegend = new sap.m.Toolbar({
    style: "Clear",
    content: [
      new sap.m.ToolbarSpacer(),
      legendDot("#0a6ed1", "Project", "lg"),
      legendDot("#1a7fc4", "Phase",   "md"),
      legendDot("#5ab4d1", "Task",    "sm"),
      legendDot("#e9730c", "Milestone", "diamond"),
      new sap.m.ToolbarSpacer()
    ]
  });

  // ── Page ──────────────────────────────────────────────────────────────────
  var oPage = new sap.m.Page({
    title: "Project Gantt Chart — 2024",
    showNavButton: false,
    headerContent: [
      new sap.m.Button({
        icon:    "sap-icon://expand-all",
        type:    "Transparent",
        tooltip: "Expand All",
        press:   function () { oTable.expandToLevel(3); }
      }),
      new sap.m.Button({
        icon:    "sap-icon://collapse-all",
        type:    "Transparent",
        tooltip: "Collapse All",
        press:   function () { oTable.collapseAll(); }
      })
    ],
    content:  [oTable],
    footer:   oLegend
  });

  new sap.m.App({ pages: [oPage] }).placeAt("content");
});
</script>
</body>
</html>
