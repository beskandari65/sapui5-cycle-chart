  // ── Excel import (client-side via SheetJS) ───────────────────────────────────

  // Port of parse_excel_to_db_2: build station/process tree from raw rows.
  // ctIdx = first SEC column (cycle_time), ceIdx = second SEC column (cycle_end).
  function _vtBuildStations(rows, descIdx, ctIdx, ceIdx) {
    var stations  = [];
    var curSt     = null;
    var prevStId  = null;
    var prevProcId = null;
    var stStep    = 0, pStep = 1, pIdx = 0;
    var stRowIdx  = -1;

    function genId() { return crypto.randomUUID ? crypto.randomUUID() : 'xl_' + Math.random().toString(36).substr(2, 9); }
    function blank(v) { return v === null || v === undefined || v === '' || (typeof v === 'number' && isNaN(v)); }
    function r2(v)    { return Math.round(v * 100) / 100; }

    rows.forEach(function (row, rowIdx) {
      var title = row[descIdx];
      if (!title || typeof title !== 'string' || !title.trim()) return;
      title = title.trim();

      var ctVal = row[ctIdx];
      var ceVal = row[ceIdx];

      if (blank(ctVal) && blank(ceVal)) {
        // ── STATION ROW ──────────────────────────────────────────────────────
        stStep++;  pStep = 1;  pIdx = 0;  prevProcId = null;  stRowIdx = rowIdx;

        var stId = genId();
        var stRc = prevStId
          ? { Start: { 'After...': [prevStId], Offset: [0.0] } }
          : { Start: { 'First Station': [],     Offset: [0.0] } };

        curSt = {
          id:               '',
          item_id:          stId,
          parent_id:        '',
          title:            title,
          cycle_type:       'Station',
          step:             'S' + stStep,
          tree_index:       stations.length,
          cycle_start:      0,
          cycle_end:        0,
          cycle_time:       0,
          subprocess:       '',
          sub_process_items: [],
          highlight:        '',
          dependant_items:  '{}',
          run_cond_config:  JSON.stringify(stRc)
        };
        prevStId = stId;
        stations.push(curSt);

      } else {
        // ── PROCESS ROW ──────────────────────────────────────────────────────
        if (!curSt) return;

        var ct = typeof ctVal === 'number' ? r2(ctVal) : 0;
        var ce = typeof ceVal === 'number' ? r2(ceVal) : 0;
        var cs = r2(ce - ct);

        var pid = genId();
        var procRc;
        if (cs === 0 || rowIdx === stRowIdx + 1) {
          procRc = { Start: { 'From Zero': [''], Offset: [0.0] }, Cycle: { 'Custom value': [ct] } };
        } else {
          procRc = { Start: { 'After...': [prevProcId || ''], Offset: [0.0] }, Cycle: { 'Custom value': [ct] } };
        }

        curSt.sub_process_items.push({
          id:               '',
          item_id:          pid,
          parent_id:        curSt.item_id,
          title:            title,
          cycle_type:       'Undefined',
          step:             'P' + stStep + '_' + pStep,
          tree_index:       pIdx,
          cycle_start:      cs,
          cycle_end:        ce,
          cycle_time:       ct,
          subprocess:       '',
          sub_process_items: [],
          highlight:        '',
          dependant_items:  '{}',
          run_cond_config:  JSON.stringify(procRc)
        });
        curSt.subprocess += (curSt.subprocess ? ',' : '') + pid;

        prevProcId = pid;
        pStep++;
        pIdx++;
      }
    });
    return stations;
  }

  // Scan the first 25 rows for a cell whose trimmed text is "DESCRIPTION".
  function _vtFindHeader(rawRows) {
    for (var i = 0; i < Math.min(rawRows.length, 25); i++) {
      var row = rawRows[i] || [];
      for (var j = 0; j < row.length; j++) {
        if (String(row[j] || '').trim() === 'DESCRIPTION') return i;
      }
    }
    return -1;
  }

  // Create one new op per sheet entry.  Each sheet_name becomes the op_number
  // (mirrors Python handle_dropped_file / parse_excel_to_db_2).
  function _vtCreateOpsFromSheets(sheetDataList) {
    var existing = oOpSelect.getItems().map(function (i) { return i.getKey(); });
    var created  = [];
    var skipped  = [];

    _cacheCurrentOp();   // save whatever is currently visible before we switch

    sheetDataList.forEach(function (sheet) {
      var opName = sheet.name;

      // Skip duplicates (both from DB and within this batch)
      if (existing.indexOf(opName) >= 0) { skipped.push(opName); return; }
      existing.push(opName);   // guard against duplicate sheets in the same file

      var stations = sheet.stations;

      // Anchor first station at t = 0 and run the same recalc that recalcTree() does
      if (stations.length > 0) {
        var rc0     = parseRC(stations[0].run_cond_config);
        rc0.start   = { condition: RC_COND.FIRST_STATION, values: [], offset: 0.0 };
        stations[0].run_cond_config = serializeRC(rc0);
        stations[0].cycle_start = 0.0;
      }
      var tmpFlatMap = buildFlatMap(stations, {});
      stations.forEach(function (st) { handleProcessCalc(st, tmpFlatMap); });
      annotateSteps(stations, null);

      // Store in in-memory caches (no _ancestorEnds needed in cache)
      _opMetaMap[opName]   = {};
      _opTreeCache[opName] = JSON.parse(JSON.stringify(stations));

      // Add op to dropdown and keep _projectOpMap in sync
      oOpSelect.addItem(new sap.ui.core.Item({ key: opName, text: opName }));
      var _curJob = _jobState.job_number;
      if (_curJob && _projectOpMap[_curJob] && _projectOpMap[_curJob].indexOf(opName) < 0) {
        _projectOpMap[_curJob].push(opName);
      }

      // Persist to DB immediately
      fetch(API_BASE + '/updateDB', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          op_number:               opName,
          cycle_general_structure: stripClientFields(_tagOpNumber(stations, opName)),
          items_details:           _buildItemsDetailsPayload(opName, stations),
          job_metadata:            _buildJobMetadata(opName, stations),
          project_metadata:        _buildProjectMetadata(),
          ops_to_delete:           []
        })
      })
        .then(function (r) { console.log('[vtImport] saved op "' + opName + '":', r.status); })
        .catch(function (err) { console.warn('[vtImport] save error "' + opName + '":', err.message); });

      created.push(opName);
    });

    if (created.length > 0) {
      var lastOp = created[created.length - 1];
      oOpSelect.setSelectedKey(lastOp);
      _loadTreeFromCache(lastOp);
    }

    var msg = 'Created ' + created.length + ' op(s)';
    if (skipped.length) msg += '; skipped (already exist): ' + skipped.join(', ');
    sap.m.MessageToast.show(msg + '.');
  }

  function _vtParseExcel(file) {
    if (typeof XLSX === 'undefined') { sap.m.MessageToast.show('SheetJS library not loaded.'); return; }

    if (!_jobState.job_number) {
      var jobNum = window.prompt('No job number is set. Enter a job number to continue with the import:');
      if (!jobNum || !jobNum.trim()) { sap.m.MessageToast.show('Import cancelled: job number is required.'); return; }
      jobNum = jobNum.trim();
      _jobState.job_number = jobNum;
      if (!_projectOpMap.hasOwnProperty(jobNum)) {
        _projectOpMap[jobNum] = [];
        oJobSelect.addItem(new sap.ui.core.Item({ key: jobNum, text: jobNum }));
      }
      oJobSelect.setSelectedKey(jobNum);
    }

    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });

        // Scan every sheet; collect those that have DESCRIPTION + two SEC columns
        var validSheets = [];
        wb.SheetNames.forEach(function (name) {
          var rawRows = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: null });
          var hdrIdx  = _vtFindHeader(rawRows);
          if (hdrIdx < 0) return;
          var hdr = rawRows[hdrIdx] || [];
          var descIdx = -1, ctIdx = -1, ceIdx = -1;
          hdr.forEach(function (h, i) {
            var s = String(h || '').trim();
            if (s === 'DESCRIPTION') { descIdx = i; }
            else if (s === 'SEC') { if (ctIdx < 0) ctIdx = i; else if (ceIdx < 0) ceIdx = i; }
          });
          if (descIdx < 0 || ctIdx < 0 || ceIdx < 0) return;
          var stations = _vtBuildStations(rawRows.slice(hdrIdx + 1), descIdx, ctIdx, ceIdx);
          console.log('[vtImport] sheet "' + name + '": hdrIdx=' + hdrIdx +
            ' cols=' + descIdx + '/' + ctIdx + '/' + ceIdx +
            ' stations=' + stations.length);
          if (stations.length) validSheets.push({ name: name, stations: stations });
        });

        if (!validSheets.length) {
          sap.m.MessageToast.show('No cycle data found. Expected columns: DESCRIPTION + SEC (×2).');
          return;
        }

        // Single sheet → import directly with no dialog
        if (validSheets.length === 1) {
          _vtCreateOpsFromSheets(validSheets);
          return;
        }

        // Multiple sheets → let user pick one, a subset, or all
        var oList = new sap.m.List();
        validSheets.forEach(function (s) {
          (function (sheet) {
            oList.addItem(new sap.m.StandardListItem({
              title:       sheet.name,
              description: sheet.stations.length + ' station(s)',
              type:        'Active',
              press:       function () { oDialog.close(); _vtCreateOpsFromSheets([sheet]); }
            }));
          }(s));
        });

        var oDialog = new sap.m.Dialog({
          title:       'Import sheets as new ops  (' + validSheets.length + ' found)',
          content:     [oList],
          beginButton: new sap.m.Button({
            text:  'Import All',
            type:  'Emphasized',
            press: function () { oDialog.close(); _vtCreateOpsFromSheets(validSheets); }
          }),
          endButton: new sap.m.Button({ text: 'Cancel', press: function () { oDialog.close(); } }),
          afterClose: function () { oDialog.destroy(); }
        });
        oDialog.open();

      } catch (err) {
        sap.m.MessageToast.show('Parse error: ' + err.message);
        console.error('[vtImport] parse error', err);
      }
    };
    reader.onerror = function () { sap.m.MessageToast.show('Could not read file.'); };
    reader.readAsArrayBuffer(file);
  }

  function _msSave(itemId, op, fields) {
    // Only update in-memory cache; data is persisted to DB when the main Save button is clicked.
    var cache = _itemsDetailsCache[op] || (_itemsDetailsCache[op] = {});
    if (!cache[itemId]) cache[itemId] = {};
    Object.assign(cache[itemId], fields);
  }

  function _msDebounce(fn, ms) {
    var t;
    return function () { clearTimeout(t); t = setTimeout(fn, ms); };
  }

  function _msBuildPicSection(tabKey, itemId, op, initialPics) {
    // returns { html: sap.ui.core.HTML, refresh: fn(picsArray) }
    var pics = (initialPics || '').split(';').filter(Boolean);

    function render() {
      var thumbsHtml = pics.filter(Boolean).map(function (url, i) {
        var safe = String(url).replace(/'/g, '%27');
        return '<div class="vtPicThumb">'
          + '<img src="' + safe + '" onclick="window.open(\'' + safe + '\',\'_blank\')">'
          + '<button class="vtPicDel" onclick="vtMsDelPic(\'' + tabKey + '\',' + i + ')">&#x2715;</button>'
          + '</div>';
      }).join('');
      var el = document.getElementById('vtPicGrid_' + tabKey);
      if (el) el.innerHTML = thumbsHtml;
    }

    window['vtMsDelPic'] = function (key, idx) {
      if (key !== tabKey) return;
      pics.splice(idx, 1);
      render();
      _msSave(itemId, op, { [tabKey === 'mech' ? 'designer_picture_links' : 'control_picture_links']: pics.join(';') });
    };

    var dropHtml = new sap.ui.core.HTML({
      content: '<div class="vtPicZone" id="vtPicZone_' + tabKey + '">' +
               '↓ Drop images here or click to upload' +
               '<input type="file" id="vtPicInput_' + tabKey + '" accept="image/*" multiple style="display:none">' +
               '</div>' +
               '<div class="vtPicGrid" id="vtPicGrid_' + tabKey + '"></div>',
      afterRendering: function () {
        render();
        var zone  = document.getElementById('vtPicZone_' + tabKey);
        var input = document.getElementById('vtPicInput_' + tabKey);
        if (!zone || !input) return;

        zone.addEventListener('click', function () { input.click(); });
        zone.addEventListener('dragover', function (e) { e.preventDefault(); zone.classList.add('vtPicOver'); });
        zone.addEventListener('dragleave', function () { zone.classList.remove('vtPicOver'); });
        zone.addEventListener('drop', function (e) {
          e.preventDefault(); zone.classList.remove('vtPicOver');
          _msUploadFiles(Array.from(e.dataTransfer.files), tabKey, itemId, op, pics, render);
        });
        input.addEventListener('change', function () {
          _msUploadFiles(Array.from(input.files), tabKey, itemId, op, pics, render);
          input.value = '';
        });
      }
    });
    return dropHtml;
  }

  function _msUploadFiles(files, tabKey, itemId, op, picsArr, renderFn) {
    var picField = tabKey === 'mech' ? 'designer_picture_links' : 'control_picture_links';
    files.forEach(function (file) {
      if (!file.type.startsWith('image/')) return;
      var fd = new FormData();
      fd.append('file', file);
      fetch(API_BASE + '/api/upload_picture', { method: 'POST', body: fd })
        .then(function (r) { return r.json(); })
        .then(function (res) {
          if (res.url) {
            picsArr.push(res.url);
            renderFn();
            _msSave(itemId, op, { [picField]: picsArr.join(';') });
          }
        })
        .catch(function (err) { console.warn('[vtMoreSpec] upload error:', err.message); });
    });
  }

    document.querySelectorAll('#vtStatsContent [id^="vtStatChevron_"]').forEach(function (c) {

  // Default the Plots tab to the job review. Per-op sections remain available
  // on demand, but do not make the tab open as a long expanded list.
  function _setStatsTabDefaultExpansion() {
    var jobBody = document.getElementById('vtStatsSectionBody_job');
    var jobChevron = document.getElementById('vtStatChevron_job');
    if (jobBody) jobBody.classList.remove('vtCollapsed');
    if (jobChevron) jobChevron.textContent = '▼';
    document.querySelectorAll('#vtStatsOpSections .vtStatSectionBody').forEach(function (body) {
      body.classList.add('vtCollapsed');
    });
    document.querySelectorAll('#vtStatsOpSections [id^="vtStatChevron_"]').forEach(function (chevron) {
      chevron.textContent = '▶';
    });
  }

  window.vtScrollToOp = function (opSafe) {
    var el = document.getElementById('vtOpSection_' + opSafe);
    if (!el) return;
    var body    = document.getElementById('vtStatsSectionBody_' + opSafe);
    var chevron = document.getElementById('vtStatChevron_' + opSafe);
    if (body && body.classList.contains('vtCollapsed')) {
      body.classList.remove('vtCollapsed');
      if (chevron) { chevron.textContent = '▼'; }

    el.scrollIntoView({ behavior: 'smooth', block: 'start' });

  function _renderStatsTab() {
    _renderReportTable();
    var ops        = oOpSelect.getItems().map(function (it) { return it.getKey(); }).filter(Boolean);
    var target     = _jobState.target_cycle_time || 0;
    var opSections = document.getElementById('vtStatsOpSections');
    if (!opSections) return;

    // Inject job-level canvas elements dynamically so the browser lays them
    // out before Chart.js measures them (same pattern as per-op charts).
    var jobBody = document.getElementById('vtStatsSectionBody_job');
    if (jobBody) {
      ['vtJobCTSCanvas', 'vtJobCTCanvas', 'vtJobResCanvas'].forEach(_destroyChart);
      jobBody.innerHTML =
        '<div id="vtJobPlotsNote" style="font-size:0.78rem;color:#888;padding:0 2px 6px;font-family:72,Arial,sans-serif;"></div>' +
        '<div class="vtPlotsGrid">' +
          '<div class="vtPlotCard vtCardFull"><div class="vtPlotTitle">Cycle Time Per Op</div>' +
            '<div style="position:relative;height:200px;"><canvas id="vtJobCTSCanvas"></canvas></div></div>' +
          '<div class="vtPlotCard vtCardMd"><div class="vtPlotTitle">Job Cycle Type Summary</div>' +
            '<div style="position:relative;height:200px;"><canvas id="vtJobCTCanvas"></canvas></div></div>' +
          '<div class="vtPlotCard vtCardLg"><div class="vtPlotTitle">Job Resource Usage Summary</div>' +

        '</div>';
      setTimeout(_renderJobPlots, 0);

    // Destroy all op-specific charts before rebuilding
    Object.keys(_chartInstances).forEach(function (id) {
      if (id.indexOf('vtOpPieCanvas_') === 0 ||
          id.indexOf('vtOpCTCanvas_')  === 0 ||
          id.indexOf('vtOpResCanvas_') === 0) {
        _destroyChart(id);
      }
    });
    opSections.innerHTML = '';
    ops.forEach(function (op) {
      var opSafe     = op.replace(/[^a-zA-Z0-9]/g, '_');
      var m          = _opMetaMap[op] || {};
      var items      = _opTreeCache[op] || [];

      if (!loaded) {
        bodyHtml = '<div style="padding:12px;color:#aaa;font-family:72,Arial,sans-serif;font-size:0.82rem;">'
                 + 'Not loaded — open this op in the Design tab first.</div>';
      } else {
        bodyHtml =
          '<div class="vtPlotsGrid">' +
            '<div class="vtPlotCard vtCardSm"><div class="vtPlotTitle">Cycle Time</div>' +
              '<div style="position:relative;height:180px;"><canvas id="vtOpPieCanvas_' + opSafe + '"></canvas></div>' +
              '<div id="vtOpPieInfo_' + opSafe + '" class="vtPieInfo"></div></div>' +
            '<div class="vtPlotCard vtCardMd"><div class="vtPlotTitle">Cycle Type Summary</div>' +

            '<div class="vtPlotCard vtCardLg"><div class="vtPlotTitle">Resource Usage</div>' +

          '</div>' +

  // Silently cache every op for the current job, then render stats if that tab is active.
  function _prefetchJobOps() {
    var ops      = oOpSelect.getItems().map(function (i) { return i.getKey(); }).filter(Boolean);
    var uncached = ops.filter(function (op) { return !_opTreeCache[op]; });
    if (!uncached.length) {
      if (oIconTabBar && oIconTabBar.getSelectedKey() === 'stats') { _renderStatsTab(); }
      return;
    }
    var chain = Promise.resolve();
    uncached.forEach(function (op) {
      chain = chain.then(function () { return _fetchTreeToCache(op); });
    });
    chain
      .then(function () {
        if (oIconTabBar && oIconTabBar.getSelectedKey() === 'stats') { _renderStatsTab(); }
      })
      .catch(function (err) { console.warn('[_prefetchJobOps] error:', err); });
  }

  function syncStatsTab() {
    var content = document.getElementById('vtRptContent');
    if (!content) return;
    var st = document.getElementById('vtRptStatus');
    if (st) st.style.display = 'none';
    var ops      = oOpSelect.getItems().map(function (it) { return it.getKey(); }).filter(Boolean);
    var uncached = ops.filter(function (op) { return !_opTreeCache[op]; });
    // Prefetch already ran on job select — uncached list will usually be empty
    if (!uncached.length) {
      _renderStatsTab();
      _setStatsTabDefaultExpansion();
      return;
    }
    // Still loading (prefetch in progress or failed) — show progress and wait
    content.innerHTML = '<div style="font-family:72,Arial,sans-serif;font-size:0.82rem;color:#09528A;padding:4px 0;">'
                      + 'Loading data… <span id="vtRptLoadProgress">0 / ' + uncached.length + '</span></div>';
    var done  = 0;
    var chain = Promise.resolve();
    uncached.forEach(function (op) {
      chain = chain.then(function () {
        return _fetchTreeToCache(op).then(function () {
          done++;
          var prog = document.getElementById('vtRptLoadProgress');
          if (prog) prog.textContent = done + ' / ' + uncached.length;
        });
      });
    });
    chain
      .then(function () {
        _renderStatsTab();
        _setStatsTabDefaultExpansion();
      })
      .catch(function (err) {
        if (content) {
          content.innerHTML = '<em style="color:#cc0000;font-family:72,Arial,sans-serif;font-size:0.82rem;">'
                            + 'Error loading op data: ' + err.message + '</em>';
        }
      });
  }

  // Build a portable, offline report entirely in the browser.  Deliberately use
  // native SVG rather than Chart.js here: an exported report must not depend on
  // a CDN or on the application being available when it is opened.
  function _vtReportEscape(value) {
    return String(value == null ? '' : value).replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function _vtReportFlatten(items, output) {
    (items || []).forEach(function (item) {
      output.push(item);
      _vtReportFlatten(item.sub_process_items, output);
    });
    return output;
  }

  function _vtReportImageDataUrl(url) {
    if (!url || /^data:image\//i.test(url)) return Promise.resolve(url || '');
    // A failed conversion is intentionally omitted.  Keeping its URL would make
    // the downloaded document depend on the app server, defeating offline use.
    return fetch(url).then(function (response) {
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return response.blob();
    }).then(function (blob) {
      return new Promise(function (resolve) {
        var reader = new FileReader();
        reader.onload = function () { resolve(reader.result); };
        reader.onerror = function () { resolve(''); };
        reader.readAsDataURL(blob);
      });
    }).catch(function () { return ''; });
  }

  function _vtCreateHtmlReportPayload(ops) {
    var reportOps = ops.map(function (op) {
      var details = JSON.parse(JSON.stringify(_itemsDetailsCache[op] || {}));
      return {
        number: op,
        title: (_opMetaMap[op] || {}).op_title || '',
        numOfParts: (_opMetaMap[op] || {}).num_of_parts || 1,
        items: JSON.parse(JSON.stringify(_opTreeCache[op] || [])),
        details: details
      };
    });
    var imageJobs = [];
    reportOps.forEach(function (op) {
      Object.keys(op.details).forEach(function (itemId) {
        var detail = op.details[itemId] || {};
        var urls = String(detail.designer_picture_links || '').split(';').filter(Boolean);
        imageJobs.push(Promise.all(urls.map(_vtReportImageDataUrl)).then(function (images) {
          detail.embedded_images = images.filter(Boolean);
        }));
      });
    });
    return Promise.all(imageJobs).then(function () {
      return _vtReportImageDataUrl('https://www.valianttms.com/wp-content/uploads/2021/09/valianttms-logo-298x92-1.png');
    }).then(function (logo) {
      return {
        projectNumber: _jobState.job_number || '',
        projectTitle: _jobState.job_title || '',
        targetCycleTime: Number(_jobState.target_cycle_time) || 0,
        generatedAt: new Date().toLocaleString(),
        logo: logo,
        ops: reportOps
      };
    });
  }

  function _vtPdfCapture(element) {

    .then(function (res) {
      var msg = (res && res.message) ? res.message : 'Report generated and opened.';
      if (status) { status.style.background='#f0faf0'; status.style.color='#1a7a1a'; status.textContent=msg; }
    })
    .catch(function (err) {
      if (status) { status.style.background='#fff0f0'; status.style.color='#cc0000'; status.textContent='Error: ' + err.message; }
      sap.m.MessageToast.show('Export failed: ' + err.message);
    })
    .finally(function () { if (btn) { btn.disabled=false; btn.textContent='Export Excel'; } });
  };

  // ── Tab Bar ───────────────────────────────────────────────────────────────
  var oIconTabBar = new sap.m.IconTabBar({
    expandable:           false,
    stretchContentHeight: true,
    selectedKey:          "home",
    items: [
      new sap.m.IconTabFilter({
        key: "home", text: "Home",
        content: [oHomeLayout]
      }),
      new sap.m.IconTabFilter({
        key: "design", text: "Design",
        content: [oDesignLayout]
      }),
      new sap.m.IconTabFilter({
        key: "stats", text: "Statistics & Report",
        content: [new sap.ui.core.HTML({
          sanitizeContent: false,
          content: [
            '<div id="vtStatsRoot" style="height:calc(100vh - 110px);display:flex;flex-direction:column;background:#f5f5f5;">',

              // Action bar
              '<div style="padding:8px 16px;border-bottom:1px solid #e0e0e0;background:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">',
                '<span style="font-size:0.9rem;font-weight:600;font-family:72,Arial,sans-serif;color:#32363a;">Statistics &amp; Report</span>',
                '<div style="display:flex;gap:6px;align-items:center;">',
                  '<button onclick="vtExpandAll()" style="padding:4px 12px;background:#f5f7fa;color:#32363a;border:1px solid #d0d0d0;border-radius:4px;font-size:0.78rem;font-family:72,Arial,sans-serif;cursor:pointer;" title="Expand all sections">Expand All</button>',
                  '<button onclick="vtCollapseAll()" style="padding:4px 12px;background:#f5f7fa;color:#32363a;border:1px solid #d0d0d0;border-radius:4px;font-size:0.78rem;font-family:72,Arial,sans-serif;cursor:pointer;" title="Collapse all sections">Collapse All</button>',
                  '<button id="vtExportPdfBtn" onclick="vtExportPdf()" style="padding:5px 16px;background:#bb0000;color:#fff;border:none;border-radius:4px;font-size:0.82rem;font-family:72,Arial,sans-serif;cursor:pointer;font-weight:600;">Generate PDF</button>',
                  '<button id="vtExportExcelBtn" onclick="vtExportExcel()" style="padding:5px 16px;background:#09528A;color:#fff;border:none;border-radius:4px;font-size:0.82rem;font-family:72,Arial,sans-serif;cursor:pointer;font-weight:600;">Export Excel</button>',
                  '<button id="vtExportHtmlBtn" onclick="vtExportHtml()" style="padding:5px 16px;background:#107e3e;color:#fff;border:none;border-radius:4px;font-size:0.82rem;font-family:72,Arial,sans-serif;cursor:pointer;font-weight:600;">Export HTML</button>',
                '</div>',
              '</div>',

              // Scrollable content
              '<div id="vtStatsContent" style="flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;">',

                // Summary table
                '<div id="vtRptContent" style="font-family:72,Arial,sans-serif;font-size:0.82rem;color:#555;">',
                  '<em style="color:#aaa;">Open this tab after loading ops in the Design tab.</em>',
                '</div>',
                '<div id="vtRptStatus" style="padding:8px 14px;font-size:0.81rem;font-family:72,Arial,sans-serif;border-radius:6px;display:none;"></div>',

                // Job Overview section
                '<div class="vtStatSection">',
                  '<div class="vtStatSectionHeader" onclick="vtToggleSection(\'job\')">',
                    '<span id="vtStatChevron_job">&#9660;</span>&nbsp;Job Overview',
                  '</div>',
                  '<div id="vtStatsSectionBody_job" class="vtStatSectionBody"></div>',
                '</div>',

                // Per-op sections (dynamically generated)
                '<div id="vtStatsOpSections" style="display:flex;flex-direction:column;gap:12px;"></div>',

              '</div>',

            '</div>'
          ].join('')
        })]
      })
    ],
    select: function (oEvent) {
      var key = oEvent.getParameter("key");
      if (key === "design") {
        setTimeout(function () { oTable.invalidate(); }, 0);
      } else if (key === "home") {
        _refreshHomeHeader();
        setTimeout(function () { oHomeTable.invalidate(); }, 0);
      } else if (key === "stats") {
        setTimeout(syncStatsTab, 60);
      }
    }
  });


  // ── Page / App ────────────────────────────────────────────────────────────
  var oPage = new sap.m.Page({
    showNavButton: false,
    customHeader: new sap.m.Bar({
      contentLeft:  [oJobHBox, oOpHBox, oUndoBtn, oRedoBtn, oTabBarSaveBtn],
      contentRight: [
        new sap.m.Text({ text: "ValiantTMS — Cycle Chart Management", wrapping: false })
          .addStyleClass("vtPageTitle"),
        new sap.ui.core.HTML({
          content:         '<img src="https://www.valianttms.com/wp-content/uploads/2021/09/valianttms-logo-298x92-1.png" height="32" style="vertical-align:middle;display:block;margin-left:8px;" />',
          sanitizeContent: false
        })
      ]
    }).addStyleClass("sapUiSizeCompact vtPageHeaderBar"),
    content: [oIconTabBar]
  });

  new sap.m.App({ pages: [oPage] }).placeAt("content");

  // ── Mount toggle + Save buttons into the right side of the tab strip ────────
  // ── Global keyboard + background-click handlers ───────────────────────────
  // Capture phase fires before SAPUI5 processes the click, so __vtOnItemClick
  // can read _ctrlKeyHeld reliably.
  document.addEventListener('click', function (e) { _ctrlKeyHeld = e.ctrlKey; _shiftKeyHeld = e.shiftKey; }, true);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && oRcState.waitPhase) { e.preventDefault(); commitRcWait(); return; }
    if (e.key === 'Escape') {
      if (oRcState.waitPhase) { cancelRcWait(); }
      else { clearRowHighlight(); }
      return;
    }
    // Suppress all other shortcuts when focus is inside a text-entry element
    var t = e.target;
    var inInput = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' ||
                        t.isContentEditable || t.closest('[contenteditable="true"]'));
    if (inInput) return;
    // Disable all edit shortcuts on the Home tab (read-only view)
    if (oIconTabBar && oIconTabBar.getSelectedKey() === 'home') return;

    // ── Alt+S / Alt+E chord shortcuts for RC wait conditions ──────────────
    if (e.altKey && (e.key === 's' || e.key === 'S')) {
      e.preventDefault();
      _rcShortcutPrefix = 'S';
      clearTimeout(_rcShortcutTimer);
      _rcShortcutTimer = setTimeout(function () { _rcShortcutPrefix = null; }, 1500);
      return;
    }
    if (e.altKey && (e.key === 'e' || e.key === 'E')) {
      e.preventDefault();
      _rcShortcutPrefix = 'E';
      clearTimeout(_rcShortcutTimer);
      _rcShortcutTimer = setTimeout(function () { _rcShortcutPrefix = null; }, 1500);
      return;
    }
    if (_rcShortcutPrefix) {
      var _p = _rcShortcutPrefix;
      _rcShortcutPrefix = null;
      clearTimeout(_rcShortcutTimer);
      if (_p === 'S' && (e.key === 'a' || e.key === 'A')) {
        e.preventDefault();
        oRcStartCheck.setSelected(true);  onPhaseCheckChanged('start', true);
        oRcEndCheck.setSelected(false);   onPhaseCheckChanged('end',   false);
        oRcStartSelect.setSelectedKey(RC_COND.AFTER);
        onStartConditionChanged(RC_COND.AFTER);
        return;
      }
      if (_p === 'S' && (e.key === 'w' || e.key === 'W')) {
        e.preventDefault();
        oRcStartCheck.setSelected(true);  onPhaseCheckChanged('start', true);
        oRcEndCheck.setSelected(false);   onPhaseCheckChanged('end',   false);
        oRcStartSelect.setSelectedKey(RC_COND.WITH);
        onStartConditionChanged(RC_COND.WITH);
        return;
      }
      if (_p === 'E' && (e.key === 'w' || e.key === 'W')) {
        e.preventDefault();
        oRcEndCheck.setSelected(true);   onPhaseCheckChanged('end',   true);
        oRcStartCheck.setSelected(false); onPhaseCheckChanged('start', false);
        oRcEndSelect.setSelectedKey(RC_COND.WITH);
        onEndConditionChanged(RC_COND.WITH);
        return;
      }
      if (_p === 'E' && (e.key === 'b' || e.key === 'B')) {
        e.preventDefault();
        oRcEndCheck.setSelected(true);   onPhaseCheckChanged('end',   true);
        oRcStartCheck.setSelected(false); onPhaseCheckChanged('start', false);
        oRcEndSelect.setSelectedKey(RC_COND.BEFORE);
        onEndConditionChanged(RC_COND.BEFORE);
        return;
      }
    }

    if (e.key === 'Delete') { e.preventDefault(); removeProcess(); return; }
    if (e.shiftKey && e.key === 'P') { e.preventDefault(); addNewProcess(); return; }
    var mod = e.ctrlKey || e.metaKey;
    if (mod && (e.key === 'z' || e.key === 'Z')) {
      e.preventDefault();
      if (e.shiftKey) redoCurrentOp(); else undoCurrentOp();
      return;
    }
    if (mod && (e.key === 'y' || e.key === 'Y')) { e.preventDefault(); redoCurrentOp(); return; }
    if (mod && (e.key === 'a' || e.key === 'A') && oIconTabBar.getSelectedKey() === 'design') {
      e.preventDefault(); selectAllTreeItems(); return;
    }
    if (mod && e.key === 'c') { e.preventDefault(); copyToClipboard(); }
    if (mod && e.key === 'x') { e.preventDefault(); cutToClipboard(); }
    if (mod && e.key === 'v') { e.preventDefault(); pasteFromClipboard('subprocess'); }
  });

  document.addEventListener('click', function (e) {
    // Row click already handled by __vtOnItemClick — skip this tick
    if (_rowClickHandled) { _rowClickHandled = false; return; }
    if (!oRcState.activeItemIds.length && !oRcState.waitPhase) return;
    // Only clear when clicking INSIDE the table body (not toolbars, RC panels, or any overlay
    // popup — SAPUI5 Select/Popover overlays are appended to <body>, outside the table DOM)
    var tableDom = oTable.getDomRef ? oTable.getDomRef() : null;
    if (!tableDom || !tableDom.contains(e.target)) return;
    // Don't clear when clicking on an actual data row
    if (e.target.closest('tr.sapUiTableRow')) return;
    clearRowHighlight();
  });

  // ── Excel drag-drop: hidden file input + full-screen overlay ─────────────────
  (function () {
    // Hidden file input (browse button triggers this)
    var inp = document.createElement('input');
    inp.type = 'file'; inp.id = 'vtXlsxInput'; inp.accept = '.xlsx,.xls,.xlsm';
    inp.style.display = 'none';
    inp.addEventListener('change', function () {
      if (inp.files && inp.files[0]) { _vtParseExcel(inp.files[0]); inp.value = ''; }
    });
    document.body.appendChild(inp);

    // Full-screen translucent overlay shown while dragging an Excel file
    var ov = document.createElement('div');
    ov.id = 'vtXlsxOverlay';
    ov.style.cssText =
      'display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;' +
      'background:rgba(9,82,138,0.16);align-items:center;justify-content:center;pointer-events:none;';
    ov.innerHTML =
      '<div style="background:#fff;border:3px dashed #09528A;border-radius:14px;' +
      'padding:40px 64px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18);">' +
      '<div style="font-size:2.5rem;margin-bottom:10px;">&#128229;</div>' +
      '<div style="font-family:72,Arial,sans-serif;font-size:1rem;font-weight:600;color:#09528A;">' +
      'Drop to add stations to current Op</div></div>';
    document.body.appendChild(ov);

    // Hidden color input for item highlight picker
    var _hlInput = document.createElement('input');
    _hlInput.type = 'color';
    _hlInput.style.cssText = 'position:absolute;width:0;height:0;opacity:0;pointer-events:none;';
    document.body.appendChild(_hlInput);

    window.openHighlightColorPicker = function () {
      var ids = oRcState.activeItemIds.slice();
      if (!ids.length) { sap.m.MessageToast.show('Select an item first.'); return; }
      _hlInput.onchange = function () {
        var color = _hlInput.value; // e.g. "#ff0000"
        var items = oDataModel.getProperty('/items');
        var flatMap = buildFlatMap(items, {});
        ids.forEach(function (id) {
          var item = flatMap[id];
          if (item) { item.highlight = color; }
        });
        oDataModel.refresh(true);
        setTimeout(_applyItemHighlightColors, 0);
        _cacheCurrentOp();
      };
      _hlInput.click();
    };

    window.clearItemHighlight = function () {
      var ids = oRcState.activeItemIds.slice();
      if (!ids.length) { sap.m.MessageToast.show('Select an item first.'); return; }
      var items = oDataModel.getProperty('/items');
      var flatMap = buildFlatMap(items, {});
      ids.forEach(function (id) {
        var item = flatMap[id];
        if (item) { item.highlight = ''; }
      });
      oDataModel.refresh(true);
      setTimeout(_applyItemHighlightColors, 0);
      _cacheCurrentOp();
    };

    function isFileDrag(e) {
      return e.dataTransfer && e.dataTransfer.types &&
             Array.prototype.some.call(e.dataTransfer.types, function (t) { return t === 'Files'; });
    }

    document.addEventListener('dragover', function (e) {
      if (!isFileDrag(e)) return;
      e.preventDefault();
      ov.style.display = 'flex';
    });
    document.addEventListener('dragleave', function (e) {
      if (e.relatedTarget === null || e.relatedTarget === document.documentElement) {
        ov.style.display = 'none';
      }
    });
    document.addEventListener('drop', function (e) {
      ov.style.display = 'none';
      var file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (!file || !/\.xlsx?m?$/i.test(file.name)) return;
      e.preventDefault();
      if (oIconTabBar.getSelectedKey() !== 'design') {
        oIconTabBar.setSelectedKey('design');
        setTimeout(function () { _vtParseExcel(file); }, 100);
      } else {
        _vtParseExcel(file);
      }
    });
  }());

  // Initial ruler render, then fetch project list (which auto-loads the first project)
  updateRuler();
  loadProjectList();
});
</script>
</body>
</html>
