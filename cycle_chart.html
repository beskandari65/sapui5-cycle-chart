    organizeRcAfterChange(items, buildFlatMap(items, {}), newItem, false, false);
    recalcTree();
    oLastAddedItemId = newItem.item_id;
    focusAndEditNewItem(newItem.item_id);
  }

  // ── Auto-focus inline edit after add ────────────────────────────────────
  // After recalcTree() the TreeTable re-renders asynchronously.  We wait one
  // frame, scan rows for the target item_id, and fire the same dblclick logic.
  function focusAndEditNewItem(itemId) {
    // Sync selection state and RC panel to the new item so applyRcChange targets it.
    var items0 = oDataModel.getProperty("/items");
    var newItem0 = findItemById(items0, itemId);
    if (newItem0) {
      oSelectedItemId        = itemId;
      oRcState.activeItemIds = [itemId];
      var rc0 = parseRC(newItem0.run_cond_config);
      oActivePhases = [];
      if (rc0.start && rc0.start.condition) oActivePhases.push('start');
      if (rc0.cycle && rc0.cycle.condition) oActivePhases.push('cycle');
      if (rc0.end   && rc0.end.condition)   oActivePhases.push('end');
      if (!oActivePhases.length) oActivePhases = ['start', 'cycle'];
      refreshRcToolbar(newItem0);
    }

    setTimeout(function () {
      var rows = oTable.getRows();
      for (var i = 0; i < rows.length; i++) {
        var ctx = rows[i].getBindingContext();
        if (!ctx) continue;
        var obj = ctx.getObject();
        if (obj && obj.item_id === itemId) {
          var cell = rows[i].getCells()[0];
          if (cell) {
            window.__vtOnItemDblClick(cell.getId(), function () {
              oRcCycleValueInput.focus(); // focus handler clears error state, autocomplete, and selects all
            });
          }
          break;
        }
      }
    }, 150);
  }

  // ── Inline title rename helpers ──────────────────────────────────────────
  // Walk the nested model tree and update title by item_id.
  // Returns the updated item so we can confirm the change is in the payload.
  function findAndUpdateTitle(items, itemId, newTitle) {
    for (var i = 0; i < (items || []).length; i++) {
      if (items[i].item_id === itemId) {
        items[i].title = newTitle;
        return items[i];
      }
      var found = findAndUpdateTitle(items[i].sub_process_items, itemId, newTitle);
      if (found) return found;
    }
    return null;
  }

  // Blank out the DB primary key ("id") from raw general_structure_table rows so
  // its stale value never gets echoed back on save, while keeping the key present.
  function _stripDbId(items) {
    (items || []).forEach(function (item) {
      item.id = '';
      _stripDbId(item.sub_process_items);
    });
    return items;
  }

  // Strip client-side-only annotations before sending to the API.
  function stripClientFields(items) {
    return (items || []).map(function (item) {
      var clean = Object.assign({}, item);
      delete clean._ancestorEnds;
      clean.sub_process_items = stripClientFields(item.sub_process_items);
      return clean;
    });
  }

  function _tagOpNumber(items, op) {
    var projNo = _jobState.job_number || '';
    return (items || []).map(function (item) {
      item.op_number     = op;
      item.project_number = projNo;
      _tagOpNumber(item.sub_process_items, op);
      return item;
    });
  }

  function _buildJobMetadata(op, items) {
    var meta          = _opMetaMap[op] || {};
    var stationList   = (items || []).map(function (item) { return item.item_id; }).join(",");
    var usedCycleTime = getMaxCycleEnd(items);
    var sums          = _computeCycleTypeSums(items);
    return {
      project_number:             _jobState.job_number || '',
      op_number:                  op,
      op_title:                   meta.op_title       || null,
      job_description:            meta.op_description || null,
      job_pictures:               null,
      station_list:               stationList,
      machine_cycle_time_summary: JSON.stringify(sums),
      total_machine_cycle:        Math.round(sums['Machine cycle']  * 100) / 100,
      total_manual_cycle:         Math.round(sums['Manual cycle']   * 100) / 100,
      total_robot_cycle:          Math.round(sums['Robot cycle']    * 100) / 100,
      total_operator_cycle:       Math.round(sums['Operator wait']  * 100) / 100,
      used_cycle_time:            usedCycleTime,
      num_of_parts:               meta.num_of_parts   || 1
    };
  }

  function _buildProjectMetadata() {
    var predefDict = {};
    (_jobState.predefined_processes || []).forEach(function (p) {
      if ((p.name || '').trim()) {
        predefDict[p.name] = {
          'Cycle Time Type': p.type       || 'Custom',
          'Process Details': p.details    || '',
          'Cycle Time (s)':  p.cycle_time || ''
        };
      }
    });
    var joinList = function (a) { return Array.isArray(a) ? a.filter(Boolean).join(',') : (a || ''); };
    return {
      project_no:          _jobState.job_number        || '',
      project_title:       _jobState.job_title         || '',
      project_description: _jobState.job_description   || '',
      target_cycle_time:   _jobState.target_cycle_time || 0,
      machine_list:        joinList(_jobState.machine_list),
      robot_list:          joinList(_jobState.robot_list),
      operator_list:       joinList(_jobState.operator_list),
      predefined_processes: JSON.stringify(predefDict)
    };
  }

  function saveToDb() {
    var currentOp    = oOpSelect.getSelectedKey();
    var currentItems = oDataModel.getProperty("/items");
    var projectMeta  = _buildProjectMetadata();
    var opKeys       = Object.keys(_opTreeCache);
    if (currentOp && opKeys.indexOf(currentOp) === -1) opKeys.push(currentOp);
    // Always submit the save request.  FastAPI needs to receive project metadata,
    // deletions, and an intentionally empty tree just as it does a populated tree.
    if (!opKeys.length) opKeys.push(currentOp || "");

    var opsToDeleteSnap     = _opsToDelete.slice();
    var projectToDeleteSnap = _projectToDelete.slice();

    console.log("[ValiantTMS] _opTreeCache (full):", JSON.parse(JSON.stringify(_opTreeCache)));

    opKeys.forEach(function (op, idx) {
      var items   = (op === currentOp) ? currentItems : (_opTreeCache[op] || []);
      var payload = {
        op_number:               op,
        cycle_general_structure: stripClientFields(_tagOpNumber(items, op)),
        items_details:           _buildItemsDetailsPayload(op, items),
        item_ids_to_delete:      (_pendingItemDeletes[op] || []).slice(),
        job_metadata:            _buildJobMetadata(op, items),
        project_metadata:        projectMeta,
        ops_to_delete:           idx === 0 ? opsToDeleteSnap     : [],
        projects_to_delete:      idx === 0 ? projectToDeleteSnap : []
      };

      console.log("[ValiantTMS] POST /updateDB [" + op + "] payload:", JSON.parse(JSON.stringify(payload)));

      fetch(API_BASE + "/updateDB", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(payload)
      })
        .then(function (r) {
          if (!r.ok) return r.text().then(function (t) { console.error("[ValiantTMS] /updateDB [" + op + "] error " + r.status + ":", t); });
          console.log("[ValiantTMS] /updateDB [" + op + "]:", r.status);
        })
        .catch(function (err) { console.warn("[ValiantTMS] /updateDB [" + op + "] error:", err.message); });
    });

    _opsToDelete     = [];
    _projectToDelete = [];
    opKeys.forEach(function (op) {
      _pendingItemDeletes[op] = [];
      _resetOpHistory(op);
    });
    sap.m.MessageToast.show("Saved");
  }

  // ── Title autocomplete (mirrors PyQt6 SentenceCompletingLineEdit) ───────────
  function _getResourceSuggestions() {
    var all = [];
    (_jobState.machine_list  || []).forEach(function (r) { if (r) all.push(r); });
    (_jobState.robot_list    || []).forEach(function (r) { if (r) all.push(r); });
    (_jobState.operator_list || []).forEach(function (r) { if (r) all.push(r); });
    return all;
  }

  // ── Resource usage cache update (mirrors update_op_resource_usage_time_in_db) ─
  var _CYCLE_TYPE_COLORS = {
    'Machine cycle': '#05DF72',
    'Robot cycle':   '#EBDD6C',
    'Manual cycle':  '#EB1E29',
    'Operator wait': '#1EC2EB'
  };

  var oCycleTypeSelect;

  function _syncCycleTypeSelect() {
    if (!oCycleTypeSelect) return;
    var flatMap = buildFlatMap(oDataModel.getProperty('/items'), {});
    var selectedTypes = oRcState.activeItemIds.map(function (id) {
      var item = flatMap[id];
      return item && (!item.sub_process_items || !item.sub_process_items.length) ? item.cycle_type : null;
    }).filter(Boolean);
    var uniqueTypes = selectedTypes.filter(function (type, index, all) { return all.indexOf(type) === index; });
    oCycleTypeSelect.setSelectedKey(uniqueTypes.length === 1 ? uniqueTypes[0] : '');
  }

  function applyCycleTypeToSelected(cycleType) {
    if (!cycleType) return;
    if (!oRcState.activeItemIds.length) {
      sap.m.MessageToast.show('Select one or more leaf items first.');
      oCycleTypeSelect.setSelectedKey('');
      return;
    }

    beginHistoryAction();
    var flatMap = buildFlatMap(oDataModel.getProperty('/items'), {});
    var changed = 0;
    oRcState.activeItemIds.forEach(function (id) {
      var item = flatMap[id];
      if (!item || (item.sub_process_items && item.sub_process_items.length) || !item.cycle_time) return;
      item.cycle_type = cycleType;
      item.color = _CYCLE_TYPE_COLORS[cycleType] || item.color;
      changed++;
    });

    if (!changed) {
      sap.m.MessageToast.show('Cycle type can only be applied to leaf items with a cycle time.');
      _syncCycleTypeSelect();
      return;
    }

    // Cycle timing is unchanged, so refresh the model and cached payload without
    // running the structural recalculation that changes parent/child semantics.
    oDataModel.refresh(true);
    _cacheCurrentOp();
    _updateMiniPie();
    _tryRefreshReport();
    sap.m.MessageToast.show('Cycle type updated for ' + changed + ' item' + (changed === 1 ? '' : 's') + '. Click Save to persist.');
  }

  function _updateResourceUsageInCache(opNumber) {
    var items = oDataModel.getProperty('/items');
    if (!items || !items.length) return;

    var machineSet  = {};
    var robotSet    = {};
    var operatorSet = {};
    (_jobState.machine_list  || []).forEach(function (r) { if (r) machineSet[r]  = true; });
    (_jobState.robot_list    || []).forEach(function (r) { if (r) robotSet[r]    = true; });
    (_jobState.operator_list || []).forEach(function (r) { if (r) operatorSet[r] = true; });

    var resourceUsage = {};
    var quotedRe = /"([^"]+)"/g;

    function walkLeaves(list) {
      (list || []).forEach(function (item) {
        var children = item.sub_process_items;
        if (children && children.length) {
          walkLeaves(children);
        } else {
          // leaf node — scan title for quoted resource references
          var title = item.title || '';
          var match;
          quotedRe.lastIndex = 0;
          var found = false;
          while ((match = quotedRe.exec(title)) !== null) {
            var inner   = match[1];           // e.g. "Op100-Machine001"
            var resKey  = inner.split('-').pop();  // e.g. "Machine001"
            var cycleType = null;
            if (machineSet[resKey])   { cycleType = 'Machine cycle'; }
            else if (robotSet[resKey])    { cycleType = 'Robot cycle'; }
            else if (operatorSet[resKey]) { cycleType = 'Operator wait'; }
            if (cycleType) {
              var resolvedType = (cycleType === 'Operator wait') ? 'Manual cycle' : cycleType;
              // Explicit types selected in the Design tab take precedence over
              // resource-based inference. Unclassified leaves can still infer it.
              if (!item.cycle_type || item.cycle_type === 'Undefined') {
                item.color      = _CYCLE_TYPE_COLORS[resolvedType] || item.color;
                item.cycle_type = resolvedType;
              }
              var ct = item.cycle_time || 0;
              resourceUsage[inner] = (resourceUsage[inner] || 0) + ct;
              found = true;
            }
          }
          if (!found && (!item.cycle_type || item.cycle_type === 'Undefined')) {
            item.cycle_type = 'Undefined';
            item.color      = '#09528A';
          }
        }
      });
    }

    walkLeaves(items);

    // Build filtered summary: only machine/robot/operator entries
    var summary = {};
    Object.keys(resourceUsage).forEach(function (key) {
      summary[key] = Math.round(resourceUsage[key] * 100) / 100;
    });

    if (!_opMetaMap[opNumber]) { _opMetaMap[opNumber] = {}; }
    _opMetaMap[opNumber].machine_cycle_time_summary = JSON.stringify(summary);

    oDataModel.refresh(true);
    _opTreeCache[opNumber] = JSON.parse(JSON.stringify(items));
    _tryRefreshReport();
  }

  function _tryRefreshReport() {
    if (oIconTabBar && oIconTabBar.getSelectedKey() === 'reports') {
      _renderReportTable();
    }
  }

  function _insertTitleCompletion(inputEl, opNumber, word) {
    var text   = inputEl.value;
    var cursor = inputEl.selectionStart;
    var start  = cursor;
    while (start > 0 && /\w/.test(text[start - 1])) { start--; }
    var end = cursor;
    while (end < text.length && /\w/.test(text[end])) { end++; }
    var prefix   = text.slice(0, start).replace(/\s+$/, '');
    var suffix   = text.slice(end).replace(/^\s+/, '');
    var inserted = '"' + opNumber + '-' + word + '"';
    var newText  = (prefix ? prefix + ' ' : '') + inserted + (suffix ? ' ' + suffix : '');
    inputEl.value = newText;
    inputEl.setSelectionRange(newText.length, newText.length);
  }

  function _attachTitleAutocomplete(inputEl, opNumber) {
    var resources = _getResourceSuggestions();
    if (!resources.length) return;

    var activeIndex = -1;

    function _acDropdown() { return document.getElementById('vtAcDropdown'); }

    function _wordUnderCursor() {
      var text = inputEl.value, cursor = inputEl.selectionStart, start = cursor;
      while (start > 0 && /\w/.test(text[start - 1])) { start--; }
      return text.slice(start, cursor);
    }

    function hideDropdown() {
      var d = _acDropdown(); if (d) d.parentNode.removeChild(d);
      activeIndex = -1;
    }

    function setActive(idx) {
      var d = _acDropdown(); if (!d) return;
      var items = d.querySelectorAll('div[data-ac]');
      items.forEach(function (el, i) {
        el.style.background = i === idx ? '#e8f0f8' : '';
        el.style.color      = i === idx ? '#09528A' : '#32363a';
        el.style.fontWeight = i === idx ? '600' : '';
      });
      activeIndex = idx;
    }

    function showDropdown(matches) {
      hideDropdown();
      var d = document.createElement('div');
      d.id = 'vtAcDropdown';
      d.style.cssText =
        'position:fixed;z-index:99999;background:#fff;' +
        'border:1px solid #09528A;border-radius:4px;' +
        'box-shadow:0 4px 14px rgba(0,0,0,.18);' +
        'max-height:180px;overflow-y:auto;' +
        'font-family:72,Arial,sans-serif;font-size:13px;min-width:180px;';
      matches.forEach(function (word, i) {
        var item = document.createElement('div');
        item.setAttribute('data-ac', '1');
        item.textContent = word;
        item.style.cssText = 'padding:5px 12px;cursor:pointer;color:#32363a;white-space:nowrap;';
        item.addEventListener('mouseover', function () { setActive(i); });
        item.addEventListener('mousedown', function (e) {
          e.preventDefault();   // keep focus on input, avoid triggering blur→cancel
          _insertTitleCompletion(inputEl, opNumber, word);
          hideDropdown();
        });
        d.appendChild(item);
      });
      var rect = inputEl.getBoundingClientRect();
      d.style.left = rect.left + 'px';
      d.style.top  = (rect.bottom + 2) + 'px';
      document.body.appendChild(d);
      activeIndex = -1;
    }

    inputEl.addEventListener('input', function () {
      var prefix = _wordUnderCursor();
      if (!prefix) { hideDropdown(); return; }
      var matches = resources.filter(function (r) { return r.indexOf(prefix) !== -1; });
      if (matches.length) { showDropdown(matches); } else { hideDropdown(); }
    });

    // capture phase: intercept Enter/Escape/arrows before the existing commit listener
    inputEl.addEventListener('keydown', function (e) {
      var d = _acDropdown();
      if (!d) return;
      var items = d.querySelectorAll('div[data-ac]');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActive(Math.min(activeIndex + 1, items.length - 1));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive(Math.max(activeIndex - 1, 0));
      } else if (e.key === 'Enter') {
        if (activeIndex >= 0 && items[activeIndex]) {
          e.preventDefault(); e.stopPropagation();  // block the commit listener
          _insertTitleCompletion(inputEl, opNumber, items[activeIndex].textContent);
          hideDropdown();
        }
      } else if (e.key === 'Escape') {
        e.stopPropagation();  // block cancel() — just close the popup
        hideDropdown();
      }
    }, true);  // capture phase

    inputEl.addEventListener('blur', hideDropdown);
  }

  // ── RC signs (bar start/end indicators) ─────────────────────────────────────
  function _clearRcSigns() {
    document.querySelectorAll('.vtRcSign').forEach(function (el) {
      el.style.display = 'none';
      el.innerHTML = '';
    });
    document.querySelectorAll('.vtCycleBarRoot').forEach(function (el) {
      el.classList.remove('vtBarDim');
    });
  }

  function _rcSignSpan(symbol, color, title) {
    return '<span title="' + title + '" style="font-size:11px;font-weight:bold;color:' + color + ';line-height:1;">' + symbol + '</span>';
  }

  function _showRcSigns(item) {
    _clearRcSigns();
    if (!item || !item.item_id) return;
    if (oRcState.activeItemIds.length !== 1) return;

    var iid        = item.item_id;
    var rc         = parseRC(item.run_cond_config);
    var startCond  = rc.start ? rc.start.condition : '';
    var startVals  = rc.start ? (rc.start.values || []) : [];
    var cycleCond  = rc.cycle ? rc.cycle.condition : '';
    var endCond    = rc.end   ? rc.end.condition   : '';
    var endVals    = rc.end   ? (rc.end.values   || []) : [];
    var flatMap    = buildFlatMap(oDataModel.getProperty('/items'), {});

    // Dim all, then selectively un-dim relevant items
    document.querySelectorAll('.vtCycleBarRoot').forEach(function (el) { el.classList.add('vtBarDim'); });

    function _undim(id) {
      document.querySelectorAll('.vtCycleBarRoot[data-itemid="' + id + '"]').forEach(function (el) {
        el.classList.remove('vtBarDim');
      });
    }
    function _setSign(id, slot, html) {   // slot: 'B' = before, 'A' = after
      var el = document.getElementById('vtS' + slot + '_' + id);
      if (el && html) { el.innerHTML = html; el.style.display = 'inline-block'; }
    }

    // ── 1. Clicked item (green/red signs from run_cond_config + gray arrows from dependant_items)
    _undim(iid);

    var selfDep = {};
    try { selfDep = JSON.parse(item.dependant_items || '{}'); } catch (e) {}
    var selfDepStart = (selfDep.start || []).length > 0;
    var selfDepEnd   = (selfDep.end   || []).length > 0;

    var beforeHtml = '';
    if (startCond === RC_COND.FIRST_STATION) {
      beforeHtml = _rcSignSpan('⊙', '#09528A', 'First Station');
    } else if (startCond === RC_COND.FROM_ZERO) {
      beforeHtml = _rcSignSpan('⊙', '#09528A', 'From Zero (parent start)') +
                   _rcSignSpan('▶', '#05DF72', 'From Zero');
    } else if (startCond === RC_COND.CUSTOM_VALUE) {
      beforeHtml = _rcSignSpan('⧖', '#e07000', 'Fixed value start') +
                   _rcSignSpan('▶', '#EB1E29', 'Fixed value start');
    } else if (startCond) {
      beforeHtml = _rcSignSpan('▶', '#05DF72', 'RC start: ' + startCond);
    }
    // Items whose END depends on this item start here (e.g. "Before" condition) → arrow before bar
    if (selfDepEnd) beforeHtml += _rcSignSpan('⇒', '#888', 'A dependent item ends before this starts');
    _setSign(iid, 'B', beforeHtml);

    var afterHtml = '';
    if (cycleCond && cycleCond !== RC_COND.SUBPROCESS && cycleCond !== RC_COND.CUSTOM_VALUE) {
      afterHtml = _rcSignSpan('✕', '#EB1E29', 'RC end: ' + cycleCond);
      if (endCond === RC_COND.CUSTOM_VALUE) afterHtml += _rcSignSpan('⧖', '#e07000', 'Fixed value end');
    }
    // Items whose START depends on this item end here (e.g. "After" condition) → arrow after bar
    if (selfDepStart) afterHtml += _rcSignSpan('⇒', '#888', 'A dependent item starts after this ends');
    _setSign(iid, 'A', afterHtml);

    // ── 2. RC value items (referenced by run_cond_config, red signs) ─────────
    var noValueStart = (startCond === RC_COND.CUSTOM_VALUE || startCond === RC_COND.FROM_ZERO ||
                        startCond === RC_COND.FIRST_STATION || !startCond);
    if (!noValueStart) {
      startVals.forEach(function (valueId) {
        if (!flatMap[valueId]) return;
        _undim(valueId);
        if (startCond === RC_COND.AFTER || startCond === RC_COND.SEQUENTIAL) {
          _setSign(valueId, 'A', _rcSignSpan('✕', '#EB1E29', 'Clicked item starts after this'));
        } else if (startCond === RC_COND.WITH || startCond === RC_COND.WITH_OFFSET ||
                   startCond === RC_COND.SYNC_START) {
          _setSign(valueId, 'B', _rcSignSpan('▶', '#EB1E29', 'Clicked item starts with this'));
        }
      });
    }

    var noValueEnd = (endCond === RC_COND.CUSTOM_VALUE || !endCond);
    if (!noValueEnd) {
      endVals.forEach(function (valueId) {
        if (!flatMap[valueId]) return;
        _undim(valueId);
        if (endCond === RC_COND.WITH || endCond === RC_COND.SYNC_COMPLETION) {
          _setSign(valueId, 'A', _rcSignSpan('✕', '#EB1E29', 'Clicked item ends with this'));
        } else if (endCond === RC_COND.BEFORE) {
          _setSign(valueId, 'B', _rcSignSpan('▶', '#EB1E29', 'Clicked item ends before this'));
        }
      });
    }

    // ── 3. Dependent items (from dependant_items JSON, gray arrows) ──────────
    try {
      var depJson = JSON.parse(item.dependant_items || '{}');
      Object.keys(depJson).forEach(function (phase) {
        (depJson[phase] || []).forEach(function (depId) {
          if (!flatMap[depId]) return;
          _undim(depId);
          if (phase === 'start') {
            _setSign(depId, 'B', _rcSignSpan('⇒', '#888', 'Depends on clicked item to start'));
          } else if (phase === 'end') {
            _setSign(depId, 'A', _rcSignSpan('⇒', '#888', 'Depends on clicked item to end'));
          }
        });
      });
    } catch (e) {}
  }

      + '<tr><td><b>Start Time (s)</b></td><td><i>' + start + '</i></td></tr>'

      + '<tr><td><b>Cycle Time (s)</b></td><td><i>' + ct + '</i></td></tr>'

  window.__vtOnItemDblClick = function (sId, onAfterCommit) {
    if (oIconTabBar && oIconTabBar.getSelectedKey() === 'home') {
      var oCtrl = sap.ui.getCore().byId(sId);
      var oCtx  = oCtrl && oCtrl.getBindingContext();
      var itemId = oCtx && oCtx.getObject() && oCtx.getObject().item_id;
      if (itemId) _showItemDetails(itemId);
      return;
    }
    var oCtrl = sap.ui.getCore().byId(sId);
    if (!oCtrl) return;
    var oCtx = oCtrl.getBindingContext();
    if (!oCtx) return;

    var oSpan = document.getElementById(sId);
    if (!oSpan || oSpan.querySelector("input")) return;

    // Capture item_id and raw title at click time.
    // We do NOT rely on getObject() as a live ref — TreeTable's ClientTreeBindingAdapter
    // may return a node wrapper, not the actual model object.
    var oObj     = oCtx.getObject();
    var itemId   = oObj.item_id;
    var rawTitle = oObj.title || "";

    var oInput = document.createElement("input");
    oInput.type = "text";
    oInput.value = rawTitle;
    oInput.style.cssText =
      "width:90%;border:1px solid #09528A;border-radius:3px;" +
      "padding:2px 6px;font-size:13px;font-family:72,Arial,sans-serif;" +
      "outline:none;background:#fff;color:#32363a;";

    oSpan.textContent = "";
    oSpan.appendChild(oInput);
    oInput.focus();
    oInput.select();

    _attachTitleAutocomplete(oInput, oOpSelect.getSelectedKey());

    var committed = false;

    function commit() {
      if (committed) return;
      committed = true;
      var newTitle = oInput.value.trim();
      if (newTitle && newTitle !== rawTitle) {
        // Update the item inside the real model data by item_id
        var items   = oDataModel.getProperty("/items");
        beginHistoryAction();
        var updated = findAndUpdateTitle(items, itemId, newTitle);
        if (updated) {
          console.log("[ValiantTMS] Model updated:", itemId, "→", newTitle);
          oDataModel.refresh(true);  // push change to all bound controls (no DB save yet)
          _updateResourceUsageInCache(oOpSelect.getSelectedKey());
        } else {
          console.warn("[ValiantTMS] item_id not found in model:", itemId);
          oCtrl.invalidate();
        }
      } else {
        oCtrl.invalidate();
      }
      if (typeof onAfterCommit === "function") setTimeout(onAfterCommit, 80);
    }

    function cancel() {
      if (committed) return;
      committed = true;
      oCtrl.invalidate();
    }

    oInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter")  { e.preventDefault(); e.stopPropagation(); commit(); }
      if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); cancel(); }
    });
    oInput.addEventListener("blur", cancel);
  };

  // ── Gantt bar tooltip ────────────────────────────────────────────────────
  (function () {
    var el = document.createElement('div');
    el.id  = 'vtTooltip';
    document.body.appendChild(el);
  }());

  document.addEventListener('mousemove', function (e) {
    var tip = document.getElementById('vtTooltip');
    if (tip && tip.style.display !== 'none') _vtPositionTooltip(e);
  });

  function _vtPositionTooltip(e) {
    var tip = document.getElementById('vtTooltip'); if (!tip) return;
    var x = e.clientX + 16, y = e.clientY + 16;
    if (x + tip.offsetWidth  > window.innerWidth  - 10) x = e.clientX - tip.offsetWidth  - 16;
    if (y + tip.offsetHeight > window.innerHeight - 10) y = e.clientY - tip.offsetHeight - 16;
    tip.style.left = x + 'px'; tip.style.top = y + 'px';
  }

  function _buildRcTooltipHtml(rcStr, flatMap) {
    if (!rcStr || rcStr === '{}') return '';
    var json; try { json = JSON.parse(rcStr); } catch (e) { return ''; }
    var rows = [];
    ['Start', 'Cycle', 'End'].forEach(function (phase) {
      var pd = json[phase]; if (!pd) return;
      var condition = null, values = [], offset = null;
      Object.keys(pd).forEach(function (k) {
        if (k === 'Offset') { if (pd[k] && pd[k][0]) offset = pd[k][0]; }
        else                { condition = k; values = pd[k] || []; }
      });
      if (!condition) return;
      var extra = (offset && parseFloat(offset) !== 0) ? ' (' + offset + 's offset)' : '';
      var vParts = values.map(function (v) {
        var ref = flatMap && flatMap[v];
        return ref ? '&nbsp;&nbsp;&nbsp;' + (ref.step || '') + '&gt; ' + (ref.title || v)
                   : '&nbsp;&nbsp;&nbsp;' + v;
      });
      var htmlV = vParts.length ? '<br><em>' + vParts.join('<br>') + '</em>' : '';
      rows.push((phase === 'Start' || phase === 'End')
        ? '<strong>' + phase + 's ' + condition + extra + '</strong>' + htmlV + '<br><br>'
        : '<strong>Cycle time: (' + condition + extra + ')</strong>' + htmlV + '<br><br>');
    });
    return rows.join('');
  }

            '<strong>' + (item.step || '') + '&gt; ' + (item.title || '') + '</strong></div>';
    html += '<strong>Start:</strong> <em style="color:green">'      + s  + 's</em><br>';
    html += '<strong>End:</strong> <em style="color:green">'        + en + 's</em><br>';
    html += '<strong>Cycle Time:</strong> <em style="color:green">' + ct + 's</em><br>';
    html += '<strong>Cycle Type:</strong> <em style="color:green">' + (item.cycle_type || '—') + '</em><br><br>';
    html += _buildRcTooltipHtml(item.run_cond_config, flatMap);
    html += '</div>';
    var tip = document.getElementById('vtTooltip');
    tip.innerHTML = html; tip.style.display = 'block';
    _vtPositionTooltip(event);
  };

  // ── Custom CycleBar control ───────────────────────────────────────────────
  //   Mirrors the React ProgressBar rules:
  //     parent_item (Station / Process group) → transparent bg + dashed border
  //     leaf (Undefined)                      → solid fill with DB color
  //   Plus a vertical connector stub for all non-Station rows.
  sap.ui.core.Control.extend("CycleBar", {
    metadata: {
      properties: {
        cycleStart:      { type: "float",  defaultValue: 0 },
        cycleTime:       { type: "float",  defaultValue: 0 },
        color:           { type: "string", defaultValue: "#09528A" },
        scaleFactor:     { type: "float",  defaultValue: 2 },
        cycleType:       { type: "string", defaultValue: "Undefined" },
        ancestorEnds:    { type: "string", defaultValue: "" },
        itemId:          { type: "string", defaultValue: "" }
      }
    },
    renderer: function (oRm, oCtrl) {
      var sf      = oCtrl.getScaleFactor() || 2;
      var start   = oCtrl.getCycleStart()  || 0;
      var time    = oCtrl.getCycleTime()   || 0;
      var color   = oCtrl.getColor()       || "#09528A";
      var ct      = oCtrl.getCycleType()   || "Undefined";
      var iid     = oCtrl.getItemId()     || "";
      if (ct === "Station") { color = "brown"; }  // always brown, regardless of DB value
      var spacerW = Math.ceil(start * sf);
      var barW    = Math.max(2, Math.ceil(time * sf));

      // Bar visual rules (matches React ProgressBar parent_item logic)
      var barH, barBg, barBorder, barShadow;
      if (ct === "Station") {
        barH      = 16;
        barBg     = "transparent";
        barBorder = "3px dashed " + color;
        barShadow = "none";
      } else if (ct === "Process group") {
        barH      = 14;
        barBg     = "transparent";
        barBorder = "2px dashed " + color;
        barShadow = "none";
      } else {                          // "Undefined" → solid leaf bar
        barH      = 12;
        barBg     = color;
        barBorder = "none";
        barShadow = "0 1px 2px rgba(0,0,0,.25)";
      }

      // Root container — explicit px height required (% resolves to 0 in table cells)
      oRm.write('<div');
      oRm.writeControlData(oCtrl);
      oRm.writeAttribute("onclick", "window.__vtOnItemClick('" + oCtrl.getId() + "')");
      oRm.writeAttribute("class", "vtCycleBarRoot");
      oRm.writeAttribute("data-itemid", iid);
      oRm.addStyle("position",    "relative");
      oRm.addStyle("width",       "100%");
      oRm.addStyle("height",      "36px");
      oRm.addStyle("display",     "flex");
      oRm.addStyle("align-items", "center");
      oRm.addStyle("overflow",    "visible");
      oRm.addStyle("cursor",      "pointer");
      oRm.writeStyles();
      oRm.write('>');


      // Transparent offset (spacer)
      oRm.write('<div style="display:inline-block;flex-shrink:0;' +
                'width:' + spacerW + 'px;height:' + barH + 'px;' +
                'border-bottom:1px dashed lightgray;"></div>');

      // RC sign — before bar (positioned at left edge of bar, popping leftward)
      oRm.write('<span id="vtSB_' + iid + '" class="vtRcSign"' +
                ' style="position:absolute;display:none;left:' + (spacerW - 2) + 'px;top:50%;' +
                'transform:translate(-100%,-50%);z-index:5;line-height:1;pointer-events:none;white-space:nowrap;"></span>');

      // Bar — solid for leaves, dashed outline for parents
      oRm.write(
        '<div onmouseenter="window._vtShowTooltip(\'' + iid + '\',event)"' +
        ' onmouseleave="window._vtHideTooltip()"' +
        ' style="display:inline-block;flex-shrink:0;' +
        'width:' + barW + 'px;height:' + barH + 'px;' +
        'background:' + barBg + ';' +
        (barBorder !== "none" ? 'border:' + barBorder + ';border-bottom:none;' : '') +
        'border-radius:3px;box-sizing:border-box;' +
        (barShadow !== "none" ? 'box-shadow:' + barShadow + ';' : '') +
        '"></div>'
      );

      // RC sign — after bar
      oRm.write('<span id="vtSA_' + iid + '" class="vtRcSign"' +
                ' style="position:absolute;display:none;left:' + (spacerW + barW + 2) + 'px;top:50%;' +
                'transform:translateY(-50%);z-index:5;line-height:1;pointer-events:none;white-space:nowrap;"></span>');

      // One vertical line per ancestor, nearest first (parent, grandparent, great-grandparent …)
      var ancestorEnds = oCtrl.getAncestorEnds();
      if (ancestorEnds) {
        ancestorEnds.split(",").forEach(function (endStr) {
          var endVal = parseFloat(endStr);
          if (endVal > 0) {
            oRm.write('<div style="position:absolute;left:' + (Math.round(endVal * sf) + 3) + 'px;' +
                      'top:0;height:36px;border-left:0.5px dashed lightgray;"></div>');
          }
        });
      }

      oRm.write('</div>');
    }
  });

    renderer: function (oRm, oCtrl) {
      var title    = oCtrl.getTitle()    || "";
      var rawTitle = oCtrl.getRawTitle() || "";
      var step     = oCtrl.getStep()     || "";
      var isNew    = rawTitle.indexOf("New_Process") >= 0 || rawTitle.indexOf("New_Station") >= 0;
      var isCopy   = rawTitle.indexOf("(**copy)") >= 0;
      var level  = step ? step.split("_").length : 0;

      // ── Color ───────────────────────────────────────────────────────────
      var color;
      if (isCopy) {
        color = "red";
      } else if (isNew) {
        color = "#66bb6a";
      } else {
        switch (level) {
          case 1:  color = "brown";   break;  // Station
          case 2:  color = "#193CB8"; break;
          case 3:  color = "#1447E6"; break;
          case 4:  color = "#098A81"; break;
          case 5:  color = "#8A0912"; break;
          case 6:  color = "#8A8109"; break;
          case 7:  color = "#4A5565"; break;
          default: color = "#9F9FA9"; break;
        }
      }

      // ── Font ────────────────────────────────────────────────────────────
      var fw, fi, tt, pl;
      if (level <= 1) {
        fw = "700"; fi = "normal"; tt = "uppercase"; pl = "0";
      } else if (level === 2) {
        fw = "700"; fi = "normal"; tt = "none";      pl = "4px";
      } else {
        fw = "400"; fi = "italic"; tt = "none";      pl = "4px";
      }

      oRm.write('<span');
      oRm.writeControlData(oCtrl);
      oRm.writeAttribute("onclick", "window.__vtOnItemClick('" + oCtrl.getId() + "')");
      oRm.writeAttribute("ondblclick", "event.stopPropagation();window.__vtOnItemDblClick('" + oCtrl.getId() + "')");

  function buildRulerHtml(sf, maxEnd) {
    var totalW    = Math.ceil(sf * maxEnd) + 50;
    var showMinor = sf >= 3;
    var lastSec   = Math.ceil(maxEnd) + 1;
    var parts     = [
      '<div style="position:relative;width:' + totalW + 'px;height:100%;' +
      'background:#f0f0f0;border-bottom:2px solid #bbb;box-sizing:border-box;' +
      'overflow:hidden;">'
    ];

    for (var t = 0; t <= lastSec; t++) {
      var x = Math.round(t * sf);
      if (t % 10 === 0) {
        parts.push('<div style="position:absolute;left:' + x + 'px;top:0;bottom:0;' +
                   'width:1px;background:#888;"></div>');
        if (x < totalW - 2) {
          parts.push('<span style="position:absolute;left:' + (x + 2) + 'px;top:3px;' +
                     'font-size:9px;font-family:72,Arial,sans-serif;color:#444;' +
                     'white-space:nowrap;">' + t + '</span>');
        }
      } else if (showMinor) {
        parts.push('<div style="position:absolute;left:' + x + 'px;bottom:2px;' +
                   'width:1px;height:5px;background:#bbb;"></div>');
      }
    }
    parts.push('</div>');
    return parts.join("");
  }

  // ── Project metadata helpers ──────────────────────────────────────────────
  function _splitList(s) {
    if (!s) return [];
    try { var a = JSON.parse(s); if (Array.isArray(a)) return a; } catch (e) {}
    return s.split(',').map(function (x) { return x.trim(); }).filter(Boolean);
  }

  function _parsePredef(s) {
    try {
      var d = JSON.parse(s || '{}');
      return Object.keys(d).map(function (name) {
        var v = d[name] || {};
        return {
          name:       name,
          type:       (v['Cycle Time Type'] === 'Cycle Time Calculator' || v['Cycle Time Type'] === RC_COND.CYCLE_CALC) ? RC_COND.CYCLE_CALC : 'Custom',
          details:    v['Process Details'] || '',
          cycle_time: v['Cycle Time (s)']  || ''
        };
      });
    } catch (e) { return []; }
  }

  function _applyProjectMeta(projectMeta) {
    if (!projectMeta) return;
    // Only update job_number from DB if the dropdown hasn't already set it.
    // The job dropdown is the source of truth; don't let a stale LIMIT-1 row overwrite it.
    if (projectMeta.project_no && !_jobState.job_number) {
      _jobState.job_number = projectMeta.project_no;
      if (oJobNumLabel) oJobNumLabel.setText('#' + projectMeta.project_no);
    }
    _jobState.job_title         = projectMeta.project_title       || '';
    _jobState.job_description   = projectMeta.project_description  || '';
    _jobState.target_cycle_time = projectMeta.target_cycle_time != null ? projectMeta.target_cycle_time : '';
    _jobState.machine_list         = _splitList(projectMeta.machine_list);
    _jobState.robot_list           = _splitList(projectMeta.robot_list);
    _jobState.operator_list        = _splitList(projectMeta.operator_list);
    _jobState.predefined_processes = _parsePredef(projectMeta.predefined_processes);
  }

  // ── API calls ─────────────────────────────────────────────────────────────
  function loadTree(opNumber) {
    nAutoExpandLevel = 2; nHomeAutoExpandLevel = 2;
    fetch(API_BASE + "/updateTree", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ op_number: opNumber, project_number: _jobState.job_number })
    })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (response) {
        var responseData    = response.data || {};
        var items           = (responseData.cycle_general_structure) || responseData || [];
        _stripDbId(items);
        var opMetaRows      = responseData.job_metadata  || [];
        var itemsDetailRows = responseData.items_details || [];

        // Op-specific metadata only — job data stays as loaded from /updateProjectNumbers
        opMetaRows.forEach(function (row) {
          if (row.op_number) {
            _opMetaMap[row.op_number] = {
              op_title:       row.op_title        || '',
              op_description: row.job_description || '',
              num_of_parts:   row.num_of_parts     || 1
            };
          }
        });

        if (itemsDetailRows.length) {
          _itemsDetailsCache[opNumber] = {};
          itemsDetailRows.forEach(function (row) {
            if (row.item_id) { _itemsDetailsCache[opNumber][row.item_id] = row; }
          });
        }

        console.log('[loadTree] op:', opNumber, '— opMeta:', _opMetaMap[opNumber], '— _jobState.target_cycle_time:', _jobState.target_cycle_time);

        annotateSteps(items, null);
        annotateAncestors(items, []);
        maxCycleEnd = getMaxCycleEnd(items) || 500;
        _opTreeCache[opNumber] = JSON.parse(JSON.stringify(items));
        _pendingItemDeletes[opNumber] = [];
        _resetOpHistory(opNumber);
        oDataModel.setData({ items: items, maxCycleEnd: maxCycleEnd });
        _updateResourceUsageInCache(opNumber);
        updateGanttColumn();
        updateRuler();
        setTimeout(_updateMiniPie, 150);
        if (oIconTabBar && oIconTabBar.getSelectedKey() === 'stats') { _renderStatsTab(); }
      })
      .catch(function (err) {
        sap.m.MessageToast.show("Error loading op data: " + err.message);
      });
  }

  function _loadTreeFromCache(opNumber) {
    var items = JSON.parse(JSON.stringify(_opTreeCache[opNumber] || []));
    nAutoExpandLevel = 2; nHomeAutoExpandLevel = 2;
    annotateSteps(items, null);
    annotateAncestors(items, []);
    maxCycleEnd = getMaxCycleEnd(items) || 500;
    oDataModel.setData({ items: items, maxCycleEnd: maxCycleEnd });
    _updateHistoryButtons();
    _updateResourceUsageInCache(opNumber);
    updateGanttColumn();
    updateRuler();
    setTimeout(_updateMiniPie, 0);
    if (oIconTabBar && oIconTabBar.getSelectedKey() === 'stats') { _renderStatsTab(); }
  }

  function _cacheCurrentOp() {

  function _populateOpSelect(jobKey) {
    var ops = (_projectOpMap[jobKey] || []).filter(function (op) { return !!(op && String(op).trim()); });
    _suppressOpChange = true;
    oOpSelect.removeAllItems();
    oOpSelect.addItem(new sap.ui.core.Item({ key: "", text: "Select op…" }));
    ops.forEach(function (op) {
      oOpSelect.addItem(new sap.ui.core.Item({ key: op, text: op }));
    });
    oOpSelect.setSelectedKey("");
    oDataModel.setData({ items: [], maxCycleEnd: 500 });
    _refreshHomeHeader();
    // Release flag after current tick so any queued SAPUI5 change events
    // from removeAllItems/setSelectedKey are still suppressed
    setTimeout(function () { _suppressOpChange = false; }, 0);
    return ops;
  }

  function loadProjectList() {
    fetch(API_BASE + '/updateProjectNumbers', { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (response) {
        var d        = response.data || {};
        var projNums = Object.keys(d).filter(function (pn) { return !!(pn && pn.trim()); });

        _projectOpMap   = {};
        _projectMetaMap = {};
        projNums.forEach(function (pn) {
          _projectOpMap[pn]   = (d[pn] && d[pn].op_list)  || [];
          _projectMetaMap[pn] = (d[pn] && d[pn].proj_data) || null;
        });

        console.log('[loadProjectList] projects:', projNums);
        console.log('[loadProjectList] _projectMetaMap:', JSON.parse(JSON.stringify(_projectMetaMap)));

        oJobSelect.removeAllItems();
        oJobSelect.addItem(new sap.ui.core.Item({ key: "", text: "Select Job…" }));
        projNums.forEach(function (pn) {
          oJobSelect.addItem(new sap.ui.core.Item({ key: pn, text: pn }));
        });

        if (projNums.length > 0) {
          var firstJob = projNums[0];
          oJobSelect.setSelectedKey(firstJob);
          _jobState.job_number = firstJob;
          _applyProjectMeta(_projectMetaMap[firstJob] || null);
          _populateOpSelect(firstJob);
          setTimeout(_prefetchJobOps, 0);   // start loading all ops in background
        }
      })
      .catch(function (err) {
        sap.m.MessageToast.show('Cannot reach server. Make sure FastAPI is running.');
        console.warn('[loadProjectList] error:', err);
      });
  }

  // Helper: resource list panel (machine / robot / operator)
  function makeResourceListPanel(headerText) {
    var oList  = new sap.m.List({ mode: "SingleSelectMaster", showNoData: false });
    var oInput = new sap.m.Input({ placeholder: "Enter name…", width: "220px" });
    function _addItem() {
      var v = oInput.getValue().trim();
      if (!v) return;
      oList.addItem(new sap.m.StandardListItem({ title: v }));
      oInput.setValue(""); oInput.focus();
    }
    oInput.attachSubmit(_addItem);
    return {
      panel: new sap.m.Panel({
        headerText: headerText, expandable: false,
        content: [
          new sap.m.Toolbar({ style: "Clear", content: [
            oInput,
            new sap.m.Button({ icon: "sap-icon://add",     type: "Transparent", press: _addItem }),
            new sap.m.Button({ icon: "sap-icon://decline", type: "Transparent",
              press: function () { var s = oList.getSelectedItem(); if (s) oList.removeItem(s); }
            })
          ]}),
          oList
        ]
      }),
      getItems: function () { return oList.getItems().map(function (i) { return i.getTitle(); }); },
      setItems: function (arr) {
        oList.removeAllItems();
        (arr || []).forEach(function (v) { oList.addItem(new sap.m.StandardListItem({ title: String(v) })); });
      }
    };

  // ── Op Dialog ───────────────────────────────────────────────────────────────
  var oOpNumInput   = new sap.m.Input({ placeholder: "e.g. Op200", width: "180px" });
  var oOpTitleInput = new sap.m.Input({ placeholder: "Op title",   width: "100%" });
  var oOpDescInput  = new sap.m.TextArea({ placeholder: "Op description", width: "100%", rows: 3 });
  var oOpPartsInput = new sap.m.StepInput({ min: 1, max: 999, value: 1, width: "120px" });
  var _opDialogMode    = "add";
  var _opDialogOrigNum = null; // original op number when editing

  function openOpDialog(mode, opNumber) {
    _opDialogMode    = mode;
    _opDialogOrigNum = opNumber || null;
    oOpNumInput.setValueState("None");
    if (mode === "add") {
      oOpDialog.setTitle("New Operation");
      oOpNumInput.setValue("").setEditable(true);
      oOpTitleInput.setValue(""); oOpDescInput.setValue(""); oOpPartsInput.setValue(1);
    } else {
      var meta = _opMetaMap[opNumber] || {};
      oOpDialog.setTitle("Edit Op: " + opNumber);
      oOpNumInput.setValue(opNumber).setEditable(true);
      oOpTitleInput.setValue(meta.op_title || "");
      oOpDescInput.setValue(meta.op_description || "");
      oOpPartsInput.setValue(meta.num_of_parts || 1);
    }
    oOpDialog.open();
  }

  function _saveOpDialog() {
    var opNum = oOpNumInput.getValue().trim();
    if (!opNum) { oOpNumInput.setValueState("Error").setValueStateText("Op # is required"); return; }
    // Check for duplicate op # (always — both add and rename)
    var existing = oOpSelect.getItems().map(function (i) { return i.getKey(); });
    if (opNum !== _opDialogOrigNum && existing.indexOf(opNum) >= 0) {
      oOpNumInput.setValueState("Error").setValueStateText("Op '" + opNum + "' already exists");
      return;
    }
    oOpNumInput.setValueState("None");

    // Handle op number rename in edit mode
    if (_opDialogMode === "edit" && opNum !== _opDialogOrigNum) {
      var oldNum = _opDialogOrigNum;
      // Move cache entries to new key
      _opMetaMap[opNum]         = _opMetaMap[oldNum]         || {};
      _opTreeCache[opNum]       = _opTreeCache[oldNum]        || [];
      _itemsDetailsCache[opNum] = _itemsDetailsCache[oldNum]  || {};
      _opHistory[opNum]         = _opHistory[oldNum]          || { undo: [], redo: [] };
      _pendingItemDeletes[opNum] = _pendingItemDeletes[oldNum] || [];
      delete _opMetaMap[oldNum];
      delete _opTreeCache[oldNum];
      delete _itemsDetailsCache[oldNum];
      delete _opHistory[oldNum];
      delete _pendingItemDeletes[oldNum];
      // Rename oldNum → opNum in every item title BEFORE setSelectedKey triggers _loadTreeFromCache
      (function _renameTitles(items) {
        (items || []).forEach(function (item) {
          if (item.title && String(item.title).indexOf(oldNum) !== -1) {
            item.title = String(item.title).split(oldNum).join(opNum);
          }
          _renameTitles(item.sub_process_items);
        });
      }(_opTreeCache[opNum]));
      // Update dropdown item key + text

  // Deep-copy tree items with fresh item IDs so the duplicate is independent
  function _deepCopyItems(items) {
    var idMap = {};
    function collectIds(nodes) {
      (nodes || []).forEach(function (n) {
        var newId = "cp" + Math.random().toString(36).slice(2, 8);
        idMap[n.item_id] = newId;
        collectIds(n.sub_process_items);
      });
    }
    function remap(nodes) {
      return (nodes || []).map(function (n) {
        var copy = JSON.parse(JSON.stringify(n));
        copy.item_id  = idMap[n.item_id] || n.item_id;
        copy.parent_id = idMap[n.parent_id] || n.parent_id || "";
        if (copy.subprocess) {
          copy.subprocess = copy.subprocess.split(",").map(function (s) {
            return idMap[s.trim()] || s.trim();
          }).join(",");
        }
        copy.sub_process_items = remap(n.sub_process_items);
        return copy;
      });
    }
    collectIds(items);
    return remap(items);
  }

  var _planValInputs = [], _planPartsLbls = [], _planPphLbls = [], _planSppLbls = [];

  function _recalcPlan() {
    var days    = parseFloat(oTctDaysInput.getValue())  || 0;
    var hrs     = parseFloat(oTctHrsInput.getValue())   || 0;
    var dpw     = parseFloat(oTctDpwInput.getValue())   || 1;
    var jobs    = parseFloat(oTctJobsInput.getValue())  || 0;
    var prodHrs = days * hrs;
    var total   = jobs * days;
    oTctWeeksLbl.setText(String(dpw > 0 ? Math.round(days / dpw) : 0));
    oTctProdHrLbl.setText(String(prodHrs));
    oTctTotalLbl.setText(String(total));
    _planRows.forEach(function (row, i) {
      var pct  = parseFloat(_planValInputs[i].getValue()) || 0;
      var frac = pct / 100;
      var parts;
      if (i === 0)      parts = frac > 0 ? Math.round(total              / frac * 100) / 100 : 0;
      else if (i === 1) parts = Math.round(_planRows[0].parts * (1 + frac) * 100) / 100;
      else              parts = frac > 0 ? Math.round(_planRows[1].parts  / frac * 100) / 100 : 0;
      row.parts = parts;
      var pph = prodHrs > 0 ? Math.round(parts / prodHrs * 100) / 100 : 0;
      var spp = pph > 0 ? Math.round(3600 / pph * 100) / 100 : 0;
      row.pph = pph; row.spp = spp;
      _planPartsLbls[i].setText(String(parts));
      _planPphLbls[i].setText(String(pph));
      _planSppLbls[i].setText(String(spp));
    });
    if (!_tctDirectMode && _planRows[2].spp > 0) oTctDirectInput.setValue(_planRows[2].spp);
  }

  function _saveJobDialog() {

    var jobNum = oJobNumInput.getValue().trim();

      if (_projectOpMap.hasOwnProperty(jobNum)) {

        return;

      // Register new empty job first so any change event reads correct data
      _projectOpMap[jobNum] = [];
      _opTreeCache       = {};
      _opMetaMap         = {};
      _itemsDetailsCache = {};
      _opsToDelete       = [];
      oJobSelect.addItem(new sap.ui.core.Item({ key: jobNum, text: jobNum }));

      var prevJobNum = _jobState.job_number;
      if (prevJobNum && jobNum !== prevJobNum) {
        if (!window.confirm('Change job number from "' + prevJobNum + '" to "' + jobNum + '"?')) return;

        // Only queue the original old number — skip if a rename is already pending
        if (_projectToDelete.length === 0) {
          _projectToDelete.push(prevJobNum);

        // Update dropdown and project op map
        _projectOpMap[jobNum] = _projectOpMap[prevJobNum] || [];

        var dropItems = oJobSelect.getItems();
        for (var i = 0; i < dropItems.length; i++) {
          if (dropItems[i].getKey() === prevJobNum) { dropItems[i].setKey(jobNum); dropItems[i].setText(jobNum); break; }
        }
        oJobSelect.setSelectedKey(jobNum);

        // Update project_number in all caches
        Object.keys(_opMetaMap).forEach(function (op) {
          if ((_opMetaMap[op] || {}).project_number === prevJobNum) _opMetaMap[op].project_number = jobNum;
        });
        Object.keys(_itemsDetailsCache).forEach(function (op) {
          Object.keys(_itemsDetailsCache[op] || {}).forEach(function (id) {
            if ((_itemsDetailsCache[op][id] || {}).project_number === prevJobNum)
              _itemsDetailsCache[op][id].project_number = jobNum;
          });
        });
        (function _renameInTree(items) {
          (items || []).forEach(function (item) {
            if (item.project_number === prevJobNum) item.project_number = jobNum;
            _renameInTree(item.sub_process_items);
          });
        }(Object.keys(_opTreeCache).reduce(function (all, op) { return all.concat(_opTreeCache[op] || []); }, [])));

        // Also update live model items
        (function _renameInModel(items) {
          (items || []).forEach(function (item) {
            if (item.project_number === prevJobNum) item.project_number = jobNum;
            _renameInModel(item.sub_process_items);
          });
        }(oDataModel.getProperty('/items') || []));
      }
    }

    _jobState.job_number        = jobNum;
    _jobState.job_title         = oJobTitleInput.getValue().trim();
    _jobState.job_description   = oJobDescInput.getValue().trim();
    _jobState.target_cycle_time = tct;

  var _calcInsert = function (ch) {
    var v = oCalcDisplay.getValue();
    if (v === '0' || v === 'Error') v = '';
    oCalcDisplay.setValue(v + ch);
  };
  var _calcBack = function () {
    var v = oCalcDisplay.getValue();
    oCalcDisplay.setValue(v.length > 1 ? v.slice(0, -1) : '0');
  };
  var _calcCompute = function () {
    var expr = oCalcDisplay.getValue();
    try {
      var result = Math.round(eval(expr.replace(/×/g, '*').replace(/÷/g, '/')) * 100) / 100; // jshint ignore:line
      var pretty  = expr.replace(/\*/g, '×').replace(/\//g, '÷');
      var formula = pretty + ' = ' + result;
      oCalcOpLabel.setText(formula);
      oCalcDisplay.setValue(String(result));
      _calcResults.general = formula;
    } catch (e) { oCalcDisplay.setValue('Error'); }
  };
  var _calcOnBtn = function (t) {
    if (t === 'C')  { oCalcDisplay.setValue('0'); oCalcOpLabel.setText(''); _calcResults.general = ''; return; }
    if (t === '⌫') { _calcBack(); return; }
    if (t === '=')  { _calcCompute(); return; }
    _calcInsert(t);
  };
  var oCalcBtnBox = (function () {

  var _procTps = _mkPI(0.9); var _procTpe = _mkPI(0.9); var _procV    = _mkPI(10);

  var _procN = new sap.m.StepInput({ value: 1, min: 1, max: 50, step: 1, width: '115px',
    change: function () { _rebuildProcLengths(); _updateProcResult(); }

  var _rebuildProcLengths = function () {
    oCalcProcLengthsBox.removeAllItems();
    _procWeldLengthInputs = [];
    var n = parseInt(_procN.getValue(), 10) || 1;
    for (var i = 1; i <= n; i++) {
      var si = new sap.m.StepInput({ value: 10, min: 0, max: 1e6, step: 0.5, width: '115px', change: function () { _updateProcResult(); } });
      _procWeldLengthInputs.push(si);

  var _updateProcResult = function () {

    var tpre= +_procTpre.getValue()||0, tint= +_procTint.getValue()||0, tpost= +_procTpost.getValue()||0;
    var n   = parseInt(_procN.getValue(), 10)||1;
    var L   = Math.round(_procWeldLengthInputs.reduce(function (s, si) { return s + (+si.getValue()||0); }, 0)*100)/100;
    var total = Math.round((tpre + n*(tps+tpe) + L/v + (n-1)*tint + tpost)*100)/100;

        '(<em>N</em> − 1)<em>t</em><sub>inter</sub> + '+
        '<em>t</em><sub>post</sub>'+

  var _updateMatrixResult = function () {
    var colNums = { OPERATOR: +_opNumCtrl.getValue()||1, MACHINE: +_machNumCtrl.getValue()||1, ROBOT: +_robNumCtrl.getValue()||1 };
    var sum = 0, catGroups = [];
    _matrixCatControls.forEach(function (cat) {
      var num = colNums[cat.groupTitle] || 1;
      var activeItems = [];
      cat.items.forEach(function (it) {
        var qty = +it.qtyCtrl.getValue() || 0;
        if (qty > 0) {
          sum += num * qty * it.time;
          activeItems.push('<em>' + qty + ' × ' + it.text + ' (' + it.time + 's)</em>');
        }
      });
      if (activeItems.length) {
        catGroups.push('<strong>' + cat.catName + '</strong>: ' + num + ' × [' + activeItems.join(' + ') + ']');
      }
    });

      oMatrixDisplay.setHtmlText('<p style="color:#aaa;text-align:center;padding:8px">Select quantities above to calculate</p>');

  function _saveCycleCalc() {
    var formula = _calcResults[oCalcTabBar.getSelectedKey()] || '';
    if (!formula) { sap.m.MessageToast.show('Perform a calculation first'); return; }

    if (_predefCalcTargetRow !== null) {
      var items = oPredefModel.getProperty('/items').slice();
      if (items[_predefCalcTargetRow]) {
        var numVal2 = parseFloat(formula.split('=').pop().trim());
        items[_predefCalcTargetRow].details    = formula;
        items[_predefCalcTargetRow].cycle_time = isNaN(numVal2) ? '' : String(numVal2);
      }
      oPredefModel.setProperty('/items', items);
      _predefCalcTargetRow = null;
      oCycleCalcDialog.close();
      return;
    }

    oCycleCalcDialog.close();
    applyRcChange('cycle', RC_COND.CYCLE_CALC, [formula], 0);
    var num = parseFloat(formula.split('=').pop().trim());
    if (!isNaN(num)) oRcCycleValueInput.setValue(num).setEnabled(false);
  }

  var _chartInstances = {};

  Chart.register({
    id: 'vtBarLabels',
    afterDatasetsDraw: function (chart) {
      var ctx = chart.ctx;
      chart.data.datasets.forEach(function (dataset, i) {
        if (dataset.type === 'line') return;
        var meta = chart.getDatasetMeta(i);
        if (meta.hidden) return;
        meta.data.forEach(function (bar, idx) {
          var value = dataset.data[idx];
          if (!value) return;
          ctx.save();
          ctx.font = 'bold 9px Arial';
          ctx.fillStyle = '#32363a';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(value + 's', bar.x, bar.y - 3);
          ctx.restore();
        });
      });
    }
  });

  // Draws the "Target" reference line across the full chart width (edge to
  // edge), instead of only between the first/last category tick centers —
  // a category-bound line dataset stops short of the chart's right edge.
  Chart.register({
    id: 'vtTargetLine',
    afterDatasetsDraw: function (chart) {
      var opt = chart.options.plugins && chart.options.plugins.vtTargetLine;
      if (!opt || !opt.value) return;
      var yScale = chart.scales.y;
      var area   = chart.chartArea;
      var yPix   = yScale.getPixelForValue(opt.value);
      var ctx    = chart.ctx;
      ctx.save();
      ctx.setLineDash([5, 4]);
      ctx.strokeStyle = opt.color || '#cc0000';
      ctx.lineWidth   = 1.5;
      ctx.beginPath();
      ctx.moveTo(area.left, yPix);
      ctx.lineTo(area.right, yPix);
      ctx.stroke();
      ctx.restore();
    }
  });

  function _destroyChart(id) {
    if (_chartInstances[id]) { _chartInstances[id].destroy(); delete _chartInstances[id]; }
  }

  function _computeCycleTypeSums(items) {
    var sums = { 'Machine cycle': 0.0, 'Manual cycle': 0.0, 'Robot cycle': 0.0, 'Operator wait': 0.0 };
    function walk(list) {
      (list || []).forEach(function (item) {
        if (Object.prototype.hasOwnProperty.call(sums, item.cycle_type)) {
          sums[item.cycle_type] += (item.cycle_time || 0);
        }
        walk(item.sub_process_items);
      });
    }
    walk(items);
    return sums;
  }

  function _extractLeafResourceUsage(items) {
    var usage    = {};
    var quotedRe = /"([^"]+)"/g;
    var machineSet = {}, robotSet = {}, operatorSet = {};
    (_jobState.machine_list  || []).forEach(function (r) { if (r) machineSet[r]  = true; });
    (_jobState.robot_list    || []).forEach(function (r) { if (r) robotSet[r]    = true; });
    (_jobState.operator_list || []).forEach(function (r) { if (r) operatorSet[r] = true; });
    function walkLeaves(list) {
      (list || []).forEach(function (item) {
        if (item.sub_process_items && item.sub_process_items.length) {
          walkLeaves(item.sub_process_items);
        } else {
          var title = item.title || '';
          quotedRe.lastIndex = 0;
          var match;
          while ((match = quotedRe.exec(title)) !== null) {
            var inner  = match[1];
            var resKey = inner.split('-').pop();
            if (machineSet[resKey] || robotSet[resKey] || operatorSet[resKey]) {
              usage[inner] = (usage[inner] || 0) + (item.cycle_time || 0);
            }
          }
        }
      });
    }
    walkLeaves(items);
    return usage;
  }

  function _sortedResourceChart(usageObj) {
    var pairs = Object.keys(usageObj).map(function (k) {
      return [k, Math.round(usageObj[k] * 100) / 100];
    });
    pairs.sort(function (a, b) { return a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0; });
    return {
      cats: pairs.map(function (p) { return p[0]; }),
      vals: pairs.map(function (p) { return p[1]; })
    };
  }

  function _renderPieChart(canvasId, usedTime, totalTarget, numOfParts, infoId) {
    _destroyChart(canvasId);
    var ctx = document.getElementById(canvasId);
    if (!ctx) return;
    var remaining = totalTarget - usedTime;
    var labels, data, colors;
    if (remaining < 0) {
      labels = ['Excess', 'Target Cycle Time'];
      data   = [Math.round(Math.abs(remaining) * 100) / 100, Math.round(totalTarget * 100) / 100];
      colors = ['#cc0000', '#dddddd'];
    } else {
      labels = ['Used [' + numOfParts + ']', 'Remaining'];
      data   = [Math.round(usedTime * 100) / 100, Math.round(remaining * 100) / 100];
      colors = ['#09528A', '#dddddd'];
    }
    _chartInstances[canvasId] = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{ data: data, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          vtBarLabels: false,
          legend: { position: 'bottom', labels: { font: { family: '72,Arial,sans-serif', size: 11 }, padding: 10 } },
          tooltip: { callbacks: { label: function (c) { return c.label + ': ' + c.parsed + 's'; } } }
        }
      }
    });
    if (infoId) {
      var infoEl = document.getElementById(infoId);
      if (infoEl) {
        var pct = totalTarget > 0 ? Math.round(usedTime / totalTarget * 100) : 0;
        infoEl.textContent = (Math.round(usedTime * 100) / 100) + 's / ' + (Math.round(totalTarget * 100) / 100) + 's (' + pct + '%)';
      }
    }
  }

  // Draw one used/target donut into canvasId, keyed under chartKey in
  // _chartInstances, with the "X% / usedS / targetS" text into infoId.
  function _renderMiniPieInto(chartKey, canvasId, infoId, target, used) {
    var canvas = document.getElementById(canvasId);
    if (!canvas) return;
    var remaining = Math.round((target - used) * 100) / 100;
    var labels, data, colors;
    if (remaining < 0) {
      labels = ['Excess', 'Target']; data = [Math.abs(remaining), target]; colors = ['#cc0000', '#dddddd'];
    } else {
      labels = ['Used', 'Remaining']; data = [used, remaining || 0.01]; colors = ['#09528A', '#e8e8e8'];
    }
    _destroyChart(chartKey);
    _chartInstances[chartKey] = new Chart(canvas, {
      type: 'pie',
      data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 300 },
        plugins: {
          vtBarLabels: false,
          legend: { display: false },
          tooltip: { callbacks: { label: function (c) { return c.label + ': ' + c.parsed + 's'; } } }
        }
      }
    });
    var infoEl = document.getElementById(infoId);
    if (infoEl) {
      var pct   = target > 0 ? Math.round(used / target * 100) : 0;
      var color = remaining < 0 ? '#cc0000' : (pct > 85 ? '#e07000' : '#09528A');
      infoEl.innerHTML =
        '<span style="font-size:1.05rem;font-weight:bold;color:' + color + '">' + pct + '%</span><br>' +
        '<span style="color:#666;font-size:0.7rem;">' + used + 's / ' + target + 's</span>';
    }
  }

  function _renderBarChart(canvasId, categories, values, limitValue) {
    _destroyChart(canvasId);
    var ctx = document.getElementById(canvasId);
    if (!ctx) return;
    var datasets = [{
      type: 'bar', data: values, backgroundColor: '#09528A',

      // Legend swatch only — the actual reference line is drawn full-width
      // (edge to edge) by the vtTargetLine plugin below, since a data-bound

      datasets.push({
        type: 'line',
        data: categories.map(function () { return null; }),
        borderColor: '#cc0000', borderWidth: 1.5,
        borderDash: [5, 4], pointRadius: 0, fill: false,
        label: 'Target (' + limitValue + 's)', tension: 0
      });

    _chartInstances[canvasId] = new Chart(ctx, {
      data: { labels: categories, datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 20 } },
        plugins: {
          vtTargetLine: (limitValue > 0) ? { value: limitValue, color: '#cc0000' } : null,
          legend: { display: !!limitValue, labels: { font: { family: '72,Arial,sans-serif', size: 11 } } },
          tooltip: { callbacks: { label: function (c) { return c.dataset.label + ': ' + c.parsed.y + 's'; } } }
        },

  function _renderOpPlots(items, numOfParts, target, opNumber, idSuffix) {

  function _renderStationCharts(station, stIdSafe, numOfParts, target) {

  function _renderJobPlots() {

    var curOp      = oOpSelect.getSelectedKey();

    var target    = (_jobState.target_cycle_time || 0) * numOfParts;
    var noteEl    = document.getElementById('vtJobPlotsNote');
    if (noteEl) {

        ? 'Showing ' + cached.length + ' of ' + allOps.length + ' ops — select remaining ops in Design tab to load them.'
        : 'All ' + allOps.length + ' op(s) loaded.';
    }
    var ctVals = cached.map(function (op) {
      return Math.round(getMaxCycleEnd(_opTreeCache[op]) * 100) / 100;
    });
    _renderBarChart('vtJobCTSCanvas', cached, ctVals, target);
    var totSums = { 'Machine cycle': 0.0, 'Manual cycle': 0.0, 'Robot cycle': 0.0, 'Operator wait': 0.0 };
    cached.forEach(function (op) {
      var s = _computeCycleTypeSums(_opTreeCache[op]);
      Object.keys(totSums).forEach(function (k) { totSums[k] += s[k]; });
    });
    var ctCats = ['Machine cycle', 'Manual cycle', 'Robot cycle', 'Operator wait'];
    var ctTotals = ctCats.map(function (k) { return Math.round(totSums[k] * 100) / 100; });
    _renderBarChart('vtJobCTCanvas', ctCats, ctTotals, target);
    var jobUsage = {};
    cached.forEach(function (op) {
      var summaryJson = (_opMetaMap[op] || {}).machine_cycle_time_summary;
      var opUsage = summaryJson ? JSON.parse(summaryJson) : _extractLeafResourceUsage(_opTreeCache[op]);
      Object.keys(opUsage).forEach(function (k) {
        jobUsage[k] = (jobUsage[k] || 0) + opUsage[k];
      });
    });
    var jrc = _sortedResourceChart(jobUsage);
    _renderBarChart('vtJobResCanvas', jrc.cats, jrc.vals, target);

  // Build the items_details list for the /updateDB payload.
  // Recursively walk the full tree and build one items_details record per item.
  // Stations get cycle-type sums; all items get merged designer spec fields.
  function _buildItemsDetailsPayload(opNumber, items) {
    var numOfParts    = (_opMetaMap[opNumber] || {}).num_of_parts || 1;
    var cachedDetails = _itemsDetailsCache[opNumber] || {};
    var records       = [];

    function walk(item, isStation) {
      var cached = cachedDetails[item.item_id] || {};
      var record = {
        item_id:                  item.item_id,
        project_number:           _jobState.job_number || '',
        op_number:                opNumber,
        designer_comments:        cached.designer_comments        || null,
        designer_resources_links: cached.designer_resources_links || null,
        designer_picture_links:   cached.designer_picture_links   || null
      };

      if (isStation) {
        var sums = _computeCycleTypeSums(item.sub_process_items || []);
        record.machine_cycle_time_summary = JSON.stringify(sums);
        record.total_machine_cycle  = Math.round(sums['Machine cycle']  * 100) / 100;
        record.total_manual_cycle   = Math.round(sums['Manual cycle']   * 100) / 100;
        record.total_robot_cycle    = Math.round(sums['Robot cycle']    * 100) / 100;
        record.total_operator_cycle = Math.round(sums['Operator wait']  * 100) / 100;
        record.used_cycle_time      = Math.round((item.cycle_time / numOfParts) * 100) / 100;
        record.num_of_parts         = numOfParts;
      }

      records.push(record);
      (item.sub_process_items || []).forEach(function (child) { walk(child, false); });
    }

    items.forEach(function (station) { walk(station, true); });
    return records;
  }

  window.vtSwitchStationTab = function (stIdSafe, opSuffix) {
    opSuffix = opSuffix || '';
    var fullId    = opSuffix ? opSuffix + '_' + stIdSafe : stIdSafe;
    var contentId = opSuffix ? 'vtStContent_' + opSuffix : 'vtStContent';
    var tabBarId  = opSuffix ? 'vtStSubTabBar_' + opSuffix : 'vtStSubTabBar';
    var content   = document.getElementById(contentId);
    var tabBar    = document.getElementById(tabBarId);
    if (content) {
      content.querySelectorAll('[id^="vtStPanel_"]').forEach(function (p) { p.style.display = 'none'; });
      var panel = document.getElementById('vtStPanel_' + fullId);
      if (panel) { panel.style.display = 'block'; }
    }
    if (tabBar) {
      tabBar.querySelectorAll('.vtStTabBtn').forEach(function (b) { b.classList.remove('vtPActive'); });
      tabBar.querySelectorAll('[data-stid="' + stIdSafe + '"]').forEach(function (b) { b.classList.add('vtPActive'); });
    }
  };

  // Fetch one op's tree into the caches without touching any Design-tab UI.
  function _fetchTreeToCache(opNumber) {
    return fetch(API_BASE + "/updateTree", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ op_number: opNumber, project_number: _jobState.job_number })
    })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function (response) {
      var d = response.data || {};
      var items = d.cycle_general_structure || d || [];
      _stripDbId(items);
      // Op-specific data only — job data stays as loaded from /updateProjectNumbers
      (d.job_metadata || []).forEach(function (row) {
        if (row.op_number) {
          _opMetaMap[row.op_number] = {
            op_title:       row.op_title        || '',
            op_description: row.job_description || '',
            num_of_parts:   row.num_of_parts     || 1
          };
        }
      });
      if ((d.items_details || []).length) {
        _itemsDetailsCache[opNumber] = {};
        d.items_details.forEach(function (row) {
          if (row.item_id) { _itemsDetailsCache[opNumber][row.item_id] = row; }
        });
      }
      annotateSteps(items, null);
      _opTreeCache[opNumber] = JSON.parse(JSON.stringify(items));
      _updateResourceUsageInCache(opNumber);
    });
  }
