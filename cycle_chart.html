<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ValiantTMS — Cycle Chart</title>
  <script id="sap-ui-bootstrap"
    src="https://sdk.openui5.org/resources/sap-ui-core.js"
    data-sap-ui-libs="sap.m,sap.ui.table,sap.ui.layout"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; padding: 0; }

    /* Tighter row padding so 12 px bars have visible headroom */
    .sapUiTableCell { padding: 0 !important; }
    .sapUiTableCellInner { padding: 0 4px !important; }

    /* Ruler header – allow content to overflow horizontally */
    .sapUiTableColHdr .sapUiTableCellInner,
    .sapUiTableColHdrCnt .sapUiTableCellInner {
      overflow: visible !important;
      padding: 0 !important;
    }

    /* Selected row highlight — covers row-header, fixed column, and all scrollable columns */
    tr.sapUiTableRow.vtSelectedRow > td,
    .sapUiTableRowHdrScr .sapUiTableRowHdr.vtSelectedRow { background-color: rgba(9,82,138,0.13) !important; }
    /* RC wait-mode target row highlight */
    tr.sapUiTableRow.vtWaitSelectedRow > td,
    .sapUiTableRowHdrScr .sapUiTableRowHdr.vtWaitSelectedRow { background-color: rgba(0,150,80,0.15) !important; outline: 1px solid rgba(0,150,80,0.4); }

    /* RC toolbar container — white background matching the panels */
    .vtRcToolbar,
    .vtRcToolbar > .sapMFlexBox,
    .vtRcToolbar .sapMTBSpacer { background-color: #fff !important; }
    .vtRcToolbar { padding: 6px 8px; border-bottom: 1px solid #d9d9d9; }
    .vtRcPanel { margin: 0px 3px 0px 0; width: 210px; border: 1px solid #d9d9d9 !important; border-radius: 4px; }
    /* Strip all internal spacing from the phase boxes */
    .vtRcPanel .sapMPanelWrappingDivTb { padding: 0 !important; }
    .vtRcPanel .sapMPanelContent { padding: 2px !important; margin: 0 !important; }
    .vtRcPanel .sapMVBox > * { margin: 0 !important; }
    .vtRcPanel .sapMHBox { align-items: center; }
    /* Panel header toolbar (CheckBox title row) */
    .vtRcPanel .sapMPanelHdrToolbar { min-height: 26px !important; padding: 0 6px !important; background-color: rgba(0,0,0,0.06) !important; border-bottom: 1px solid rgba(0,0,0,0.10) !important; }
    .vtRcPanel .sapMPanelHdrToolbar .sapMCb { margin: 0; font-weight: 600; }
    /* Add/Remove panel — auto-width, 2×2 grid of colored buttons */
    .vtRcAddRemovePanel { width: auto !important; }
    .vtRcAddRemovePanel .sapMPanelContent { padding: 4px !important; }
    .vtRcAddRemovePanel .sapMHBox { gap: 2px; margin-bottom: 2px; }
    /* Copy/Paste panel — 3 vertical sections side by side */
    .vtCopyPastePanel .sapMPanelContent { padding: 0 !important; }
    .vtCopyPastePanel .sapMHBox { margin-bottom: 0 !important; gap: 0 !important; }
    .vtCPSection { padding: 4px 6px; display: flex !important; flex-direction: column !important; justify-content: center !important; align-items: center !important; gap: 2px; }
    .vtCPSection + .vtCPSection { border-left: 1px solid #e0e0e0; }
    /* Add/Delete Process wrapper — panel grows to fill the height set by the outer stretch */
    .vtRcAddRemoveBox { display: flex !important; flex-direction: column !important; align-items: center !important; }
    .vtRcAddRemoveBox > .sapMPanel { flex: 1 !important; }
    /* RC phases container — no padding/margin, panels sit directly inside */
    .vtRcPhasesContainer { margin: 0 !important; padding: 0 !important; }
    .vtRcPhasesContainer.sapMHBox { gap: 0 !important; }
    /* Labels under each box */
    .vtRcPhaseLabel, .vtAddRemoveLabel { display: block; width: 100%; text-align: center; font-size: 0.72rem; color: #8a8a8a; margin-top: 3px; }

    /* Remove horizontal row separator lines */
    .sapUiTableRow,
    .sapUiTableRowAlternate { border-bottom: none !important; border-top: none !important; }
    .sapUiTableCell,
    .sapUiTableCellInner    { border-bottom: none !important; border-top: none !important; }

    /* Dialog form row spacing */
    .vtDialogForm > .sapMHBox { margin-bottom: 8px; }
    .vtDialogForm > .sapMHBox > .sapMLabel { padding-top: 7px; flex-shrink: 0; }

    /* Gantt bar tooltip */
    #vtTooltip { position:fixed;z-index:9999;display:none;pointer-events:none;
                 box-shadow:0 4px 16px rgba(0,0,0,.25);font-size:12px;line-height:1.6; }

    /* Cycle Time Calculator */
    .vtCalcGenBox  { padding: 8px; }
    .vtCalcGenBox > * { margin-bottom: 4px !important; }
    .vtCalcOpLabel.sapMText { font-size: 0.8rem; color: #888; text-align: right; min-height: 18px; width: 100%; }
    .vtCalcTravelResult.sapMText { font-size: 1.1rem; font-weight: 700; color: #0854a0; }
    .vtProcFormulaBox { padding: 0 12px; border-left: 1px solid #e0e0e0; min-width: 260px; }
    .vtMatrixDisplay  { background: #f7f9fb; border: 1px solid #e0e0e0; border-radius: 4px; padding: 4px 8px; min-height: 44px; }
    .vtMxItemRow { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .vtMxItemRow > .vtMxItemText { flex: 1 1 0 !important; min-width: 0 !important; font-size: 0.78rem !important; padding-right: 4px !important; }
    .vtMxItemRow > .vtMxTimeText { font-size: 0.78rem !important; color: #888 !important; width: 44px !important; flex-shrink: 0 !important; text-align: right !important; }

    /* Design status bar — sits below the table */
    .vtDesignStatusBar.sapMTB { border-top: 1px solid #d9d9d9 !important; box-shadow: none !important; margin-top: 0 !important; }
    /* Close the gap between tree table and the status bar */
    .sapUiFixFlexFlex { margin-bottom: 0 !important; padding-bottom: 0 !important; }

    /* Compact toolbar overrides — tighten icon-only buttons in compact mode */
    .vtRcToolbar.sapUiSizeCompact .sapMBtn .sapMBtnInner { min-width: 2rem !important; padding: 0 0.375rem !important; }
    .vtRcToolbar.sapUiSizeCompact .vtCPSection,
    .sapUiSizeCompact.vtRcPanel .vtCPSection { padding: 3px 5px; gap: 1px; }
    .sapUiSizeCompact.vtRcAddRemovePanel .sapMHBox { gap: 1px; margin-bottom: 1px; }
    /* Job toolbar compact — make it snug with just the border shadow */
    .sapMTB.sapUiSizeCompact { min-height: 2.25rem !important; }

    /* Statistics & Report tab — collapsible section cards */
    #vtStatsContent > * { flex-shrink: 0; }
    .vtStatSection { background:#fff; border:1px solid #e4e4e4; border-radius:6px; overflow:hidden; }
    .vtStatSectionHeader { display:flex; align-items:center; gap:6px; padding:7px 14px; background:#f5f7fa; border-bottom:1px solid #e4e4e4; cursor:pointer; font-family:72,Arial,sans-serif; font-size:0.85rem; font-weight:600; color:#32363a; user-select:none; }
    .vtStatSectionHeader:hover { background:#eceff4; }
    .vtStatSectionBody { padding:10px; }
    .vtStatSectionBody.vtCollapsed { display:none; }
    .vtStSubTabBar { padding:4px 8px; border-bottom:1px solid #e8e8e8; background:#fafafa; display:flex; gap:4px; flex-wrap:wrap; align-items:center; min-height:32px; }

    /* Plots tab */
    .vtPlotsTabBtn { cursor:pointer; padding:4px 14px; border:1px solid #c8c8c8; border-radius:12px; font-size:0.8rem; color:#555; background:#f7f7f7; font-family:72,Arial,sans-serif; }
    .vtPlotsTabBtn.vtPActive { background:#09528A; color:#fff; border-color:#09528A; }
    .vtStTabBtn { cursor:pointer; padding:3px 10px; border:1px solid #c8c8c8; border-radius:10px; font-size:0.78rem; color:#555; background:#f7f7f7; font-family:72,Arial,sans-serif; }
    .vtStTabBtn.vtPActive { background:#09528A; color:#fff; border-color:#09528A; }
    .vtBarDim { opacity: 0.3; transition: opacity 0.15s; }
    .vtMiniPieWrap { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:4px 10px; height:100%; }
    .vtMiniPieInfo { font-size:0.72rem; font-family:72,Arial,sans-serif; color:#32363a; text-align:center; line-height:1.4; }
    .vtPlotsGrid { display:flex; flex-wrap:wrap; gap:8px; padding:8px; align-content:flex-start; }
    .vtPlotCard { background:#fff; border:1px solid #e4e4e4; border-radius:6px; padding:10px 12px; min-width:0; }
    .vtCardSm   { flex:0 0 210px; }
    .vtCardMd   { flex:1 1 270px; }
    .vtCardLg   { flex:2 1 360px; }
    .vtCardFull { flex:1 1 100%; }
    .vtPlotTitle { font-size:0.8rem; font-weight:600; color:#32363a; margin-bottom:6px; text-align:center; font-family:72,Arial,sans-serif; }

  </style>
</head>
<body class="sapUiBody">
  <div id="content" style="height:100%"></div>

<script>
sap.ui.getCore().attachInit(function () {
  "use strict";

  // ── State ─────────────────────────────────────────────────────────────────
  var API_BASE    = "http://localhost:8000";  // FastAPI server base URL

  var scaleFactor = 2.0;   // pixels per second
  var maxCycleEnd = 500;   // updated after each API call
  var nAutoExpandLevel = 0;

  var _opsToDelete = [];  // ops queued for deletion, flushed on saveToDb

  // In-memory metadata — no server calls until the Save button is pressed
  var _jobState = {
    job_number: "", job_title: "", job_description: "",
    target_cycle_time: 60,
    machine_list: [], robot_list: [], operator_list: [],
    predefined_processes: []
  };
  var _opMetaMap  = {};  // opNumber → { op_title, op_description, num_of_parts }
  var _opTreeCache      = {}; // opNumber → deep copy of tree items
  var _itemsDetailsCache = {}; // opNumber → array of station stat rows (from items_details table)

  var clipboard = { items: [], mode: 'copy' };

  // Walk the sub_process_items tree to find the global maximum cycle_end
  function getMaxCycleEnd(items) {
    var max = 0;
    (items || []).forEach(function (item) {
      if ((item.cycle_end || 0) > max) max = item.cycle_end;
      var childMax = getMaxCycleEnd(item.sub_process_items);
      if (childMax > max) max = childMax;
    });
    return max;
  }

  // Compute and write item.step based on tree position, mirroring the React TreeTable2 logic:
  //   stations → S1, S2 …   children → P{parentIdx}_{k}   grandchildren → P{parentIdx}_{k}_{m} …
  function annotateSteps(items, idxPrefix) {
    (items || []).forEach(function (item, k) {
      if (idxPrefix === null) {
        item.step = "S" + (k + 1);
        annotateSteps(item.sub_process_items, String(k + 1));
      } else {
        var childIdx = idxPrefix + "_" + (k + 1);
        item.step = "P" + childIdx;
        annotateSteps(item.sub_process_items, childIdx);
      }
    });
  }

  // Annotate every item with its parent's and grandparent's cycle_end.
  // These drive the right-border markers in CycleBar, mirroring the React pattern
  // where nested divs each add a borderRight at the parent's cycle_end position.
  function annotateAncestors(items, ancestorEnds) {
    (items || []).forEach(function (item) {
      item._ancestorEnds = ancestorEnds.join(",");
      annotateAncestors(item.sub_process_items, [item.cycle_end].concat(ancestorEnds));
    });
  }

  // ── RC Condition constants ─────────────────────────────────────────────────
  var RC_COND = {
    FIRST_STATION:   'First Station',
    AFTER:           'After...',
    FROM_ZERO:       'From Zero',
    WITH:            'With ...',
    WITH_OFFSET:     'With offset',
    BEFORE:          'Before ...',
    LAST:            'Last process',
    CUSTOM_VALUE:    'Custom value',
    SUBPROCESS:      'Parent Process',
    EQUAL_TO:        'Equal to',
    SEQUENTIAL:      'Sequential',
    SYNC_START:      'Sync Start',
    SYNC_COMPLETION: 'Sync Completion',
    CYCLE_CALC:      'Cycle Time Cal',
    PREDEFINED:      'Predefined'
  };

  // ── RC parse / serialize ───────────────────────────────────────────────────
  // RC JSON format per phase: { "<ConditionName>": [values...], "Offset": [0.0] }
  function parseRC(rcStr) {
    var result = { start: null, cycle: null, end: null };
    if (!rcStr || rcStr === '{}') return result;
    var json;
    try { json = JSON.parse(rcStr); } catch (e) { return result; }

    function parsePhase(obj) {
      if (!obj) return null;
      var condition = null, values = [], offset = 0.0;
      Object.keys(obj).forEach(function (k) {
        if (k === 'Offset') { offset = parseFloat(obj[k][0]) || 0.0; }
        else                { condition = k; values = obj[k] || []; }
      });
      return condition ? { condition: condition, values: values, offset: offset } : null;
    }

    result.start = parsePhase(json['Start']);
    result.cycle = parsePhase(json['Cycle']);
    result.end   = parsePhase(json['End']);
    return result;
  }

  function serializeRC(rc) {
    var json = {};
    if (rc.start && rc.start.condition) {
      var s = {}; s[rc.start.condition] = rc.start.values; s['Offset'] = [rc.start.offset || 0.0];
      json['Start'] = s;
    }
    if (rc.cycle && rc.cycle.condition) {
      var c = {}; c[rc.cycle.condition] = rc.cycle.values;
      json['Cycle'] = c;
    }
    if (rc.end && rc.end.condition) {
      var e = {}; e[rc.end.condition] = rc.end.values; e['Offset'] = [rc.end.offset || 0.0];
      json['End'] = e;
    }
    return JSON.stringify(json);
  }

  // ── Flat map: item_id → item reference ────────────────────────────────────
  function buildFlatMap(items, map) {
    (items || []).forEach(function (item) {
      map[item.item_id] = item;
      buildFlatMap(item.sub_process_items, map);
    });
    return map;
  }

  // ── Dependant-items helpers (mirrors add/delete_from_dependant_list) ──────
  function _getDepMap(item) {
    try { return JSON.parse(item.dependant_items || '{}'); } catch (e) { return {}; }
  }
  function _setDepMap(item, dep) {
    item.dependant_items = JSON.stringify(dep);
  }
  // For each valueId in valueIds, add itemId into valueId's dependant_items[phase]
  function _addToDependantList(flatMap, valueIds, itemId, phase) {
    (valueIds || []).forEach(function (valueId) {
      var target = flatMap[valueId];
      if (!target) return;
      var dep = _getDepMap(target);
      if (!Array.isArray(dep[phase])) dep[phase] = [];
      if (dep[phase].indexOf(itemId) < 0) dep[phase].push(itemId);
      _setDepMap(target, dep);
    });
  }
  // For each valueId in valueIds, remove itemId from all phases of valueId's dependant_items
  function _deleteFromDependantList(flatMap, valueIds, itemId) {
    (valueIds || []).forEach(function (valueId) {
      var target = flatMap[valueId];
      if (!target) return;
      var dep = _getDepMap(target);
      Object.keys(dep).forEach(function (ph) {
        dep[ph] = (dep[ph] || []).filter(function (id) { return id !== itemId; });
        if (!dep[ph].length) delete dep[ph];
      });
      _setDepMap(target, dep);
    });
  }

  // ── Rounding helper ────────────────────────────────────────────────────────
  function r2(v) { return Math.round(v * 100) / 100; }

  // ── Special-cases handler (mirrors handle_run_condition_special_cases) ─────
  //   Must run before phase calculations so RC is correct for the current item.
  function handleSpecialCases(item) {
    var children = item.sub_process_items || [];
    var rc = parseRC(item.run_cond_config);

    if (children.length > 0) {
      // Force Cycle phase to "Parent Process"
      rc.cycle = { condition: RC_COND.SUBPROCESS, values: [] };
      item.run_cond_config = serializeRC(rc);

      // cycle_type
      item.cycle_type = (item.step && item.step[0] === 'S') ? 'Station' : 'Process group';

      // Force first child's Start to "From Zero"
      var firstChild = children[0];
      var childRc = parseRC(firstChild.run_cond_config);
      childRc.start = { condition: RC_COND.FROM_ZERO, values: [], offset: 0.0 };
      firstChild.run_cond_config = serializeRC(childRc);

    } else {
      // Leaf that lost its children: reset Cycle from "Parent Process" → "Custom value" 10
      if (item.step && item.step[0] !== 'S' && rc.cycle && rc.cycle.condition === RC_COND.SUBPROCESS) {
        rc.cycle = { condition: RC_COND.CUSTOM_VALUE, values: [10] };
        item.run_cond_config = serializeRC(rc);
      }
      if (!item.step || item.step[0] !== 'S') {
        item.cycle_type = 'Undefined';
      }
    }
  }

  // ── Phase calculators ──────────────────────────────────────────────────────
  function calcStartPhase(item, startRc, flatMap) {
    var cond   = startRc.condition;
    var vals   = startRc.values;
    var offset = startRc.offset || 0.0;

    if (cond === RC_COND.FIRST_STATION) {
      item.cycle_start = 0.0;

    } else if (cond === RC_COND.CUSTOM_VALUE) {
      var v = parseFloat(vals[0]);
      if (!isNaN(v)) item.cycle_start = r2(v + offset);

    } else if (cond === RC_COND.FROM_ZERO) {
      var parent = flatMap[item.parent_id];
      if (parent) item.cycle_start = r2((parent.cycle_start || 0.0) + offset);

    } else if (cond === RC_COND.AFTER || cond === RC_COND.SEQUENTIAL) {
      var maxEnd = 0.0;
      vals.forEach(function (id) {
        var ref = flatMap[id];
        if (ref && (ref.cycle_end || 0) > maxEnd) maxEnd = ref.cycle_end;
      });
      if (maxEnd > 0) item.cycle_start = r2(maxEnd + offset);

    } else if (cond === RC_COND.WITH || cond === RC_COND.SYNC_START || cond === RC_COND.WITH_OFFSET) {
      var ref = flatMap[vals[vals.length - 1]];
      if (ref) item.cycle_start = r2((ref.cycle_start || 0.0) + offset);
    }
  }

  function calcCyclePhase(item, cycleRc, flatMap) {
    var cond = cycleRc.condition;
    var vals = cycleRc.values;

    if (cond === RC_COND.CUSTOM_VALUE) {
      var v = parseFloat(vals[0]);
      if (!isNaN(v)) item.cycle_time = r2(v);

    } else if (cond === RC_COND.EQUAL_TO) {
      var ref = flatMap[vals[vals.length - 1]];
      if (ref && ref.cycle_time != null) item.cycle_time = r2(ref.cycle_time);

    } else if (cond === RC_COND.CYCLE_CALC) {
      var v = parseFloat((vals[0] || '').split('=').pop().trim());
      if (!isNaN(v)) item.cycle_time = r2(v);

    } else if (cond === RC_COND.PREDEFINED) {
      var pname = vals[0] || '';
      var foundPD = (_jobState.predefined_processes || []).filter(function (p) { return p.name === pname; })[0];
      if (foundPD) item.cycle_time = r2(parseFloat(foundPD.cycle_time) || 0);

    } else if (cond === RC_COND.SUBPROCESS) {
      var children = item.sub_process_items || [];
      if (!children.length) return;

      var firstStart = (children[0].cycle_start != null) ? children[0].cycle_start : (item.cycle_start || 0.0);
      var maxEnd = 0.0;
      children.forEach(function (ch) {
        if (ch.cycle_end != null && ch.cycle_end > maxEnd) maxEnd = ch.cycle_end;
      });

      if (maxEnd > 0) {
        item.cycle_time = r2(maxEnd - firstStart);
        // If End phase is also explicitly set, back-calculate cycle_start
        var rc = parseRC(item.run_cond_config);
        if (rc.end && rc.end.condition) {
          item.cycle_start = r2((item.cycle_end || 0.0) - item.cycle_time);
        }
        calcThirdValue(item, 'end');
      }
    }
  }

  function calcEndPhase(item, endRc, flatMap) {
    var cond   = endRc.condition;
    var vals   = endRc.values;
    var offset = endRc.offset || 0.0;

    if (cond === RC_COND.CUSTOM_VALUE) {
      var v = parseFloat(vals[0]);
      if (!isNaN(v)) item.cycle_end = r2(v + offset);

    } else if (cond === RC_COND.BEFORE) {
      var minStart = Infinity;
      vals.forEach(function (id) {
        var ref = flatMap[id];
        if (ref && (ref.cycle_start || 0) < minStart) minStart = ref.cycle_start;
      });
      if (minStart !== Infinity) item.cycle_end = r2(minStart + offset);

    } else if (cond === RC_COND.LAST) {
      var parent = flatMap[item.parent_id];
      if (parent && parent.cycle_end != null) item.cycle_end = r2(parent.cycle_end + offset);

    } else if (cond === RC_COND.WITH || cond === RC_COND.SYNC_COMPLETION) {
      var maxEnd = 0.0;
      vals.forEach(function (id) {
        var ref = flatMap[id];
        if (ref && (ref.cycle_end || 0) > maxEnd) maxEnd = ref.cycle_end;
      });
      if (maxEnd > 0) item.cycle_end = r2(maxEnd + offset);
    }
  }

  // ── Third value resolver (mirrors calculate_the_third_time_value) ──────────
  function calcThirdValue(item, phase) {
    var cs = item.cycle_start || 0.0;
    var ct = item.cycle_time  || 0.0;
    var ce = item.cycle_end   || 0.0;

    if (phase === 'end') {
      var v = r2(cs + ct); if (v >= 0) item.cycle_end   = v;
    } else if (phase === 'start') {
      var v = r2(ce - ct); item.cycle_start = v >= 0 ? v : 0.0;
    } else if (phase === 'cycle') {
      var v = r2(ce - cs); item.cycle_time  = v >= 0 ? v : 0.0;
    }
  }

  // ── Per-item calculation (mirrors calculate_cycle_time_values_2) ───────────
  function calculateItemValues(item, flatMap) {
    var rc = parseRC(item.run_cond_config);
    var thirdPhase = [];

    if (!rc.start || !rc.start.condition) { thirdPhase.push('start'); }
    else { calcStartPhase(item, rc.start, flatMap); }

    if (!rc.cycle || !rc.cycle.condition) { thirdPhase.push('cycle'); }
    else { calcCyclePhase(item, rc.cycle, flatMap); }

    if (!rc.end || !rc.end.condition) { thirdPhase.push('end'); }
    else { calcEndPhase(item, rc.end, flatMap); }

    if (thirdPhase.length === 1) { calcThirdValue(item, thirdPhase[0]); }
  }

  // ── Recursive handler (mirrors handle_process_calculations_2) ─────────────
  //   Two-pass: parent first → children → parent again (needed for SUBPROCESS cycle).
  function handleProcessCalc(item, flatMap) {
    handleSpecialCases(item);
    calculateItemValues(item, flatMap);                          // FIRST PASS

    (item.sub_process_items || []).forEach(function (child) {
      handleProcessCalc(child, flatMap);
    });

    calculateItemValues(item, flatMap);                          // SECOND PASS
  }

  // ── Confirm Copied Items ──────────────────────────────────────────────────
  function confirmCopiedItems() {
    if (!oRcState.activeItemIds.length) { sap.m.MessageToast.show("Select items first"); return; }
    if (!window.confirm("Do you want to confirm the copied processes?")) return;
    var items   = oDataModel.getProperty("/items");
    var flatMap = buildFlatMap(items, {});
    var changed = 0;
    oRcState.activeItemIds.forEach(function (id) {
      var item = flatMap[id];
      if (item && item.title && item.title.indexOf('(**copy)') >= 0) {
        item.title = item.title.replace(/\(\*\*copy\) ?/g, '').trim();
        changed++;
      }
    });
    if (changed > 0) {
      recalcTree();
      sap.m.MessageToast.show("Confirmed " + changed + " item(s)");
    } else {
      sap.m.MessageToast.show("No copied items in selection");
    }
  }

  // ── Main recalc entry point (mirrors cal_and_update_run_config_values_in_db)
  function recalcTree() {
    var items = oDataModel.getProperty("/items");
    if (!items || !items.length) return;

    var flatMap = buildFlatMap(items, {});

    // First station always anchored at t = 0
    var firstStation = items[0];
    var rc0 = parseRC(firstStation.run_cond_config);
    rc0.start = { condition: RC_COND.FIRST_STATION, values: [], offset: 0.0 };
    firstStation.run_cond_config = serializeRC(rc0);
    firstStation.cycle_start = 0.0;

    items.forEach(function (station) {
      handleProcessCalc(station, flatMap);
    });

    annotateSteps(items, null);
    annotateAncestors(items, []);
    maxCycleEnd = getMaxCycleEnd(items) || 500;
    updateGanttColumn();
    updateRuler();
    oDataModel.refresh(true);
    _updateMiniPie();
    _updateResourceUsageInCache(oOpSelect.getSelectedKey());
    setTimeout(function () { var cur = getCurrentItem(); if (cur) _showRcSigns(cur); }, 0);
  }

  // ── Sibling context helper ────────────────────────────────────────────────
  //   Returns { siblings, idx } for a given item within its parent's children
  //   (or the root items array if the item is a top-level station).
  function getSiblingsContext(items, item, flatMap) {
    var parent   = item.parent_id ? flatMap[item.parent_id] : null;
    var siblings = parent ? (parent.sub_process_items || []) : items;
    var idx      = -1;
    for (var i = 0; i < siblings.length; i++) {
      if (siblings[i].item_id === item.item_id) { idx = i; break; }
    }
    return { siblings: siblings, idx: idx };
  }

  // ── RC reorganizer (mirrors organize_rc_to_place_item_in_new_location) ────
  //   Fixes the Start RC of targetItem and/or its next sibling after the tree
  //   changes (add / remove).  Call with ignoreAbove=true when you only want
  //   to patch the next sibling (e.g. after a deletion, pass the prev sibling).
  function organizeRcAfterChange(items, flatMap, targetItem, ignoreAbove, ignoreBelow) {
    var ctx      = getSiblingsContext(items, targetItem, flatMap);
    var siblings = ctx.siblings;
    var idx      = ctx.idx;
    if (idx < 0) return;

    if (!ignoreAbove) {
      var prevSib = idx > 0 ? siblings[idx - 1] : null;
      var rc = parseRC(targetItem.run_cond_config);
      rc.start = prevSib
        ? { condition: RC_COND.AFTER,     values: [prevSib.item_id], offset: 0.0 }
        : { condition: RC_COND.FROM_ZERO, values: [],                offset: 0.0 };
      rc.end = null;
      targetItem.run_cond_config = serializeRC(rc);
    }

    if (!ignoreBelow) {
      var nextSib = idx < siblings.length - 1 ? siblings[idx + 1] : null;
      if (nextSib) {
        var nextRc = parseRC(nextSib.run_cond_config);
        nextRc.start = { condition: RC_COND.AFTER, values: [targetItem.item_id], offset: 0.0 };
        nextRc.end   = null;
        nextSib.run_cond_config = serializeRC(nextRc);
      }
    }
  }

  // ── Clipboard helpers ─────────────────────────────────────────────────────

  // Deep-clone one item and all its sub_process_items, assigning fresh UUIDs.
  // idMap is populated with { oldId: newId } for every node cloned.
  // addCopyPrefix: when true, prepends '(**copy) ' to every title in the subtree.
  function deepCloneWithNewIds(item, idMap, addCopyPrefix) {
    var newId = crypto.randomUUID();
    idMap[item.item_id] = newId;
    var clonedChildren = (item.sub_process_items || []).map(function (child) {
      var c = deepCloneWithNewIds(child, idMap, addCopyPrefix);
      c.parent_id = newId;
      return c;
    });
    var title = item.title || "";
    if (addCopyPrefix && title.indexOf('(**copy)') < 0) title = '(**copy) ' + title;
    return {
      id:               "",
      item_id:          newId,
      tree_index:       item.tree_index,
      step:             item.step,
      op_number:        item.op_number,
      title:            title,
      parent_id:        item.parent_id,
      subprocess:       clonedChildren.map(function (c) { return c.item_id; }).join(','),
      run_cond_config:  item.run_cond_config,
      dependant_items:  '{}',
      cycle_start:      item.cycle_start,
      cycle_time:       item.cycle_time,
      cycle_end:        item.cycle_end,
      color:            item.color,
      cycle_type:       item.cycle_type,
      highlight:        item.highlight,
      sub_process_items: clonedChildren
    };
  }

  // Walk a cloned subtree and remap any RC "After..." values that point to old
  // item_ids that exist in idMap, replacing them with the new cloned ids.
  function remapRcRefs(item, idMap) {
    var rc = parseRC(item.run_cond_config);
    var changed = false;
    ['start', 'cycle', 'end'].forEach(function (phase) {
      if (rc[phase] && rc[phase].condition === RC_COND.AFTER && rc[phase].values.length > 0) {
        var mapped = idMap[rc[phase].values[0]];
        if (mapped) { rc[phase].values = [mapped]; changed = true; }
      }
    });
    if (changed) item.run_cond_config = serializeRC(rc);
    (item.sub_process_items || []).forEach(function (child) { remapRcRefs(child, idMap); });
  }

  // Return the subset of activeItemIds that are "roots" of the selection:
  // stations are always roots; a subprocess is a root only if its parent is
  // not also in the active selection.
  function getClipboardRoots() {
    var flatMap = buildFlatMap(oDataModel.getProperty("/items"), {});
    return oRcState.activeItemIds
      .filter(function (id) {
        var item = flatMap[id];
        if (!item) return false;
        return !item.parent_id || oRcState.activeItemIds.indexOf(item.parent_id) < 0;
      })
      .map(function (id) { return flatMap[id]; });
  }

  // ── Models ────────────────────────────────────────────────────────────────
  var oSettingsModel   = new sap.ui.model.json.JSONModel({ scaleFactor: scaleFactor });
  var oDataModel       = new sap.ui.model.json.JSONModel({ items: [], maxCycleEnd: 0 });
  var oSelectedItemId  = null;   // item_id of the last clicked row
  var oLastAddedItemId = null;   // item_id created by the most recent add — cleared on any manual click

  // RC interaction state
  var oRcState = {
    waitPhase:     null,   // 'start' | 'cycle' | 'end' — phase awaiting a target-row click
    waitCondition: null,   // condition string to apply once target row is clicked
    activeItemIds: []      // item_ids whose RC is currently being edited
  };

  // Which two phases are user-defined (the third is derived by recalc).
  // Ordered by activation time (oldest first) so that when a 3rd is checked
  // the oldest is automatically bumped out.
  var oActivePhases = ['start', 'cycle'];
  // Item IDs accumulated during RC wait mode; applied all at once on Enter/Apply
  var oRcWaitSelectedIds = [];

  // ── Tree helpers ──────────────────────────────────────────────────────────
  function findItemById(items, itemId) {
    for (var i = 0; i < (items || []).length; i++) {
      if (items[i].item_id === itemId) return items[i];
      var hit = findItemById(items[i].sub_process_items, itemId);
      if (hit) return hit;
    }
    return null;
  }

  // ── Row highlight helpers ─────────────────────────────────────────────────
  var _rowClickHandled = false;
  var _ctrlKeyHeld     = false;
  var _shiftKeyHeld    = false;
  var _anchorItemId    = null;   // anchor for Shift range selection

  function flattenInOrder(items, out) {
    out = out || [];
    (items || []).forEach(function (item) {
      out.push(item);
      flattenInOrder(item.sub_process_items || [], out);
    });
    return out;
  }

  // Stamps a CSS class on BOTH the fixed-column TR and the scroll-column TR so that
  // all columns (including the fixed "Cycle Description" column) are covered.
  // Uses the row's actual DOM position inside its own tbody instead of the logical
  // row index, avoiding off-by-one caused by header TRs inside the fixed tbody.
  function _stampRowClass(oRow, i, cls, on) {
    var tableDom = oTable.getDomRef();
    var mainDom  = oRow.getDomRef();
    if (!mainDom || !tableDom) return;
    mainDom.classList.toggle(cls, on);

    // Real position of this TR within its own tbody
    var parentTbody = mainDom.parentNode;
    var rowPos = parentTbody
      ? Array.prototype.indexOf.call(parentTbody.children, mainDom)
      : -1;
    if (rowPos < 0) return;

    // Find the counterpart TR in the other column container at the same tbody position
    var inFixed    = !!mainDom.closest('.sapUiTableCtrlFixed');
    var otherTbody = tableDom.querySelector(
      inFixed ? '.sapUiTableCtrlScroll tbody' : '.sapUiTableCtrlFixed tbody'
    );
    if (otherTbody && otherTbody.rows[rowPos]) {
      otherTbody.rows[rowPos].classList.toggle(cls, on);
    }

    // Row-header strip (expand/collapse indicator) — indexed the same as tbody rows
    var hdrDivs = tableDom.querySelectorAll('.sapUiTableRowHdrScr .sapUiTableRowHdr');
    if (hdrDivs[rowPos]) hdrDivs[rowPos].classList.toggle(cls, on);
  }

  function applyRowHighlight() {
    oTable.getRows().forEach(function (oRow, i) {
      var oCtx = oRow.getBindingContext();
      var id = oCtx && oCtx.getObject() && oCtx.getObject().item_id;
      _stampRowClass(oRow, i, 'vtSelectedRow', !!(id && oRcState.activeItemIds.indexOf(id) >= 0));
    });
  }

  function clearRowHighlight() {
    oSelectedItemId = null;
    oRcState.activeItemIds = [];
    oActivePhases = ['start', 'cycle'];
    cancelRcWait();
    _clearRcSigns();
    applyRowHighlight();
    oRcStartSelect.setSelectedKey('');   oRcStartValueRow.setVisible(false);
    oRcCycleSelect.setSelectedKey('');   oRcCycleValueInput.setEnabled(false);
    oRcEndSelect.setSelectedKey('');     oRcEndValueRow.setVisible(false);
    oRcStartCheck.setSelected(true);  setPhaseControlsEnabled('start', true);
    oRcCycleCheck.setSelected(true);  setPhaseControlsEnabled('cycle', true);
    oRcEndCheck.setSelected(false);   setPhaseControlsEnabled('end',   false);
  }

  function applyWaitHighlights() {
    oTable.getRows().forEach(function (oRow, i) {
      var oCtx = oRow.getBindingContext();
      var id = oCtx && oCtx.getObject() && oCtx.getObject().item_id;
      _stampRowClass(oRow, i, 'vtWaitSelectedRow', !!(id && oRcWaitSelectedIds.indexOf(id) >= 0));
    });
  }

  // ── Item click handler ────────────────────────────────────────────────────
  window.__vtOnItemClick = function (sId) {
    _rowClickHandled = true;
    oLastAddedItemId = null;   // user made a deliberate selection — disable sibling-bubbling
    var oCtrl = sap.ui.getCore().byId(sId);
    if (!oCtrl) return;
    var oCtx = oCtrl.getBindingContext();
    if (!oCtx) return;
    var oObj = oCtx.getObject();

    // While waiting for a target-item click (After.., With.., Before.., Equal To..)
    if (oRcState.waitPhase) {
      applyRcWithTarget(oObj.item_id);
      return;
    }

    function setReference(item) {
      oSelectedItemId = item.item_id;
      var rc0 = parseRC(item.run_cond_config);
      oActivePhases = [];
      if (rc0.start && rc0.start.condition) oActivePhases.push('start');
      if (rc0.cycle && rc0.cycle.condition) oActivePhases.push('cycle');
      if (rc0.end   && rc0.end.condition)   oActivePhases.push('end');
      if (oActivePhases.length < 1) oActivePhases = ['start', 'cycle']; // default when item has no RC yet
      refreshRcToolbar(item);
    }

    if (_shiftKeyHeld && _anchorItemId) {
      // Shift+click: select all rows between anchor and clicked item (inclusive)
      var flat = flattenInOrder(oDataModel.getProperty("/items"));
      var anchorIdx = -1, clickedIdx = -1;
      for (var i = 0; i < flat.length; i++) {
        if (flat[i].item_id === _anchorItemId) anchorIdx = i;
        if (flat[i].item_id === oObj.item_id)  clickedIdx = i;
      }
      if (anchorIdx >= 0 && clickedIdx >= 0) {
        var lo = Math.min(anchorIdx, clickedIdx);
        var hi = Math.max(anchorIdx, clickedIdx);
        oRcState.activeItemIds = flat.slice(lo, hi + 1).map(function (it) { return it.item_id; });
      }
      setReference(oObj);
    } else if (_ctrlKeyHeld) {
      // Ctrl+click: toggle this item in/out of the multi-selection
      var idx = oRcState.activeItemIds.indexOf(oObj.item_id);
      if (idx >= 0) {
        oRcState.activeItemIds.splice(idx, 1);
        if (oRcState.activeItemIds.length === 0) { clearRowHighlight(); return; }
        if (oSelectedItemId === oObj.item_id) {
          var fm0 = buildFlatMap(oDataModel.getProperty("/items"), {});
          var ref0 = fm0[oRcState.activeItemIds[0]];
          if (ref0) setReference(ref0);
        }
      } else {
        oRcState.activeItemIds.push(oObj.item_id);
        setReference(oObj);
        _anchorItemId = oObj.item_id;
      }
    } else {
      // Normal click: select only this item (clears any prior multi-selection)
      oRcState.activeItemIds = [oObj.item_id];
      setReference(oObj);
      _anchorItemId = oObj.item_id;
    }

    applyRowHighlight();
    _showRcSigns(oObj);
    console.log("[ValiantTMS] active items:", oRcState.activeItemIds);
    console.log("[ValiantTMS] item data:", JSON.stringify(oObj, null, 2));
    console.log("[ValiantTMS] RC JSON:", oObj.run_cond_config || '(none)');
  };

  // ── RC helper functions ───────────────────────────────────────────────────

  function getCurrentItem() {
    var refId = oSelectedItemId || (oRcState.activeItemIds.length ? oRcState.activeItemIds[0] : null);
    if (!refId) return null;
    var flatMap = buildFlatMap(oDataModel.getProperty("/items"), {});
    return flatMap[refId] || null;
  }

  // Patch one phase on ALL active items' RC, then recalc the whole tree.
  // If active phases != 2, shows a warning dialog; user can still proceed.
  function applyRcChange(phase, condition, values, offset) {
    if (!oRcState.activeItemIds.length) { sap.m.MessageToast.show("Select a row first"); return; }

    function doApply() {
      var flatMap = buildFlatMap(oDataModel.getProperty("/items"), {});
      oRcState.activeItemIds.forEach(function (id) {
        var item = flatMap[id];
        if (!item) return;
        var rc = parseRC(item.run_cond_config);

        // Remove old dependant_items entries for the phase being replaced
        var oldPhase = rc[phase];
        if (oldPhase && oldPhase.values) {
          _deleteFromDependantList(flatMap, oldPhase.values, id);
        }

        // Clear (and clean up) the third phase when only 2 phases are active
        if (oActivePhases.length === 2) {
          ['start', 'cycle', 'end'].forEach(function (p) {
            if (!oActivePhases.includes(p)) {
              var old = rc[p];
              if (old && old.values) _deleteFromDependantList(flatMap, old.values, id);
              rc[p] = null;
            }
          });
        }

        // Apply new RC phase
        rc[phase] = condition
          ? { condition: condition, values: values || [], offset: (offset !== undefined ? parseFloat(offset) : 0.0) }
          : null;
        item.run_cond_config = serializeRC(rc);

        // Add new dependant_items entries for the newly referenced items
        if (condition && values && values.length) {
          _addToDependantList(flatMap, values, id, phase);
        }
      });
      recalcTree();
      var updated = getCurrentItem();
      if (updated) refreshRcToolbar(updated);
    }

    if (oActivePhases.length !== 2) {
      sap.m.MessageBox.warning(
        "RC calculation requires exactly 2 active phases, but " + oActivePhases.length +
        " phase(s) are currently active.\nApply anyway?",
        {
          actions: [sap.m.MessageBox.Action.OK, sap.m.MessageBox.Action.CANCEL],
          onClose: function (sAction) { if (sAction === sap.m.MessageBox.Action.OK) doApply(); }
        }
      );
    } else {
      doApply();
    }
  }

  // Called when user clicks a row while in "waiting for target" mode.
  function applyRcWithTarget(targetItemId) {
    if (oRcState.activeItemIds.indexOf(targetItemId) >= 0) {
      sap.m.MessageToast.show("Cannot reference the same item");
      return;
    }
    var idx = oRcWaitSelectedIds.indexOf(targetItemId);
    if (idx >= 0) {
      oRcWaitSelectedIds.splice(idx, 1);  // toggle off
    } else {
      oRcWaitSelectedIds.push(targetItemId);
    }
    applyWaitHighlights();
    var n = oRcWaitSelectedIds.length;
    oRcStatusLabel.setText(n === 0
      ? '→ ' + oRcState._waitText
      : n + ' item' + (n > 1 ? 's' : '') + ' selected — Press Enter or click Apply');
  }

  function commitRcWait() {
    if (!oRcState.waitPhase) return;
    if (oRcWaitSelectedIds.length === 0) { sap.m.MessageToast.show("Select at least one item"); return; }
    applyRcChange(oRcState.waitPhase, oRcState.waitCondition, oRcWaitSelectedIds.slice(), 0.0);
    cancelRcWait();
  }

  function enterRcWait(phase, condition, text) {
    oRcWaitSelectedIds = [];
    oRcState.waitPhase     = phase;
    oRcState.waitCondition = condition;
    oRcState._waitText     = text;
    oRcStatusLabel.setText('→ ' + text);
    oRcStatusBar.setVisible(true);
  }

  function cancelRcWait() {
    oRcWaitSelectedIds = [];
    applyWaitHighlights();
    oRcState.waitPhase     = null;
    oRcState.waitCondition = null;
    oRcState._waitText     = null;
    oRcStatusLabel.setText('');
    oRcStatusBar.setVisible(false);
  }

  // Sync all RC panel controls to the given item's current RC.
  // oActivePhases drives checkbox states and enabled/disabled styling.
  function refreshRcToolbar(item) {
    if (!item) return;
    var rc = parseRC(item.run_cond_config);
    var sA = oActivePhases.includes('start');
    var cA = oActivePhases.includes('cycle');
    var eA = oActivePhases.includes('end');

    oRcStartCheck.setSelected(sA);
    oRcCycleCheck.setSelected(cA);
    oRcEndCheck.setSelected(eA);
    setPhaseControlsEnabled('start', sA);
    setPhaseControlsEnabled('cycle', cA);
    setPhaseControlsEnabled('end',   eA);

    // Dropdowns always show the first (empty) item — they act as action menus.
    // Value visibility and inputs are derived from the actual RC data.
    oRcStartSelect.setSelectedKey('');
    oRcCycleSelect.setSelectedKey('');
    oRcEndSelect.setSelectedKey('');

    var sk = sA && rc.start ? rc.start.condition : '';
    oRcStartValueRow.setVisible(sk === RC_COND.CUSTOM_VALUE);
    if (sk === RC_COND.CUSTOM_VALUE && rc.start && rc.start.values.length)
      oRcStartValueInput.setValue(parseFloat(rc.start.values[0]) || 0);
    oRcStartOffsetInput.setValue(sA && rc.start ? (rc.start.offset || 0) : 0);

    var ck = cA && rc.cycle ? rc.cycle.condition : '';
    var cycleIsCustom = ck === RC_COND.CUSTOM_VALUE;
    var cycleIsCalc   = ck === RC_COND.CYCLE_CALC;
    var cycleIsPredef = ck === RC_COND.PREDEFINED;
    oRcCycleValueInput.setEnabled(cA && cycleIsCustom);
    if (cycleIsCustom && rc.cycle && rc.cycle.values.length)
      oRcCycleValueInput.setValue(parseFloat(rc.cycle.values[0]) || 0);
    if (cycleIsCalc && rc.cycle && rc.cycle.values.length) {
      var calcNum = parseFloat((rc.cycle.values[0] || '').split('=').pop().trim());
      if (!isNaN(calcNum)) oRcCycleValueInput.setValue(calcNum);
    }
    if (cycleIsPredef && rc.cycle && rc.cycle.values.length) {
      var pdName   = rc.cycle.values[0];
      var pdFound  = (_jobState.predefined_processes || []).filter(function (p) { return p.name === pdName; })[0];
      if (pdFound) oRcCycleValueInput.setValue(parseFloat(pdFound.cycle_time) || 0);
    }

    var ek = eA && rc.end ? rc.end.condition : '';
    oRcEndValueRow.setVisible(ek === RC_COND.CUSTOM_VALUE);
    if (ek === RC_COND.CUSTOM_VALUE && rc.end && rc.end.values.length)
      oRcEndValueInput.setValue(parseFloat(rc.end.values[0]) || 0);
    oRcEndOffsetInput.setValue(eA && rc.end ? (rc.end.offset || 0) : 0);
  }

  // ── Per-phase condition handlers ──────────────────────────────────────────

  function onStartConditionChanged(cond) {
    cancelRcWait();
    if (!oActivePhases.includes('start'))  return;
    if (!cond)                             { applyRcChange('start', null, [], 0); return; }
    if (!oRcState.activeItemIds.length)    { sap.m.MessageToast.show("Select a row first"); oRcStartSelect.setSelectedKey(''); return; }
    oRcStartValueRow.setVisible(cond === RC_COND.CUSTOM_VALUE);
    // Mirror Python: if item is a Station (step starts with 'S'), From Zero → First Station
    var item = getCurrentItem();
    if (cond === RC_COND.FROM_ZERO && item && item.step && item.step[0] === 'S') {
      cond = RC_COND.FIRST_STATION;
    }
    switch (cond) {
      case RC_COND.FROM_ZERO:      applyRcChange('start', RC_COND.FROM_ZERO, [], 0);                            break;
      case RC_COND.FIRST_STATION:  applyRcChange('start', RC_COND.FIRST_STATION, [], 0);                        break;
      case RC_COND.CUSTOM_VALUE:   /* user types in Value field */                                               break;
      case RC_COND.SEQUENTIAL:     enterRcWait('start', RC_COND.AFTER, 'click a process to start After...');    break;
      case RC_COND.SYNC_START:     enterRcWait('start', RC_COND.WITH,  'click a process to start With...');     break;
      default:                     enterRcWait('start', cond, 'click a process to Start ' + cond);              break;
    }
  }

  function onCycleConditionChanged(cond) {
    cancelRcWait();
    if (!oActivePhases.includes('cycle'))  return;
    if (!cond)                             { applyRcChange('cycle', null, [], 0); return; }
    if (!oRcState.activeItemIds.length)    { sap.m.MessageToast.show("Select a row first"); oRcCycleSelect.setSelectedKey(''); return; }
    oRcCycleValueInput.setEnabled(cond === RC_COND.CUSTOM_VALUE);
    switch (cond) {
      case RC_COND.CUSTOM_VALUE: /* user types in Value field */                                                 break;
      case RC_COND.EQUAL_TO:     enterRcWait('cycle', RC_COND.EQUAL_TO, 'click a process for Equal Cycle Time'); break;
      case RC_COND.CYCLE_CALC:   openCycleCalcDialog();                                                          break;
      case RC_COND.PREDEFINED:
        var procs = _jobState.predefined_processes || [];
        if (!procs.length) {
          sap.m.MessageToast.show('No predefined processes. Add them in Job Spec → Predefined Processes.');
          applyRcChange('cycle', null, [], 0);
          oRcCycleSelect.setSelectedKey('');
          return;
        }
        oPredefSelectModel.setData(procs);
        oPredefSelectDialog.open();
        break;
    }
  }

  function onEndConditionChanged(cond) {
    cancelRcWait();
    if (!oActivePhases.includes('end'))    return;
    if (!cond)                             { applyRcChange('end', null, [], 0); return; }
    if (!oRcState.activeItemIds.length)    { sap.m.MessageToast.show("Select a row first"); oRcEndSelect.setSelectedKey(''); return; }
    oRcEndValueRow.setVisible(cond === RC_COND.CUSTOM_VALUE);
    switch (cond) {
      case RC_COND.LAST:            applyRcChange('end', RC_COND.LAST, [], 0);                                  break;
      case RC_COND.CUSTOM_VALUE:    /* user types in Value field */                                              break;
      case RC_COND.SYNC_COMPLETION: enterRcWait('end', RC_COND.WITH,   'click a process to end With...');       break;
      default:                      enterRcWait('end', cond, 'click a process to End ' + cond);                break;
    }
  }

  // ── Phase enable / disable helpers ───────────────────────────────────────
  function getPhaseCheckbox(phase) {
    return phase === 'start' ? oRcStartCheck : phase === 'cycle' ? oRcCycleCheck : oRcEndCheck;
  }

  function setPhaseControlsEnabled(phase, enabled) {
    if (phase === 'start') {
      oRcStartSelect.setEnabled(enabled);
      oRcStartValueInput.setEnabled(enabled);
      oRcStartOffsetInput.setEnabled(enabled);
    } else if (phase === 'cycle') {
      oRcCycleSelect.setEnabled(enabled);
      // Value input enabled only when cycle is active AND condition is Custom Value
      var item = getCurrentItem();
      var rc0  = item ? parseRC(item.run_cond_config) : null;
      var isCustom = rc0 && rc0.cycle && rc0.cycle.condition === RC_COND.CUSTOM_VALUE;
      oRcCycleValueInput.setEnabled(enabled && !!isCustom);
    } else {
      oRcEndSelect.setEnabled(enabled);
      oRcEndValueInput.setEnabled(enabled);
      oRcEndOffsetInput.setEnabled(enabled);
    }
  }

  // Called by each panel CheckBox.
  // Any combination of 1–3 phases is allowed; applying RC with != 2 active phases
  // shows a warning dialog so the user can confirm or cancel.
  function onPhaseCheckChanged(phase, checked) {
    if (checked) {
      if (oActivePhases.includes(phase)) return;
      oActivePhases.push(phase);
      setPhaseControlsEnabled(phase, true);
      var item = getCurrentItem();
      if (item) {
        recalcTree();
        var upd = getCurrentItem();
        if (upd) refreshRcToolbar(upd);
      }
    } else {
      if (oActivePhases.length <= 1) {
        sap.m.MessageToast.show("At least 1 phase must remain active");
        getPhaseCheckbox(phase).setSelected(true);
        return;
      }
      oActivePhases.splice(oActivePhases.indexOf(phase), 1);
      setPhaseControlsEnabled(phase, false);
      var item = getCurrentItem();
      if (item) {
        var rc = parseRC(item.run_cond_config);
        rc[phase] = null;
        item.run_cond_config = serializeRC(rc);
        recalcTree();
        var upd = getCurrentItem();
        if (upd) refreshRcToolbar(upd);
      }
    }
  }

  // ── Remove Process ────────────────────────────────────────────────────────
  function collectAllItems(item) {
    var result = [item];
    (item.sub_process_items || []).forEach(function (child) {
      result = result.concat(collectAllItems(child));
    });
    return result;
  }

  // ── Copy / Cut / Paste ───────────────────────────────────────────────────

  function copyToClipboard() {
    if (!oRcState.activeItemIds.length) { sap.m.MessageToast.show("Select items first"); return; }
    var roots = getClipboardRoots();
    if (!roots.length) return;
    var idMap = {};
    var clones = roots.map(function (r) { return deepCloneWithNewIds(r, idMap); });
    clones.forEach(function (c) { remapRcRefs(c, idMap); });
    clipboard = { items: clones, mode: 'copy' };
    sap.m.MessageToast.show("Copied " + clones.length + " item(s)");
  }

  function cutToClipboard() {
    if (!oRcState.activeItemIds.length) { sap.m.MessageToast.show("Select items first"); return; }
    var items = oDataModel.getProperty("/items");
    var roots = getClipboardRoots();
    if (!roots.length) return;

    // Snapshot clipboard first
    var idMap = {};
    var clones = roots.map(function (r) { return deepCloneWithNewIds(r, idMap); });
    clones.forEach(function (c) { remapRcRefs(c, idMap); });
    clipboard = { items: clones, mode: 'cut' };

    // Collect every item_id being removed (including descendants)
    var cutIds = {};
    roots.forEach(function (root) {
      collectAllItems(root).forEach(function (it) { cutIds[it.item_id] = true; });
    });

    // For each root: remember its prev sibling before removal
    var flatMap0 = buildFlatMap(items, {});
    var prevSiblings = roots.map(function (root) {
      var ctx = getSiblingsContext(items, root, flatMap0);
      return ctx.idx > 0 ? ctx.siblings[ctx.idx - 1] : null;
    });

    roots.forEach(function (root) { removeItemFromTree(items, root.item_id); });

    // Patch next-sibling RC for each gap left behind
    var flatMap1 = buildFlatMap(items, {});
    prevSiblings.forEach(function (prev) {
      if (prev) organizeRcAfterChange(items, flatMap1, prev, true, false);
    });

    // Fix any remaining items whose RC still references a cut id
    var allRemaining = [];
    (function walk(arr) { arr.forEach(function (it) { allRemaining.push(it); walk(it.sub_process_items || []); }); })(items);
    allRemaining.forEach(function (it) {
      var rc = parseRC(it.run_cond_config);
      var needsFix = ['start', 'cycle', 'end'].some(function (ph) {
        return rc[ph] && rc[ph].condition === RC_COND.AFTER && cutIds[rc[ph].values[0]];
      });
      if (needsFix) organizeRcAfterChange(items, buildFlatMap(items, {}), it, false, true);
    });

    oSelectedItemId = null;
    oRcState.activeItemIds = [];
    recalcTree();
    sap.m.MessageToast.show("Cut " + clones.length + " item(s)");
  }

  // mode: 'above' | 'below' | 'subprocess'
  function pasteFromClipboard(mode) {
    if (!clipboard.items.length) { sap.m.MessageToast.show("Nothing to paste"); return; }
    var items   = oDataModel.getProperty("/items");
    var refItem = oSelectedItemId ? findItemById(items, oSelectedItemId) : null;
    if (!refItem && mode !== 'subprocess') { sap.m.MessageToast.show("Select a row first"); return; }

    // Fresh clone each time so multi-paste gives independent items.
    // deepCloneWithNewIds recurses the full subtree, so the copy prefix is
    // stamped on every node at clone time — no separate walk needed.
    var newIdMap = {};
    var isCopyPaste = clipboard.mode === 'copy';
    var freshClones = clipboard.items.map(function (item) { return deepCloneWithNewIds(item, newIdMap, isCopyPaste); });
    freshClones.forEach(function (c) { remapRcRefs(c, newIdMap); });

    if (mode === 'subprocess' && !refItem) {
      // No row selected — paste as new top-level stations
      var op = oOpSelect.getSelectedKey();
      freshClones.forEach(function (clone) {
        clone.parent_id = "";
        clone.op_number = op;
        items.push(clone);
      });
      freshClones.forEach(function (clone) {
        organizeRcAfterChange(items, buildFlatMap(items, {}), clone, false, false);
      });
    } else if (mode === 'subprocess') {
      if (!Array.isArray(refItem.sub_process_items)) refItem.sub_process_items = [];
      freshClones.forEach(function (clone) {
        clone.parent_id = refItem.item_id;
        clone.op_number = refItem.op_number;
        refItem.sub_process_items.push(clone);
      });
      freshClones.forEach(function (clone) {
        organizeRcAfterChange(items, buildFlatMap(items, {}), clone, false, false);
      });
    } else {
      var flatMap = buildFlatMap(items, {});
      var ctx     = getSiblingsContext(items, refItem, flatMap);
      if (ctx.idx < 0) { sap.m.MessageToast.show("Could not locate item"); return; }
      var insertIdx = mode === 'above' ? ctx.idx : ctx.idx + 1;
      freshClones.forEach(function (clone, i) {
        clone.parent_id = refItem.parent_id || "";
        clone.op_number = refItem.op_number;
        ctx.siblings.splice(insertIdx + i, 0, clone);
      });
      // Fix RC for each inserted clone and the item that follows the last one
      freshClones.forEach(function (clone) {
        organizeRcAfterChange(items, buildFlatMap(items, {}), clone, false, false);
      });
      var afterIdx = insertIdx + freshClones.length;
      if (afterIdx < ctx.siblings.length) {
        organizeRcAfterChange(items, buildFlatMap(items, {}), ctx.siblings[afterIdx], false, true);
      }
    }

    oSelectedItemId        = freshClones[freshClones.length - 1].item_id;
    oRcState.activeItemIds = freshClones.map(function (c) { return c.item_id; });
    nAutoExpandLevel = 5;
    recalcTree();
    sap.m.MessageToast.show("Pasted " + freshClones.length + " item(s)");
  }

  function removeItemFromTree(items, itemId) {
    for (var i = 0; i < items.length; i++) {
      if (items[i].item_id === itemId) {
        items.splice(i, 1);
        return true;
      }
      if (removeItemFromTree(items[i].sub_process_items || [], itemId)) return true;
    }
    return false;
  }

  function removeProcess() {
    if (!oSelectedItemId) {
      sap.m.MessageToast.show("Click a row first to select a process to remove");
      return;
    }
    var items   = oDataModel.getProperty("/items");
    var selItem = findItemById(items, oSelectedItemId);
    if (!selItem) {
      sap.m.MessageToast.show("Selected item not found");
      return;
    }
    var itemId = selItem.item_id;

    // Capture siblings context BEFORE deletion so we know who comes next
    var flatMap0    = buildFlatMap(items, {});
    var ctx0        = getSiblingsContext(items, selItem, flatMap0);
    var prevSibling = ctx0.idx > 0 ? ctx0.siblings[ctx0.idx - 1] : null;

    removeItemFromTree(items, oSelectedItemId);
    oSelectedItemId = null;

    // Patch the RC of whatever item is now after prevSibling.
    if (prevSibling) {
      organizeRcAfterChange(items, buildFlatMap(items, {}), prevSibling, true, false);
    }

    recalcTree();

    fetch(API_BASE + '/removeProcess', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ item_id: itemId })
    })
      .then(function (r) { console.log('[ValiantTMS] /removeProcess:', r.status); })
      .catch(function (err) { console.warn('[ValiantTMS] /removeProcess error:', err.message); });

    sap.m.MessageToast.show("Process removed");
  }

  // ── Add Process ───────────────────────────────────────────────────────────
  function addNewProcess() {
    var items    = oDataModel.getProperty("/items");
    var currItem = oSelectedItemId ? findItemById(items, oSelectedItemId) : null;

    // If the selected item was itself just added by the previous click (not a
    // deliberate user selection), bubble up so repeated "Add As Subprocess"
    // clicks keep adding siblings rather than nesting ever deeper.
    if (currItem && currItem.parent_id && currItem.item_id === oLastAddedItemId) {
      currItem = findItemById(items, currItem.parent_id) || currItem;
    }

    if (!currItem) {
      var op = oOpSelect.getSelectedKey();
      var newStation = {
        id:               "",
        item_id:          crypto.randomUUID(),
        tree_index:       items.length,
        step:             "",
        op_number:        op,
        title:            "------ New_Station ------",
        parent_id:        "",
        subprocess:       "",
        run_cond_config:  JSON.stringify({ Cycle: { "Custom value": [10] } }),
        dependant_items:  '{}',
        cycle_start:      0,
        cycle_time:       0,
        cycle_end:        0,
        color:            "#09528A",
        cycle_type:       "Station",
        highlight:        "",
        sub_process_items: []
      };
      items.push(newStation);
      oSelectedItemId        = newStation.item_id;
      oRcState.activeItemIds = [newStation.item_id];
      organizeRcAfterChange(items, buildFlatMap(items, {}), newStation, false, false);
      recalcTree();
      oLastAddedItemId = newStation.item_id;
      focusAndEditNewItem(newStation.item_id);
      return;
    }

    if (!Array.isArray(currItem.sub_process_items)) {
      currItem.sub_process_items = [];
    }

    var lastItem = currItem.sub_process_items.length > 0
      ? currItem.sub_process_items[currItem.sub_process_items.length - 1]
      : null;

    var newItem = {
      id:               "",
      item_id:          crypto.randomUUID(),
      tree_index:       lastItem ? lastItem.tree_index + 1 : 0,
      step:             "",
      op_number:        currItem.op_number,
      title:            "------ New_Process ------",
      parent_id:        currItem.item_id,
      subprocess:       "",
      run_cond_config:  JSON.stringify({ Cycle: { "Custom value": [10] } }),
      dependant_items:  '{}',
      cycle_start:      0,
      cycle_time:       0,
      cycle_end:        0,
      color:            "#09528A",
      cycle_type:       "Undefined",
      highlight:        "",
      sub_process_items: []
    };

    currItem.sub_process_items.push(newItem);
    oSelectedItemId = newItem.item_id;

    // Set Start RC (After prev sibling / From Zero) and patch next sibling if any
    organizeRcAfterChange(items, buildFlatMap(items, {}), newItem, false, false);
    recalcTree();
    oLastAddedItemId = newItem.item_id;
    focusAndEditNewItem(newItem.item_id);
  }

  // ── Add Above / Add Below ─────────────────────────────────────────────────
  function addProcessAt(offset) { // offset 0 = above, 1 = below
    var items = oDataModel.getProperty("/items");
    if (!oSelectedItemId) { sap.m.MessageToast.show("Click a row first"); return; }

    var refItemId    = oSelectedItemId;
    var selectedItem = findItemById(items, refItemId);
    if (!selectedItem) return;

    var flatMap = buildFlatMap(items, {});
    var ctx     = getSiblingsContext(items, selectedItem, flatMap);
    if (ctx.idx < 0) { sap.m.MessageToast.show("Could not locate item"); return; }

    var isStation = selectedItem.cycle_type === "Station";
    var newItem = {
      id:               "",
      item_id:          crypto.randomUUID(),
      tree_index:       0,
      step:             "",
      op_number:        selectedItem.op_number,
      title:            "------ New_Process ------",
      parent_id:        selectedItem.parent_id || "",
      subprocess:       "",
      run_cond_config:  JSON.stringify({ Cycle: { "Custom value": [10] } }),
      dependant_items:  '{}',
      cycle_start:      0,
      cycle_time:       0,
      cycle_end:        0,
      color:            "#09528A",
      cycle_type:       isStation ? "Station" : "Undefined",
      highlight:        "",
      sub_process_items: []
    };

    ctx.siblings.splice(ctx.idx + offset, 0, newItem);
    oSelectedItemId        = newItem.item_id;
    oRcState.activeItemIds = [newItem.item_id];

    organizeRcAfterChange(items, buildFlatMap(items, {}), newItem, false, false);
    recalcTree();
    oLastAddedItemId = newItem.item_id;
    focusAndEditNewItem(newItem.item_id);
  }

  // ── Auto-focus inline edit after add ────────────────────────────────────
  // After recalcTree() the TreeTable re-renders asynchronously.  We wait one
  // frame, scan rows for the target item_id, and fire the same dblclick logic.
  function focusAndEditNewItem(itemId) {
    // Sync selection state and RC panel to the new item so applyRcChange targets it.
    var items0 = oDataModel.getProperty("/items");
    var newItem0 = findItemById(items0, itemId);
    if (newItem0) {
      oSelectedItemId        = itemId;
      oRcState.activeItemIds = [itemId];
      var rc0 = parseRC(newItem0.run_cond_config);
      oActivePhases = [];
      if (rc0.start && rc0.start.condition) oActivePhases.push('start');
      if (rc0.cycle && rc0.cycle.condition) oActivePhases.push('cycle');
      if (rc0.end   && rc0.end.condition)   oActivePhases.push('end');
      if (!oActivePhases.length) oActivePhases = ['start', 'cycle'];
      refreshRcToolbar(newItem0);
    }

    setTimeout(function () {
      var rows = oTable.getRows();
      for (var i = 0; i < rows.length; i++) {
        var ctx = rows[i].getBindingContext();
        if (!ctx) continue;
        var obj = ctx.getObject();
        if (obj && obj.item_id === itemId) {
          var cell = rows[i].getCells()[0];
          if (cell) {
            window.__vtOnItemDblClick(cell.getId(), function () {
              oRcCycleValueInput.focus(); // focus handler clears error state, autocomplete, and selects all
            });
          }
          break;
        }
      }
    }, 150);
  }

  // ── Inline title rename helpers ──────────────────────────────────────────
  // Walk the nested model tree and update title by item_id.
  // Returns the updated item so we can confirm the change is in the payload.
  function findAndUpdateTitle(items, itemId, newTitle) {
    for (var i = 0; i < (items || []).length; i++) {
      if (items[i].item_id === itemId) {
        items[i].title = newTitle;
        return items[i];
      }
      var found = findAndUpdateTitle(items[i].sub_process_items, itemId, newTitle);
      if (found) return found;
    }
    return null;
  }

  // Strip client-side-only annotations before sending to the API.
  function stripClientFields(items) {
    return (items || []).map(function (item) {
      var clean = Object.assign({}, item);
      delete clean._ancestorEnds;
      clean.sub_process_items = stripClientFields(item.sub_process_items);
      return clean;
    });
  }

  function _buildJobMetadata(op, items) {
    var meta          = _opMetaMap[op] || {};
    var stationList   = (items || []).map(function (item) { return item.item_id; }).join(",");
    var usedCycleTime = getMaxCycleEnd(items);
    var sums          = _computeCycleTypeSums(items);
    return {
      op_number:                  op,
      op_title:                   meta.op_title       || null,
      job_description:            meta.op_description || null,
      job_pictures:               null,
      station_list:               stationList,
      machine_cycle_time_summary: JSON.stringify(sums),
      total_machine_cycle:        Math.round(sums['Machine cycle']  * 100) / 100,
      total_manual_cycle:         Math.round(sums['Manual cycle']   * 100) / 100,
      total_robot_cycle:          Math.round(sums['Robot cycle']    * 100) / 100,
      total_operator_cycle:       Math.round(sums['Operator wait']  * 100) / 100,
      used_cycle_time:            usedCycleTime,
      num_of_parts:               meta.num_of_parts   || 1
    };
  }

  function _buildProjectMetadata() {
    var predefDict = {};
    (_jobState.predefined_processes || []).forEach(function (p) {
      if ((p.name || '').trim()) {
        predefDict[p.name] = {
          'Cycle Time Type': p.type       || 'Custom',
          'Process Details': p.details    || '',
          'Cycle Time (s)':  p.cycle_time || ''
        };
      }
    });
    var joinList = function (a) { return Array.isArray(a) ? a.filter(Boolean).join(',') : (a || ''); };
    return {
      project_no:          _jobState.job_number        || '',
      project_title:       _jobState.job_title         || '',
      project_description: _jobState.job_description   || '',
      target_cycle_time:   _jobState.target_cycle_time || 0,
      machine_list:        joinList(_jobState.machine_list),
      robot_list:          joinList(_jobState.robot_list),
      operator_list:       joinList(_jobState.operator_list),
      predefined_processes: JSON.stringify(predefDict)
    };
  }

  function saveToDb() {
    var items   = oDataModel.getProperty("/items");
    var op      = oOpSelect.getSelectedKey();
    var projMeta = _buildProjectMetadata();
    var payload = {
      cycle_general_structure: stripClientFields(items),
      job_metadata:            _buildJobMetadata(op, items),
      project_metadata:        projMeta,
      op_number:               op,
      ops_to_delete:           _opsToDelete.slice()
    };
    console.log("[ValiantTMS] POST /updateDB payload:", JSON.stringify(payload, null, 2));

    fetch(API_BASE + "/updateDB", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    })
      .then(function (r) {
        if (!r.ok) return r.text().then(function (t) { console.error("[ValiantTMS] /updateDB error " + r.status + ":", t); });
        console.log("[ValiantTMS] /updateDB:", r.status);
      })
      .catch(function (err) { console.warn("[ValiantTMS] /updateDB response error:", err.message); });

    saveItemsDetails(op);

    _opsToDelete = [];
    sap.m.MessageToast.show("Saved");
  }

  // ── Title autocomplete (mirrors PyQt6 SentenceCompletingLineEdit) ───────────
  function _getResourceSuggestions() {
    var all = [];
    (_jobState.machine_list  || []).forEach(function (r) { if (r) all.push(r); });
    (_jobState.robot_list    || []).forEach(function (r) { if (r) all.push(r); });
    (_jobState.operator_list || []).forEach(function (r) { if (r) all.push(r); });
    return all;
  }

  // ── Resource usage cache update (mirrors update_op_resource_usage_time_in_db) ─
  var _CYCLE_TYPE_COLORS = {
    'Machine cycle': '#05DF72',
    'Robot cycle':   '#EBDD6C',
    'Manual cycle':  '#EB1E29',
    'Operator wait': '#1EC2EB'
  };

  function _updateResourceUsageInCache(opNumber) {
    var items = oDataModel.getProperty('/items');
    if (!items || !items.length) return;

    var machineSet  = {};
    var robotSet    = {};
    var operatorSet = {};
    (_jobState.machine_list  || []).forEach(function (r) { if (r) machineSet[r]  = true; });
    (_jobState.robot_list    || []).forEach(function (r) { if (r) robotSet[r]    = true; });
    (_jobState.operator_list || []).forEach(function (r) { if (r) operatorSet[r] = true; });

    var resourceUsage = {};
    var quotedRe = /"([^"]+)"/g;

    function walkLeaves(list) {
      (list || []).forEach(function (item) {
        var children = item.sub_process_items;
        if (children && children.length) {
          walkLeaves(children);
        } else {
          // leaf node — scan title for quoted resource references
          var title = item.title || '';
          var match;
          quotedRe.lastIndex = 0;
          var found = false;
          while ((match = quotedRe.exec(title)) !== null) {
            var inner   = match[1];           // e.g. "Op100-Machine001"
            var resKey  = inner.split('-').pop();  // e.g. "Machine001"
            var cycleType = null;
            if (machineSet[resKey])   { cycleType = 'Machine cycle'; }
            else if (robotSet[resKey])    { cycleType = 'Robot cycle'; }
            else if (operatorSet[resKey]) { cycleType = 'Operator wait'; }
            if (cycleType) {
              var resolvedType = (cycleType === 'Operator wait') ? 'Manual cycle' : cycleType;
              item.color      = _CYCLE_TYPE_COLORS[resolvedType] || item.color;
              item.cycle_type = resolvedType;
              var ct = item.cycle_time || 0;
              resourceUsage[inner] = (resourceUsage[inner] || 0) + ct;
              found = true;
            }
          }
          if (!found && item.cycle_type !== 'Station' && item.cycle_type !== 'Process group') {
            item.cycle_type = 'Undefined';
            item.color      = '#09528A';
          }
        }
      });
    }

    walkLeaves(items);

    // Build filtered summary: only machine/robot/operator entries
    var summary = {};
    Object.keys(resourceUsage).forEach(function (key) {
      summary[key] = Math.round(resourceUsage[key] * 100) / 100;
    });

    if (!_opMetaMap[opNumber]) { _opMetaMap[opNumber] = {}; }
    _opMetaMap[opNumber].machine_cycle_time_summary = JSON.stringify(summary);

    oDataModel.refresh(true);
    _opTreeCache[opNumber] = JSON.parse(JSON.stringify(items));
    _tryRefreshReport();
  }

  function _tryRefreshReport() {
    if (oIconTabBar && oIconTabBar.getSelectedKey() === 'reports') {
      _renderReportTable();
    }
  }

  function _insertTitleCompletion(inputEl, opNumber, word) {
    var text   = inputEl.value;
    var cursor = inputEl.selectionStart;
    var start  = cursor;
    while (start > 0 && /\w/.test(text[start - 1])) { start--; }
    var end = cursor;
    while (end < text.length && /\w/.test(text[end])) { end++; }
    var prefix   = text.slice(0, start).replace(/\s+$/, '');
    var suffix   = text.slice(end).replace(/^\s+/, '');
    var inserted = '"' + opNumber + '-' + word + '"';
    var newText  = (prefix ? prefix + ' ' : '') + inserted + (suffix ? ' ' + suffix : '');
    inputEl.value = newText;
    inputEl.setSelectionRange(newText.length, newText.length);
  }

  function _attachTitleAutocomplete(inputEl, opNumber) {
    var resources = _getResourceSuggestions();
    if (!resources.length) return;

    var activeIndex = -1;

    function _acDropdown() { return document.getElementById('vtAcDropdown'); }

    function _wordUnderCursor() {
      var text = inputEl.value, cursor = inputEl.selectionStart, start = cursor;
      while (start > 0 && /\w/.test(text[start - 1])) { start--; }
      return text.slice(start, cursor);
    }

    function hideDropdown() {
      var d = _acDropdown(); if (d) d.parentNode.removeChild(d);
      activeIndex = -1;
    }

    function setActive(idx) {
      var d = _acDropdown(); if (!d) return;
      var items = d.querySelectorAll('div[data-ac]');
      items.forEach(function (el, i) {
        el.style.background = i === idx ? '#e8f0f8' : '';
        el.style.color      = i === idx ? '#09528A' : '#32363a';
        el.style.fontWeight = i === idx ? '600' : '';
      });
      activeIndex = idx;
    }

    function showDropdown(matches) {
      hideDropdown();
      var d = document.createElement('div');
      d.id = 'vtAcDropdown';
      d.style.cssText =
        'position:fixed;z-index:99999;background:#fff;' +
        'border:1px solid #09528A;border-radius:4px;' +
        'box-shadow:0 4px 14px rgba(0,0,0,.18);' +
        'max-height:180px;overflow-y:auto;' +
        'font-family:72,Arial,sans-serif;font-size:13px;min-width:180px;';
      matches.forEach(function (word, i) {
        var item = document.createElement('div');
        item.setAttribute('data-ac', '1');
        item.textContent = word;
        item.style.cssText = 'padding:5px 12px;cursor:pointer;color:#32363a;white-space:nowrap;';
        item.addEventListener('mouseover', function () { setActive(i); });
        item.addEventListener('mousedown', function (e) {
          e.preventDefault();   // keep focus on input, avoid triggering blur→cancel
          _insertTitleCompletion(inputEl, opNumber, word);
          hideDropdown();
        });
        d.appendChild(item);
      });
      var rect = inputEl.getBoundingClientRect();
      d.style.left = rect.left + 'px';
      d.style.top  = (rect.bottom + 2) + 'px';
      document.body.appendChild(d);
      activeIndex = -1;
    }

    inputEl.addEventListener('input', function () {
      var prefix = _wordUnderCursor();
      if (!prefix) { hideDropdown(); return; }
      var matches = resources.filter(function (r) { return r.indexOf(prefix) !== -1; });
      if (matches.length) { showDropdown(matches); } else { hideDropdown(); }
    });

    // capture phase: intercept Enter/Escape/arrows before the existing commit listener
    inputEl.addEventListener('keydown', function (e) {
      var d = _acDropdown();
      if (!d) return;
      var items = d.querySelectorAll('div[data-ac]');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActive(Math.min(activeIndex + 1, items.length - 1));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActive(Math.max(activeIndex - 1, 0));
      } else if (e.key === 'Enter') {
        if (activeIndex >= 0 && items[activeIndex]) {
          e.preventDefault(); e.stopPropagation();  // block the commit listener
          _insertTitleCompletion(inputEl, opNumber, items[activeIndex].textContent);
          hideDropdown();
        }
      } else if (e.key === 'Escape') {
        e.stopPropagation();  // block cancel() — just close the popup
        hideDropdown();
      }
    }, true);  // capture phase

    inputEl.addEventListener('blur', hideDropdown);
  }

  // ── RC signs (bar start/end indicators) ─────────────────────────────────────
  function _clearRcSigns() {
    document.querySelectorAll('.vtRcSign').forEach(function (el) {
      el.style.display = 'none';
      el.innerHTML = '';
    });
    document.querySelectorAll('.vtCycleBarRoot').forEach(function (el) {
      el.classList.remove('vtBarDim');
    });
  }

  function _rcSignSpan(symbol, color, title) {
    return '<span title="' + title + '" style="font-size:11px;font-weight:bold;color:' + color + ';line-height:1;">' + symbol + '</span>';
  }

  function _showRcSigns(item) {
    _clearRcSigns();
    if (!item || !item.item_id) return;
    if (oRcState.activeItemIds.length !== 1) return;

    var iid        = item.item_id;
    var rc         = parseRC(item.run_cond_config);
    var startCond  = rc.start ? rc.start.condition : '';
    var startVals  = rc.start ? (rc.start.values || []) : [];
    var cycleCond  = rc.cycle ? rc.cycle.condition : '';
    var endCond    = rc.end   ? rc.end.condition   : '';
    var endVals    = rc.end   ? (rc.end.values   || []) : [];
    var flatMap    = buildFlatMap(oDataModel.getProperty('/items'), {});

    // Dim all, then selectively un-dim relevant items
    document.querySelectorAll('.vtCycleBarRoot').forEach(function (el) { el.classList.add('vtBarDim'); });

    function _undim(id) {
      document.querySelectorAll('.vtCycleBarRoot[data-itemid="' + id + '"]').forEach(function (el) {
        el.classList.remove('vtBarDim');
      });
    }
    function _setSign(id, slot, html) {   // slot: 'B' = before, 'A' = after
      var el = document.getElementById('vtS' + slot + '_' + id);
      if (el && html) { el.innerHTML = html; el.style.display = 'inline-block'; }
    }

    // ── 1. Clicked item (green/red signs from run_cond_config + gray arrows from dependant_items)
    _undim(iid);

    var selfDep = {};
    try { selfDep = JSON.parse(item.dependant_items || '{}'); } catch (e) {}
    var selfDepStart = (selfDep.start || []).length > 0;
    var selfDepEnd   = (selfDep.end   || []).length > 0;

    var beforeHtml = '';
    if (startCond === RC_COND.FIRST_STATION) {
      beforeHtml = _rcSignSpan('⊙', '#09528A', 'First Station');
    } else if (startCond === RC_COND.FROM_ZERO) {
      beforeHtml = _rcSignSpan('⊙', '#09528A', 'From Zero (parent start)') +
                   _rcSignSpan('▶', '#05DF72', 'From Zero');
    } else if (startCond === RC_COND.CUSTOM_VALUE) {
      beforeHtml = _rcSignSpan('⧖', '#e07000', 'Fixed value start') +
                   _rcSignSpan('▶', '#EB1E29', 'Fixed value start');
    } else if (startCond) {
      beforeHtml = _rcSignSpan('▶', '#05DF72', 'RC start: ' + startCond);
    }
    // Items whose END depends on this item start here (e.g. "Before" condition) → arrow before bar
    if (selfDepEnd) beforeHtml += _rcSignSpan('⇒', '#888', 'A dependent item ends before this starts');
    _setSign(iid, 'B', beforeHtml);

    var afterHtml = '';
    if (cycleCond && cycleCond !== RC_COND.SUBPROCESS && cycleCond !== RC_COND.CUSTOM_VALUE) {
      afterHtml = _rcSignSpan('✕', '#EB1E29', 'RC end: ' + cycleCond);
      if (endCond === RC_COND.CUSTOM_VALUE) afterHtml += _rcSignSpan('⧖', '#e07000', 'Fixed value end');
    }
    // Items whose START depends on this item end here (e.g. "After" condition) → arrow after bar
    if (selfDepStart) afterHtml += _rcSignSpan('⇒', '#888', 'A dependent item starts after this ends');
    _setSign(iid, 'A', afterHtml);

    // ── 2. RC value items (referenced by run_cond_config, red signs) ─────────
    var noValueStart = (startCond === RC_COND.CUSTOM_VALUE || startCond === RC_COND.FROM_ZERO ||
                        startCond === RC_COND.FIRST_STATION || !startCond);
    if (!noValueStart) {
      startVals.forEach(function (valueId) {
        if (!flatMap[valueId]) return;
        _undim(valueId);
        if (startCond === RC_COND.AFTER || startCond === RC_COND.SEQUENTIAL) {
          _setSign(valueId, 'A', _rcSignSpan('✕', '#EB1E29', 'Clicked item starts after this'));
        } else if (startCond === RC_COND.WITH || startCond === RC_COND.WITH_OFFSET ||
                   startCond === RC_COND.SYNC_START) {
          _setSign(valueId, 'B', _rcSignSpan('▶', '#EB1E29', 'Clicked item starts with this'));
        }
      });
    }

    var noValueEnd = (endCond === RC_COND.CUSTOM_VALUE || !endCond);
    if (!noValueEnd) {
      endVals.forEach(function (valueId) {
        if (!flatMap[valueId]) return;
        _undim(valueId);
        if (endCond === RC_COND.WITH || endCond === RC_COND.SYNC_COMPLETION) {
          _setSign(valueId, 'A', _rcSignSpan('✕', '#EB1E29', 'Clicked item ends with this'));
        } else if (endCond === RC_COND.BEFORE) {
          _setSign(valueId, 'B', _rcSignSpan('▶', '#EB1E29', 'Clicked item ends before this'));
        }
      });
    }

    // ── 3. Dependent items (from dependant_items JSON, gray arrows) ──────────
    try {
      var depJson = JSON.parse(item.dependant_items || '{}');
      Object.keys(depJson).forEach(function (phase) {
        (depJson[phase] || []).forEach(function (depId) {
          if (!flatMap[depId]) return;
          _undim(depId);
          if (phase === 'start') {
            _setSign(depId, 'B', _rcSignSpan('⇒', '#888', 'Depends on clicked item to start'));
          } else if (phase === 'end') {
            _setSign(depId, 'A', _rcSignSpan('⇒', '#888', 'Depends on clicked item to end'));
          }
        });
      });
    } catch (e) {}
  }

  window.__vtOnItemDblClick = function (sId, onAfterCommit) {
    var oCtrl = sap.ui.getCore().byId(sId);
    if (!oCtrl) return;
    var oCtx = oCtrl.getBindingContext();
    if (!oCtx) return;

    var oSpan = document.getElementById(sId);
    if (!oSpan || oSpan.querySelector("input")) return;

    // Capture item_id and raw title at click time.
    // We do NOT rely on getObject() as a live ref — TreeTable's ClientTreeBindingAdapter
    // may return a node wrapper, not the actual model object.
    var oObj     = oCtx.getObject();
    var itemId   = oObj.item_id;
    var rawTitle = oObj.title || "";

    var oInput = document.createElement("input");
    oInput.type = "text";
    oInput.value = rawTitle;
    oInput.style.cssText =
      "width:90%;border:1px solid #09528A;border-radius:3px;" +
