      "padding:2px 6px;font-size:13px;font-family:72,Arial,sans-serif;" +
      "outline:none;background:#fff;color:#32363a;";

    oSpan.textContent = "";
    oSpan.appendChild(oInput);
    oInput.focus();
    oInput.select();

    _attachTitleAutocomplete(oInput, oOpSelect.getSelectedKey());

    var committed = false;

    function commit() {
      if (committed) return;
      committed = true;
      var newTitle = oInput.value.trim();
      if (newTitle && newTitle !== rawTitle) {
        // Update the item inside the real model data by item_id
        var items   = oDataModel.getProperty("/items");
        var updated = findAndUpdateTitle(items, itemId, newTitle);
        if (updated) {
          console.log("[ValiantTMS] Model updated:", itemId, "→", newTitle);
          oDataModel.refresh(true);  // push change to all bound controls (no DB save yet)
          _updateResourceUsageInCache(oOpSelect.getSelectedKey());
        } else {
          console.warn("[ValiantTMS] item_id not found in model:", itemId);
          oCtrl.invalidate();
        }
      } else {
        oCtrl.invalidate();
      }
      if (typeof onAfterCommit === "function") setTimeout(onAfterCommit, 80);
    }

    function cancel() {
      if (committed) return;
      committed = true;
      oCtrl.invalidate();
    }

    oInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter")  { e.preventDefault(); e.stopPropagation(); commit(); }
      if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); cancel(); }
    });
    oInput.addEventListener("blur", cancel);
  };

  // ── Gantt bar tooltip ────────────────────────────────────────────────────
  (function () {
    var el = document.createElement('div');
    el.id  = 'vtTooltip';
    document.body.appendChild(el);
  }());

  document.addEventListener('mousemove', function (e) {
    var tip = document.getElementById('vtTooltip');
    if (tip && tip.style.display !== 'none') _vtPositionTooltip(e);
  });

  function _vtPositionTooltip(e) {
    var tip = document.getElementById('vtTooltip'); if (!tip) return;
    var x = e.clientX + 16, y = e.clientY + 16;
    if (x + tip.offsetWidth  > window.innerWidth  - 10) x = e.clientX - tip.offsetWidth  - 16;
    if (y + tip.offsetHeight > window.innerHeight - 10) y = e.clientY - tip.offsetHeight - 16;
    tip.style.left = x + 'px'; tip.style.top = y + 'px';
  }

  function _buildRcTooltipHtml(rcStr, flatMap) {
    if (!rcStr || rcStr === '{}') return '';
    var json; try { json = JSON.parse(rcStr); } catch (e) { return ''; }
    var rows = [];
    ['Start', 'Cycle', 'End'].forEach(function (phase) {
      var pd = json[phase]; if (!pd) return;
      var condition = null, values = [], offset = null;
      Object.keys(pd).forEach(function (k) {
        if (k === 'Offset') { if (pd[k] && pd[k][0]) offset = pd[k][0]; }
        else                { condition = k; values = pd[k] || []; }
      });
      if (!condition) return;
      var extra = (offset && parseFloat(offset) !== 0) ? ' (' + offset + 's offset)' : '';
      var vParts = values.map(function (v) {
        var ref = flatMap && flatMap[v];
        return ref ? '&nbsp;&nbsp;&nbsp;' + (ref.step || '') + '&gt; ' + (ref.title || v)
                   : '&nbsp;&nbsp;&nbsp;' + v;
      });
      var htmlV = vParts.length ? '<br><em>' + vParts.join('<br>') + '</em>' : '';
      rows.push((phase === 'Start' || phase === 'End')
        ? '<strong>' + phase + 's ' + condition + extra + '</strong>' + htmlV + '<br><br>'
        : '<strong>Cycle time: (' + condition + extra + ')</strong>' + htmlV + '<br><br>');
    });
    return rows.join('');
  }

  window._vtShowTooltip = function (itemId, event) {
    var flatMap = buildFlatMap(oDataModel.getProperty('/items'), {});
    var item    = flatMap[itemId]; if (!item) return;
    var T  = '#0854a0';
    var s  = item.cycle_start != null ? (+item.cycle_start).toFixed(2) : '—';
    var en = item.cycle_end   != null ? (+item.cycle_end).toFixed(2)   : '—';
    var ct = item.cycle_time  != null ? (+item.cycle_time).toFixed(2)  : '—';
    var html = '<div style="color:' + T + ';background:#fff;padding:8px;border:1px solid green;border-radius:8px;min-width:200px;max-width:340px;">';
    html += '<div style="color:white;background:' + T + ';padding:4px 8px;margin:-8px -8px 8px -8px;border-radius:6px 6px 0 0;">' +
            '<strong>' + (item.step || '') + '&gt; ' + (item.title || '') + '</strong></div>';
    html += '<strong>Start:</strong> <em style="color:green">'      + s  + 's</em><br>';
    html += '<strong>End:</strong> <em style="color:green">'        + en + 's</em><br>';
    html += '<strong>Cycle Time:</strong> <em style="color:green">' + ct + 's</em><br>';
    html += '<strong>Cycle Type:</strong> <em style="color:green">' + (item.cycle_type || '—') + '</em><br><br>';
    html += _buildRcTooltipHtml(item.run_cond_config, flatMap);
    html += '</div>';
    var tip = document.getElementById('vtTooltip');
    tip.innerHTML = html; tip.style.display = 'block';
    _vtPositionTooltip(event);
  };

  window._vtHideTooltip = function () {
    var tip = document.getElementById('vtTooltip');
    if (tip) tip.style.display = 'none';
  };

  // ── Custom CycleBar control ───────────────────────────────────────────────
  //   Mirrors the React ProgressBar rules:
  //     parent_item (Station / Process group) → transparent bg + dashed border
  //     leaf (Undefined)                      → solid fill with DB color
  //   Plus a vertical connector stub for all non-Station rows.
  sap.ui.core.Control.extend("CycleBar", {
    metadata: {
      properties: {
        cycleStart:      { type: "float",  defaultValue: 0 },
        cycleTime:       { type: "float",  defaultValue: 0 },
        color:           { type: "string", defaultValue: "#09528A" },
        scaleFactor:     { type: "float",  defaultValue: 2 },
        cycleType:       { type: "string", defaultValue: "Undefined" },
        ancestorEnds:    { type: "string", defaultValue: "" },
        itemId:          { type: "string", defaultValue: "" }
      }
    },
    renderer: function (oRm, oCtrl) {
      var sf      = oCtrl.getScaleFactor() || 2;
      var start   = oCtrl.getCycleStart()  || 0;
      var time    = oCtrl.getCycleTime()   || 0;
      var color   = oCtrl.getColor()       || "#09528A";
      var ct      = oCtrl.getCycleType()   || "Undefined";
      var iid     = oCtrl.getItemId()     || "";
      if (ct === "Station") { color = "brown"; }  // always brown, regardless of DB value
      var spacerW = Math.ceil(start * sf);
      var barW    = Math.max(2, Math.ceil(time * sf));

      // Bar visual rules (matches React ProgressBar parent_item logic)
      var barH, barBg, barBorder, barShadow;
      if (ct === "Station") {
        barH      = 16;
        barBg     = "transparent";
        barBorder = "3px dashed " + color;
        barShadow = "none";
      } else if (ct === "Process group") {
        barH      = 14;
        barBg     = "transparent";
        barBorder = "2px dashed " + color;
        barShadow = "none";
      } else {                          // "Undefined" → solid leaf bar
        barH      = 12;
        barBg     = color;
        barBorder = "none";
        barShadow = "0 1px 2px rgba(0,0,0,.25)";
      }

      // Root container — explicit px height required (% resolves to 0 in table cells)
      oRm.write('<div');
      oRm.writeControlData(oCtrl);
      oRm.writeAttribute("onclick", "window.__vtOnItemClick('" + oCtrl.getId() + "')");
      oRm.writeAttribute("class", "vtCycleBarRoot");
      oRm.writeAttribute("data-itemid", iid);
      oRm.addStyle("position",    "relative");
      oRm.addStyle("width",       "100%");
      oRm.addStyle("height",      "36px");
      oRm.addStyle("display",     "flex");
      oRm.addStyle("align-items", "center");
      oRm.addStyle("overflow",    "visible");
      oRm.addStyle("cursor",      "pointer");
      oRm.writeStyles();
      oRm.write('>');


      // Transparent offset (spacer)
      oRm.write('<div style="display:inline-block;flex-shrink:0;' +
                'width:' + spacerW + 'px;height:' + barH + 'px;' +
                'border-bottom:1px dashed lightgray;"></div>');

      // RC sign — before bar (positioned at left edge of bar, popping leftward)
      oRm.write('<span id="vtSB_' + iid + '" class="vtRcSign"' +
                ' style="position:absolute;display:none;left:' + (spacerW - 2) + 'px;top:50%;' +
                'transform:translate(-100%,-50%);z-index:5;line-height:1;pointer-events:none;white-space:nowrap;"></span>');

      // Bar — solid for leaves, dashed outline for parents
      oRm.write(
        '<div onmouseenter="window._vtShowTooltip(\'' + iid + '\',event)"' +
        ' onmouseleave="window._vtHideTooltip()"' +
        ' style="display:inline-block;flex-shrink:0;' +
        'width:' + barW + 'px;height:' + barH + 'px;' +
        'background:' + barBg + ';' +
        (barBorder !== "none" ? 'border:' + barBorder + ';border-bottom:none;' : '') +
        'border-radius:3px;box-sizing:border-box;' +
        (barShadow !== "none" ? 'box-shadow:' + barShadow + ';' : '') +
        '"></div>'
      );

      // RC sign — after bar
      oRm.write('<span id="vtSA_' + iid + '" class="vtRcSign"' +
                ' style="position:absolute;display:none;left:' + (spacerW + barW + 2) + 'px;top:50%;' +
                'transform:translateY(-50%);z-index:5;line-height:1;pointer-events:none;white-space:nowrap;"></span>');

      // One vertical line per ancestor, nearest first (parent, grandparent, great-grandparent …)
      var ancestorEnds = oCtrl.getAncestorEnds();
      if (ancestorEnds) {
        ancestorEnds.split(",").forEach(function (endStr) {
          var endVal = parseFloat(endStr);
          if (endVal > 0) {
            oRm.write('<div style="position:absolute;left:' + (Math.round(endVal * sf) + 3) + 'px;' +
                      'top:0;height:36px;border-left:0.5px dashed lightgray;"></div>');
          }
        });
      }

      oRm.write('</div>');
    }
  });

  // ── Custom TitleCell control ──────────────────────────────────────────────
  //   Color and font driven by step depth, mirroring themeParameters logic.
  sap.ui.core.Control.extend("TitleCell", {
    metadata: {
      properties: {
        title:     { type: "string", defaultValue: "" },
        rawTitle:  { type: "string", defaultValue: "" },
        step:      { type: "string", defaultValue: "" },
        cycleType: { type: "string", defaultValue: "Undefined" },
        color:     { type: "string", defaultValue: "#32363a" }
      }
    },
    renderer: function (oRm, oCtrl) {
      var title    = oCtrl.getTitle()    || "";
      var rawTitle = oCtrl.getRawTitle() || "";
      var step     = oCtrl.getStep()     || "";
      var isNew    = rawTitle.indexOf("New_Process") >= 0 || rawTitle.indexOf("New_Station") >= 0;
      var isCopy   = rawTitle.indexOf("(**copy)") >= 0;
      var level  = step ? step.split("_").length : 0;

      // ── Color ───────────────────────────────────────────────────────────
      var color;
      if (isCopy) {
        color = "red";
      } else if (isNew) {
        color = "#66bb6a";
      } else {
        switch (level) {
          case 1:  color = "brown";   break;  // Station
          case 2:  color = "#193CB8"; break;
          case 3:  color = "#1447E6"; break;
          case 4:  color = "#098A81"; break;
          case 5:  color = "#8A0912"; break;
          case 6:  color = "#8A8109"; break;
          case 7:  color = "#4A5565"; break;
          default: color = "#9F9FA9"; break;
        }
      }

      // ── Font ────────────────────────────────────────────────────────────
      var fw, fi, tt, pl;
      if (level <= 1) {
        fw = "700"; fi = "normal"; tt = "uppercase"; pl = "0";
      } else if (level === 2) {
        fw = "700"; fi = "normal"; tt = "none";      pl = "4px";
      } else {
        fw = "400"; fi = "italic"; tt = "none";      pl = "4px";
      }

      oRm.write('<span');
      oRm.writeControlData(oCtrl);
      oRm.writeAttribute("onclick", "window.__vtOnItemClick('" + oCtrl.getId() + "')");
      oRm.writeAttribute("ondblclick", "event.stopPropagation();window.__vtOnItemDblClick('" + oCtrl.getId() + "')");
      oRm.write(' style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;' +
                'display:block;line-height:36px;font-size:13px;cursor:pointer;' +
                'color:' + color + ';font-weight:' + fw + ';font-style:' + fi + ';' +
                'text-transform:' + tt + ';padding-left:' + pl + ';"' +
                ' title="' + title + '">');
      oRm.writeEscaped(title);
      oRm.write('</span>');
    }
  });

  // ── Ruler HTML builder ────────────────────────────────────────────────────
  //   Draws major tick every 10 s, minor tick every 1 s (when sf >= 3).
  //   Matches PyQt6 MyRulerHeader: minor_step = 1×sf, major_step = 10×sf.
  function buildRulerHtml(sf, maxEnd) {
    var totalW    = Math.ceil(sf * maxEnd) + 50;
    var showMinor = sf >= 3;
    var lastSec   = Math.ceil(maxEnd) + 1;
    var parts     = [
      '<div style="position:relative;width:' + totalW + 'px;height:100%;' +
      'background:#f0f0f0;border-bottom:2px solid #bbb;box-sizing:border-box;' +
      'overflow:hidden;">'
    ];

    for (var t = 0; t <= lastSec; t++) {
      var x = Math.round(t * sf);
      if (t % 10 === 0) {
        parts.push('<div style="position:absolute;left:' + x + 'px;top:0;bottom:0;' +
                   'width:1px;background:#888;"></div>');
        if (x < totalW - 2) {
          parts.push('<span style="position:absolute;left:' + (x + 2) + 'px;top:3px;' +
                     'font-size:9px;font-family:72,Arial,sans-serif;color:#444;' +
                     'white-space:nowrap;">' + t + '</span>');
        }
      } else if (showMinor) {
        parts.push('<div style="position:absolute;left:' + x + 'px;bottom:2px;' +
                   'width:1px;height:5px;background:#bbb;"></div>');
      }
    }
    parts.push('</div>');
    return parts.join("");
  }

  // ── Ruler control (column header) ─────────────────────────────────────────

              var cond   = rc.cycle.condition;
              var vals   = rc.cycle.values || [];
              var hasVal = vals.length > 0 && String(vals[0]).trim() !== '';
              var valStr = vals.join(', ');

              if (hasVal) {
                if (cond === RC_COND.EQUAL_TO) {
                  var refId   = vals[vals.length - 1];
                  var flatMap = buildFlatMap(oDataModel.getProperty('/items'), {});
                  var ref     = flatMap[refId];
                  if (!ref) return '<span style="color:red"><strong>' + cond + '</strong>: <em>not found</em></span>';

                }

                }
                return '<span style="color:' + T + '"><strong>' + cond + '</strong>: <em>' + valStr + 's</em></span>';
              }

              if (cond) {
                if (cond === RC_COND.SUBPROCESS && !parentId) return '<em>Station</em>';

              }

  // ── Project metadata helpers ──────────────────────────────────────────────
  function _splitList(s) {
    if (!s) return [];
    try { var a = JSON.parse(s); if (Array.isArray(a)) return a; } catch (e) {}
    return s.split(',').map(function (x) { return x.trim(); }).filter(Boolean);
  }

  function _parsePredef(s) {
    try {
      var d = JSON.parse(s || '{}');
      return Object.keys(d).map(function (name) {
        var v = d[name] || {};
        return {
          name:       name,
          type:       (v['Cycle Time Type'] === 'Cycle Time Calculator' || v['Cycle Time Type'] === RC_COND.CYCLE_CALC) ? RC_COND.CYCLE_CALC : 'Custom',
          details:    v['Process Details'] || '',
          cycle_time: v['Cycle Time (s)']  || ''
        };
      });
    } catch (e) { return []; }
  }

  function _applyProjectMeta(projectMeta) {
    if (!projectMeta) return;
    if (projectMeta.project_no)         _jobState.job_number           = projectMeta.project_no;
    if (projectMeta.project_title)      _jobState.job_title            = projectMeta.project_title;
    if (projectMeta.project_description)_jobState.job_description      = projectMeta.project_description;
    if (projectMeta.target_cycle_time)  _jobState.target_cycle_time    = projectMeta.target_cycle_time;
    _jobState.machine_list         = _splitList(projectMeta.machine_list);
    _jobState.robot_list           = _splitList(projectMeta.robot_list);
    _jobState.operator_list        = _splitList(projectMeta.operator_list);
    _jobState.predefined_processes = _parsePredef(projectMeta.predefined_processes);
  }

  // ── API calls ─────────────────────────────────────────────────────────────
  function loadTree(opNumber) {
    nAutoExpandLevel = 2;
    fetch(API_BASE + "/updateTree", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ op_number: opNumber })
    })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (response) {
        var responseData    = response.data || {};
        var items           = (responseData.cycle_general_structure) || responseData || [];
        var opMetaRows      = responseData.op_metadata      || [];
        var projectMetaRows = responseData.project_metadata || [];
        var itemsDetailRows = responseData.items_details    || [];

        opMetaRows.forEach(function (row) {
          if (row.op_number) {
            _opMetaMap[row.op_number] = {
              op_title:       row.op_title        || '',
              op_description: row.job_description || '',
              num_of_parts:   row.num_of_parts    || 1
            };
          }
        });

        // Cache items_details rows keyed by item_id for fast lookup
        if (itemsDetailRows.length) {
          _itemsDetailsCache[opNumber] = {};
          itemsDetailRows.forEach(function (row) {
            if (row.item_id) { _itemsDetailsCache[opNumber][row.item_id] = row; }
          });
        }

        _applyProjectMeta(projectMetaRows[0] || null);
        annotateSteps(items, null);
        annotateAncestors(items, []);
        maxCycleEnd = getMaxCycleEnd(items) || 500;
        _opTreeCache[opNumber] = JSON.parse(JSON.stringify(items));
        oDataModel.setData({ items: items, maxCycleEnd: maxCycleEnd });
        _updateResourceUsageInCache(opNumber);
        updateGanttColumn();
        updateRuler();
        setTimeout(_updateMiniPie, 150);
        if (oIconTabBar && oIconTabBar.getSelectedKey() === 'stats') { _renderStatsTab(); }
      })
      .catch(function (err) {
        sap.m.MessageToast.show("Error loading op data: " + err.message);
      });
  }

  function _loadTreeFromCache(opNumber) {
    var items = JSON.parse(JSON.stringify(_opTreeCache[opNumber] || []));
    nAutoExpandLevel = 2;
    annotateSteps(items, null);
    annotateAncestors(items, []);
    maxCycleEnd = getMaxCycleEnd(items) || 500;
    oDataModel.setData({ items: items, maxCycleEnd: maxCycleEnd });
    _updateResourceUsageInCache(opNumber);
    updateGanttColumn();
    updateRuler();
    if (oIconTabBar && oIconTabBar.getSelectedKey() === 'stats') { _renderStatsTab(); }
  }

  // Deep-copy tree items with fresh item IDs so the duplicate is independent
  function _deepCopyItems(items) {
    var idMap = {};
    function collectIds(nodes) {
      (nodes || []).forEach(function (n) {
        var newId = "cp" + Math.random().toString(36).slice(2, 8);
        idMap[n.item_id] = newId;
        collectIds(n.sub_process_items);
      });
    }
    function remap(nodes) {
      return (nodes || []).map(function (n) {
        var copy = JSON.parse(JSON.stringify(n));
        copy.item_id  = idMap[n.item_id] || n.item_id;
        copy.parent_id = idMap[n.parent_id] || n.parent_id || "";
        if (copy.subprocess) {
          copy.subprocess = copy.subprocess.split(",").map(function (s) {
            return idMap[s.trim()] || s.trim();
          }).join(",");
        }
        copy.sub_process_items = remap(n.sub_process_items);
        return copy;
      });
    }
    collectIds(items);
    return remap(items);
  }

  var _tctDirectMode  = true;
  var oTctDirectInput = new sap.m.StepInput({ min: 1, max: 9999, value: 60, step: 1, width: "140px", description: "s" });
  var oTctDaysInput   = new sap.m.StepInput({ min: 1, max: 365,   value: 250, step: 1,   width: "115px" });
  var oTctHrsInput    = new sap.m.StepInput({ min: 1, max: 24,    value: 8,   step: 0.5, width: "115px" });
  var oTctDpwInput    = new sap.m.StepInput({ min: 1, max: 7,     value: 5,   step: 1,   width: "115px" });
  var oTctJobsInput   = new sap.m.StepInput({ min: 1, max: 99999, value: 100, step: 1,   width: "115px" });
  var oTctWeeksLbl    = new sap.m.Text({ text: "—" });
  var oTctProdHrLbl   = new sap.m.Text({ text: "—" });
  var oTctTotalLbl    = new sap.m.Text({ text: "—" });

  // _planRows: each row has label, default value, and calculated result fields
  var _planRows = [
    { label: "Efficiency (%)",       value: 85, parts: 0, pph: 0, spp: 0 },
    { label: "Extra Conditions (%)", value: 5,  parts: 0, pph: 0, spp: 0 },
    { label: "Utilization (%)",      value: 80, parts: 0, pph: 0, spp: 0 }
  ];
  var _planValInputs = [], _planPartsLbls = [], _planPphLbls = [], _planSppLbls = [];

  function _recalcPlan() {
    var days    = parseFloat(oTctDaysInput.getValue())  || 0;
    var hrs     = parseFloat(oTctHrsInput.getValue())   || 0;
    var dpw     = parseFloat(oTctDpwInput.getValue())   || 1;
    var jobs    = parseFloat(oTctJobsInput.getValue())  || 0;
    var prodHrs = days * hrs;
    var total   = jobs * days;
    oTctWeeksLbl.setText(String(dpw > 0 ? Math.round(days / dpw) : 0));
    oTctProdHrLbl.setText(String(prodHrs));
    oTctTotalLbl.setText(String(total));
    _planRows.forEach(function (row, i) {
      var pct  = parseFloat(_planValInputs[i].getValue()) || 0;
      var frac = pct / 100;
      var parts;
      if (i === 0)      parts = frac > 0 ? Math.round(total              / frac * 100) / 100 : 0;
      else if (i === 1) parts = Math.round(_planRows[0].parts * (1 + frac) * 100) / 100;
      else              parts = frac > 0 ? Math.round(_planRows[1].parts  / frac * 100) / 100 : 0;
      row.parts = parts;
      var pph = prodHrs > 0 ? Math.round(parts / prodHrs * 100) / 100 : 0;
      var spp = pph > 0 ? Math.round(3600 / pph * 100) / 100 : 0;
      row.pph = pph; row.spp = spp;
      _planPartsLbls[i].setText(String(parts));
      _planPphLbls[i].setText(String(pph));
      _planSppLbls[i].setText(String(spp));
    });
    if (!_tctDirectMode && _planRows[2].spp > 0) oTctDirectInput.setValue(_planRows[2].spp);
  }

  var _calcInsert = function (ch) {
    var v = oCalcDisplay.getValue();
    if (v === '0' || v === 'Error') v = '';
    oCalcDisplay.setValue(v + ch);
  };
  var _calcBack = function () {
    var v = oCalcDisplay.getValue();
    oCalcDisplay.setValue(v.length > 1 ? v.slice(0, -1) : '0');
  };
  var _calcCompute = function () {
    var expr = oCalcDisplay.getValue();
    try {
      var result = Math.round(eval(expr.replace(/×/g, '*').replace(/÷/g, '/')) * 100) / 100; // jshint ignore:line
      var pretty  = expr.replace(/\*/g, '×').replace(/\//g, '÷');
      var formula = pretty + ' = ' + result;
      oCalcOpLabel.setText(formula);
      oCalcDisplay.setValue(String(result));
      _calcResults.general = formula;
    } catch (e) { oCalcDisplay.setValue('Error'); }
  };
  var _calcOnBtn = function (t) {
    if (t === 'C')  { oCalcDisplay.setValue('0'); oCalcOpLabel.setText(''); _calcResults.general = ''; return; }
    if (t === '⌫') { _calcBack(); return; }
    if (t === '=')  { _calcCompute(); return; }
    _calcInsert(t);
  };
  var oCalcBtnBox = (function () {
    var ROWS = [['(',')', '⌫','/'],['7','8','9','*'],['4','5','6','-'],['1','2','3','+'],['0','.','C','=']];
    var vb = new sap.m.VBox({ width: '100%' });
    ROWS.forEach(function (row) {
      var hb = new sap.m.HBox({ justifyContent: 'SpaceAround', width: '100%' });
      row.forEach(function (t) {
        hb.addItem(new sap.m.Button({
          text: t, width: '58px',
          type: t === '=' ? 'Emphasized' : '+-*/()'.indexOf(t) >= 0 ? 'Ghost' : 'Transparent',
          press: (function (ch) { return function () { _calcOnBtn(ch); }; })(t)
        }));
      });
      vb.addItem(hb);
    });
    return vb;
  }());

  // ─ Tab 2 · Processing ─────────────────────────────────────────────────────
  var _procWeldLengthInputs = [];
  var oCalcProcLengthsBox   = new sap.m.VBox({});
  var oCalcProcFormula      = new sap.m.FormattedText({ htmlText: '' });

  var _procPType = new sap.m.Select({
    width: '150px',
    selectedKey: 'Welding',
    items: [ new sap.ui.core.Item({ key: 'Welding', text: 'Welding' }), new sap.ui.core.Item({ key: 'Inspection', text: 'Inspection' }) ],
    change: function () { _updateProcResult(); }
  });
  var _mkPI = function (v) {
    return new sap.m.StepInput({ value: v, min: 0, max: 1e6, step: 0.1, width: '115px', change: function () { _updateProcResult(); } });
  };
  var _procTps = _mkPI(0.9); var _procTpe = _mkPI(0.9); var _procV    = _mkPI(10);
  var _procTpre= _mkPI(2);   var _procTint= _mkPI(1);   var _procTpost= _mkPI(2);
  var _procN = new sap.m.StepInput({ value: 1, min: 1, max: 50, step: 1, width: '115px',
    change: function () { _rebuildProcLengths(); _updateProcResult(); }
  });

  var _rebuildProcLengths = function () {
    oCalcProcLengthsBox.removeAllItems();
    _procWeldLengthInputs = [];
    var n = parseInt(_procN.getValue(), 10) || 1;
    for (var i = 1; i <= n; i++) {
      var si = new sap.m.StepInput({ value: 10, min: 0, max: 1e6, step: 0.5, width: '115px', change: function () { _updateProcResult(); } });
      _procWeldLengthInputs.push(si);
      oCalcProcLengthsBox.addItem(new sap.m.HBox({ alignItems: 'Center', renderType: 'Bare',
        items: [ new sap.m.Label({ text: 'Length ' + i + ' (mm):', width: '110px' }), si ]
      }));
    }
  };

  var _updateProcResult = function () {
    var tps = +_procTps.getValue()||0, tpe = +_procTpe.getValue()||0, v = +_procV.getValue()||0.01;
    var tpre= +_procTpre.getValue()||0, tint= +_procTint.getValue()||0, tpost= +_procTpost.getValue()||0;
    var n   = parseInt(_procN.getValue(), 10)||1;
    var L   = Math.round(_procWeldLengthInputs.reduce(function (s, si) { return s + (+si.getValue()||0); }, 0)*100)/100;
    var total = Math.round((tpre + n*(tps+tpe) + L/v + (n-1)*tint + tpost)*100)/100;
    var fs  = tpre+' + '+n+'('+tps+'+'+tpe+') + '+L+'/'+v+' + ('+n+'-1)'+tint+' + '+tpost;
    _calcResults.processing = _procPType.getSelectedKey()+': '+fs+' = '+total;
    oCalcProcFormula.setHtmlText(
      '<p style="text-align:center;font-size:13px;color:#555"><em>T = t<sub>pre</sub> + N(t<sub>ps</sub>+t<sub>pe</sub>) + L/v + (N−1)t<sub>int</sub> + t<sub>post</sub></em></p>'+
      '<hr style="border:0;border-top:1px solid #ddd">'+
      '<p style="text-align:center;font-size:12px;color:#666">'+fs+'</p>'+
      '<p style="text-align:center;font-size:15px;font-weight:bold;color:#0854a0">T = '+total+' s</p>'
    );
  };

  // ─ Tab 3 · Travel ─────────────────────────────────────────────────────────
  var oCalcTravelResult = new sap.m.Text({ text: '— s' }).addStyleClass('vtCalcTravelResult');
  var oCalcDistInput    = new sap.m.StepInput({ value: 150, min: 0,    max: 1e6, step: 1,   width: '115px', change: function () { _updateTravelResult(); } });
  var oCalcSpeedInput   = new sap.m.StepInput({ value: 10,  min: 0.01, max: 1e6, step: 0.5, width: '115px', change: function () { _updateTravelResult(); } });
  var _updateTravelResult = function () {
    var d = +oCalcDistInput.getValue(), s = +oCalcSpeedInput.getValue()||0.01;
    var t = Math.round(d/s*100)/100;
    oCalcTravelResult.setText(t + ' s');

  var _buildMatrixGroup = function (groupTitle, groupData) {
    var groupVBox = new sap.m.VBox({ width: '100%' });
    Object.keys(groupData).forEach(function (catName) {
      var defs = groupData[catName];
      var numCtrl = new sap.m.StepInput({ value: 1, min: 0, max: 99, step: 1, width: '62px', change: function () { _updateMatrixResult(); } });
      var catObj  = { groupTitle: groupTitle, catName: catName, numCtrl: numCtrl, items: [] };
      var itemsVBox = new sap.m.VBox({});
      defs.forEach(function (def) {
        var qtyCtrl = new sap.m.StepInput({ value: 0, min: 0, max: 200, step: 1, width: '62px', change: function () { _updateMatrixResult(); } });
        catObj.items.push({ text: def[0], time: def[1], qtyCtrl: qtyCtrl });
        itemsVBox.addItem(new sap.m.HBox({ alignItems: 'Center', renderType: 'Bare',
          items: [
            new sap.m.Text({ text: def[0], wrapping: true }).addStyleClass('vtMxItemText'),
            new sap.m.Text({ text: def[1]+'s', textAlign: 'End' }).addStyleClass('vtMxTimeText'),
            qtyCtrl
          ]
        }).addStyleClass('vtMxItemRow'));
      });
      groupVBox.addItem(new sap.m.Panel({
        expandable: true, expanded: false,
        headerToolbar: new sap.m.Toolbar({ style: 'Clear', content: [
          new sap.m.Text({ text: catName }), new sap.m.ToolbarSpacer(),
          new sap.m.Label({ text: '×' }), numCtrl
        ]}),
        content: [ itemsVBox ]
      }));
      _matrixCatControls.push(catObj);
    });
    return groupVBox;
  };

  var _updateMatrixResult = function () {
    var sum = 0, parts = [];
    _matrixCatControls.forEach(function (cat) {
      var num = +cat.numCtrl.getValue()||0;
      cat.items.forEach(function (it) {
        var qty = +it.qtyCtrl.getValue()||0;
        if (qty > 0 && num > 0) { sum += num*qty*it.time; parts.push(num+'×'+qty+'×'+it.text+'('+it.time+'s)'); }
      });
    });
    if (!parts.length) {
      oMatrixDisplay.setHtmlText('<p style="color:#aaa;text-align:center;padding:8px">Select quantities above to calculate</p>');
      _calcResults.matrix = ''; return;
    }
    var result  = Math.round(sum*100)/100;
    var summary = parts.slice(0,4).join(' + ')+(parts.length>4?' + …':'');
    _calcResults.matrix = summary+' = '+result;
    oMatrixDisplay.setHtmlText(
      '<p style="font-size:11px;color:#555;padding:2px 4px">'+summary+'</p>'+
      '<p style="text-align:center;font-size:15px;font-weight:bold;color:#0854a0;padding:2px">Cycle Time = '+result+' s</p>'
    );
  };

      if (rc.cycle && rc.cycle.condition === RC_COND.CYCLE_CALC && rc.cycle.values.length) {
        oCalcOpLabel.setText(rc.cycle.values[0]);

  function _saveCycleCalc() {
    var formula = _calcResults[oCalcTabBar.getSelectedKey()] || '';
    if (!formula) { sap.m.MessageToast.show('Perform a calculation first'); return; }

    if (_predefCalcTargetRow !== null) {
      var items = oPredefModel.getProperty('/items').slice();
      if (items[_predefCalcTargetRow]) {
        var numVal2 = parseFloat(formula.split('=').pop().trim());
        items[_predefCalcTargetRow].details    = formula;
        items[_predefCalcTargetRow].cycle_time = isNaN(numVal2) ? '' : String(numVal2);
      }
      oPredefModel.setProperty('/items', items);
      _predefCalcTargetRow = null;
      oCycleCalcDialog.close();
      return;
    }

    oCycleCalcDialog.close();
    applyRcChange('cycle', RC_COND.CYCLE_CALC, [formula], 0);
    var num = parseFloat(formula.split('=').pop().trim());
    if (!isNaN(num)) oRcCycleValueInput.setValue(num).setEnabled(false);
  }

  // ── Plots / Chart.js ──────────────────────────────────────────────────────
  var _chartInstances = {};

  Chart.register({
    id: 'vtBarLabels',
    afterDatasetsDraw: function (chart) {
      var ctx = chart.ctx;
      chart.data.datasets.forEach(function (dataset, i) {
        if (dataset.type === 'line') return;
        var meta = chart.getDatasetMeta(i);
        if (meta.hidden) return;
        meta.data.forEach(function (bar, idx) {
          var value = dataset.data[idx];
          if (!value) return;
          ctx.save();
          ctx.font = 'bold 9px Arial';
          ctx.fillStyle = '#32363a';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(value + 's', bar.x, bar.y - 3);
          ctx.restore();
        });
      });
    }
  });

  function _destroyChart(id) {
    if (_chartInstances[id]) { _chartInstances[id].destroy(); delete _chartInstances[id]; }
  }

  function _computeCycleTypeSums(items) {
    var sums = { 'Machine cycle': 0.0, 'Manual cycle': 0.0, 'Robot cycle': 0.0, 'Operator wait': 0.0 };
    function walk(list) {
      (list || []).forEach(function (item) {
        if (Object.prototype.hasOwnProperty.call(sums, item.cycle_type)) {
          sums[item.cycle_type] += (item.cycle_time || 0);
        }
        walk(item.sub_process_items);
      });
    }
    walk(items);
    return sums;
  }

  function _extractLeafResourceUsage(items) {
    var usage    = {};
    var quotedRe = /"([^"]+)"/g;
    var machineSet = {}, robotSet = {}, operatorSet = {};
    (_jobState.machine_list  || []).forEach(function (r) { if (r) machineSet[r]  = true; });
    (_jobState.robot_list    || []).forEach(function (r) { if (r) robotSet[r]    = true; });
    (_jobState.operator_list || []).forEach(function (r) { if (r) operatorSet[r] = true; });
    function walkLeaves(list) {
      (list || []).forEach(function (item) {
        if (item.sub_process_items && item.sub_process_items.length) {
          walkLeaves(item.sub_process_items);
        } else {
          var title = item.title || '';
          quotedRe.lastIndex = 0;
          var match;
          while ((match = quotedRe.exec(title)) !== null) {
            var inner  = match[1];
            var resKey = inner.split('-').pop();
            if (machineSet[resKey] || robotSet[resKey] || operatorSet[resKey]) {
              usage[inner] = (usage[inner] || 0) + (item.cycle_time || 0);
            }
          }
        }
      });
    }
    walkLeaves(items);
    return usage;
  }

  function _sortedResourceChart(usageObj) {
    var pairs = Object.keys(usageObj).map(function (k) {
      return [k, Math.round(usageObj[k] * 100) / 100];
    });
    pairs.sort(function (a, b) { return a[0] < b[0] ? -1 : a[0] > b[0] ? 1 : 0; });
    return {
      cats: pairs.map(function (p) { return p[0]; }),
      vals: pairs.map(function (p) { return p[1]; })
    };
  }

  function _renderPieChart(canvasId, usedTime, totalTarget, numOfParts) {
    _destroyChart(canvasId);
    var ctx = document.getElementById(canvasId);
    if (!ctx) return;
    var remaining = totalTarget - usedTime;
    var labels, data, colors;
    if (remaining < 0) {
      labels = ['Excess', 'Target Cycle Time'];
      data   = [Math.round(Math.abs(remaining) * 100) / 100, Math.round(totalTarget * 100) / 100];
      colors = ['#cc0000', '#dddddd'];
    } else {
      labels = ['Used [' + numOfParts + ']', 'Remaining'];
      data   = [Math.round(usedTime * 100) / 100, Math.round(remaining * 100) / 100];
      colors = ['#09528A', '#dddddd'];
    }
    _chartInstances[canvasId] = new Chart(ctx, {
      type: 'pie',
      data: {
        labels: labels,
        datasets: [{ data: data, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          vtBarLabels: false,
          legend: { position: 'bottom', labels: { font: { family: '72,Arial,sans-serif', size: 11 }, padding: 10 } },
          tooltip: { callbacks: { label: function (c) { return c.label + ': ' + c.parsed + 's'; } } }
        }
      }
    });
  }

  function _updateMiniPie() {
    var canvas = document.getElementById('vtMiniPieCanvas');
    if (!canvas) return;
    var target    = _jobState.target_cycle_time || 0;
    var used      = Math.round((maxCycleEnd || 0) * 100) / 100;
    var remaining = Math.round((target - used) * 100) / 100;
    var labels, data, colors;
    if (remaining < 0) {
      labels = ['Excess', 'Target']; data = [Math.abs(remaining), target]; colors = ['#cc0000', '#dddddd'];
    } else {
      labels = ['Used', 'Remaining']; data = [used, remaining || 0.01]; colors = ['#09528A', '#e8e8e8'];
    }
    _destroyChart('vtMiniPie');
    _chartInstances['vtMiniPie'] = new Chart(canvas, {
      type: 'pie',
      data: { labels: labels, datasets: [{ data: data, backgroundColor: colors, borderWidth: 1, borderColor: '#fff' }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 300 },
        plugins: {
          vtBarLabels: false,
          legend: { display: false },
          tooltip: { callbacks: { label: function (c) { return c.label + ': ' + c.parsed + 's'; } } }
        }
      }
    });
    var infoEl = document.getElementById('vtMiniPieInfo');
    if (infoEl) {
      var pct   = target > 0 ? Math.round(used / target * 100) : 0;
      var color = remaining < 0 ? '#cc0000' : (pct > 85 ? '#e07000' : '#09528A');
      infoEl.innerHTML =
        '<span style="font-size:1.05rem;font-weight:bold;color:' + color + '">' + pct + '%</span><br>' +
        '<span style="color:#666;font-size:0.7rem;">' + used + 's / ' + target + 's</span>';
    }
  }

  function _renderBarChart(canvasId, categories, values, limitValue) {
    _destroyChart(canvasId);
    var ctx = document.getElementById(canvasId);
    if (!ctx) return;
    var datasets = [{
      type: 'bar', data: values, backgroundColor: '#09528A',
      borderRadius: 3, label: 'Time (s)'
    }];
    if (limitValue && limitValue > 0) {
      datasets.push({
        type: 'line',
        data: categories.map(function () { return limitValue; }),
        borderColor: '#cc0000', borderWidth: 1.5,
        borderDash: [5, 4], pointRadius: 0, fill: false,
        label: 'Target (' + limitValue + 's)', tension: 0
      });
    }
    _chartInstances[canvasId] = new Chart(ctx, {
      data: { labels: categories, datasets: datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 20 } },
        plugins: {
          legend: { display: !!limitValue, labels: { font: { family: '72,Arial,sans-serif', size: 11 } } },
          tooltip: { callbacks: { label: function (c) { return c.dataset.label + ': ' + c.parsed.y + 's'; } } }
        },
        scales: {
          y: { beginAtZero: true, title: { display: true, text: 'Time (s)', font: { family: '72,Arial,sans-serif', size: 10 } } },
          x: { ticks: { font: { family: '72,Arial,sans-serif', size: 10 }, maxRotation: 45 } }
        }
      }
    });
  }

  function _renderOpPlots(items, numOfParts, target, opNumber, idSuffix) {
    idSuffix = idSuffix || '';
    var opMaxEnd    = getMaxCycleEnd(items);
    var totalTarget = target * numOfParts;
    _renderPieChart('vtOpPieCanvas' + idSuffix, opMaxEnd, totalTarget, numOfParts);
    var sums   = _computeCycleTypeSums(items);
    var ctCats = ['Machine cycle', 'Manual cycle', 'Robot cycle', 'Operator wait'];
    var ctVals = ctCats.map(function (k) { return Math.round(sums[k] * 100) / 100; });
    _renderBarChart('vtOpCTCanvas' + idSuffix, ctCats, ctVals, target);
    var summaryJson = (_opMetaMap[opNumber] || {}).machine_cycle_time_summary;
    var usageObj    = summaryJson ? JSON.parse(summaryJson) : _extractLeafResourceUsage(items);
    var rc = _sortedResourceChart(usageObj);
    _renderBarChart('vtOpResCanvas' + idSuffix, rc.cats, rc.vals, target);
  }

  function _renderStationCharts(station, stIdSafe, numOfParts, target) {
    var pieId = 'vtSt_' + stIdSafe + '_pie';
    var ctId  = 'vtSt_' + stIdSafe + '_ct';
    var resId = 'vtSt_' + stIdSafe + '_res';
    var used        = station.cycle_time || 0;
    var totalTarget = target * numOfParts;
    _renderPieChart(pieId, used, totalTarget, numOfParts);
    var children = station.sub_process_items || [];
    var sums   = _computeCycleTypeSums(children);
    var ctCats = ['Machine cycle', 'Manual cycle', 'Robot cycle', 'Operator wait'];
    var ctVals = ctCats.map(function (k) { return Math.round(sums[k] * 100) / 100; });
    _renderBarChart(ctId, ctCats, ctVals, target);
    var rc = _sortedResourceChart(_extractLeafResourceUsage(children));
    _renderBarChart(resId, rc.cats, rc.vals, target);
  }

  function _renderJobPlots() {
    var allOps    = oOpSelect.getItems().map(function (i) { return i.getKey(); });
    var cached    = allOps.filter(function (op) { return !!_opTreeCache[op]; });
    var target    = _jobState.target_cycle_time || 0;
    var noteEl    = document.getElementById('vtJobPlotsNote');
    if (noteEl) {
      noteEl.textContent = cached.length < allOps.length
        ? 'Showing ' + cached.length + ' of ' + allOps.length + ' ops — select remaining ops in Design tab to load them.'
        : 'All ' + allOps.length + ' op(s) loaded.';
    }
    var ctVals = cached.map(function (op) {
      return Math.round(getMaxCycleEnd(_opTreeCache[op]) * 100) / 100;
    });
    _renderBarChart('vtJobCTSCanvas', cached, ctVals, target);
    var totSums = { 'Machine cycle': 0.0, 'Manual cycle': 0.0, 'Robot cycle': 0.0, 'Operator wait': 0.0 };
    cached.forEach(function (op) {
      var s = _computeCycleTypeSums(_opTreeCache[op]);
      Object.keys(totSums).forEach(function (k) { totSums[k] += s[k]; });
    });
    var ctCats = ['Machine cycle', 'Manual cycle', 'Robot cycle', 'Operator wait'];
    var ctTotals = ctCats.map(function (k) { return Math.round(totSums[k] * 100) / 100; });
    _renderBarChart('vtJobCTCanvas', ctCats, ctTotals, target);
    var jobUsage = {};
    cached.forEach(function (op) {
      var summaryJson = (_opMetaMap[op] || {}).machine_cycle_time_summary;
      var opUsage = summaryJson ? JSON.parse(summaryJson) : _extractLeafResourceUsage(_opTreeCache[op]);
      Object.keys(opUsage).forEach(function (k) {
        jobUsage[k] = (jobUsage[k] || 0) + opUsage[k];
      });
    });
    var jrc = _sortedResourceChart(jobUsage);
    _renderBarChart('vtJobResCanvas', jrc.cats, jrc.vals, target);
  }

  function saveItemsDetails(opNumber) {
    var items      = _opTreeCache[opNumber] || oDataModel.getProperty('/items') || [];
    var numOfParts = (_opMetaMap[opNumber] || {}).num_of_parts || 1;
    var records    = items.map(function (station) {
      var sums = _computeCycleTypeSums(station.sub_process_items || []);
      return {
        item_id:                station.item_id,
        op_number:              opNumber,
        total_machine_cycle:    Math.round(sums['Machine cycle']  * 100) / 100,
        total_manual_cycle:     Math.round(sums['Manual cycle']   * 100) / 100,
        total_robot_cycle:      Math.round(sums['Robot cycle']    * 100) / 100,
        total_operator_cycle:   Math.round(sums['Operator wait']  * 100) / 100,
        used_cycle_time:        Math.round((station.cycle_time / numOfParts) * 100) / 100,
        num_of_parts:           numOfParts,
        machine_cycle_time_summary: JSON.stringify(sums)
      };
    });
    if (!records.length) return;
    fetch(API_BASE + '/api/items_details', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ op_number: opNumber, records: records })
    })
      .then(function (r) { console.log('[ValiantTMS] items_details saved:', r.status); })
      .catch(function (err) { console.warn('[ValiantTMS] items_details error:', err.message); });
  }

  window.vtSwitchStationTab = function (stIdSafe, opSuffix) {
    opSuffix = opSuffix || '';
    var fullId    = opSuffix ? opSuffix + '_' + stIdSafe : stIdSafe;
    var contentId = opSuffix ? 'vtStContent_' + opSuffix : 'vtStContent';
    var tabBarId  = opSuffix ? 'vtStSubTabBar_' + opSuffix : 'vtStSubTabBar';
    var content   = document.getElementById(contentId);
    var tabBar    = document.getElementById(tabBarId);
    if (content) {
      content.querySelectorAll('[id^="vtStPanel_"]').forEach(function (p) { p.style.display = 'none'; });
      var panel = document.getElementById('vtStPanel_' + fullId);
      if (panel) { panel.style.display = 'block'; }
    }
    if (tabBar) {
      tabBar.querySelectorAll('.vtStTabBtn').forEach(function (b) { b.classList.remove('vtPActive'); });
      tabBar.querySelectorAll('[data-stid="' + stIdSafe + '"]').forEach(function (b) { b.classList.add('vtPActive'); });
    }
  };

  // Fetch one op's tree into the caches without touching any Design-tab UI.
  function _fetchTreeToCache(opNumber) {
    return fetch(API_BASE + "/updateTree", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ op_number: opNumber })
    })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    })
    .then(function (response) {
      var d = response.data || {};
      var items = d.cycle_general_structure || d || [];
      (d.op_metadata || []).forEach(function (row) {
        if (row.op_number) {
          _opMetaMap[row.op_number] = {
            op_title:       row.op_title        || '',
            op_description: row.job_description || '',
            num_of_parts:   row.num_of_parts    || 1
          };
        }
      });
      if ((d.items_details || []).length) {
        _itemsDetailsCache[opNumber] = {};
        d.items_details.forEach(function (row) {
          if (row.item_id) { _itemsDetailsCache[opNumber][row.item_id] = row; }
        });
      }
      _applyProjectMeta((d.project_metadata || [])[0] || null);
      annotateSteps(items, null);
      _opTreeCache[opNumber] = JSON.parse(JSON.stringify(items));
      _updateResourceUsageInCache(opNumber);
    });
  }

    });

    // Summary footer
    var allLoaded = notLoadedOps === 0;
    html += '<tr style="background:#f5f8fb;border-top:2px solid #d0d8e0;">'
          + '<td colspan="2" style="padding:8px 12px;font-weight:600;color:#32363a;font-family:72,Arial,sans-serif;font-size:0.82rem;">'
          + ops.length + ' op' + (ops.length !== 1 ? 's' : '') + '</td>'
          + '<td style="padding:8px 12px;text-align:center;font-weight:600;color:#32363a;">'
          + (allLoaded ? totalStations : totalStations + '+') + '</td>'
          + '<td colspan="2" style="padding:8px 12px;text-align:center;color:#888;font-size:0.76rem;">'
          + (notLoadedOps > 0 ? notLoadedOps + ' op(s) not yet opened in Design tab' : '') + '</td>'
          + '<td style="padding:8px 12px;text-align:center;">'
          + (overTargetOps > 0
              ? '<span style="color:#cc0000;font-weight:700;font-size:0.8rem;">' + overTargetOps + ' over target</span>'
              : (allLoaded && tct > 0
                  ? '<span style="color:#1a7a1a;font-weight:600;font-size:0.8rem;">All within target</span>'
                  : ''))
          + '</td>'
          + '</tr>';

    html += '</tbody></table></div>';
    content.innerHTML = html;
  }

  window.vtToggleSection = function (id) {
    var body    = document.getElementById('vtStatsSectionBody_' + id);
    var chevron = document.getElementById('vtStatChevron_' + id);
    if (!body) return;
    var collapsed = body.classList.toggle('vtCollapsed');
    if (chevron) { chevron.textContent = collapsed ? '▶' : '▼'; }
  };

  window.vtExpandAll = function () {
    document.querySelectorAll('#vtStatsContent .vtStatSectionBody').forEach(function (b) {
      b.classList.remove('vtCollapsed');
    });
    document.querySelectorAll('#vtStatsContent [id^="vtStatChevron_"]').forEach(function (c) {
      c.textContent = '▼';
    });
  };

  window.vtCollapseAll = function () {
    document.querySelectorAll('#vtStatsContent .vtStatSectionBody').forEach(function (b) {
      b.classList.add('vtCollapsed');
    });
    document.querySelectorAll('#vtStatsContent [id^="vtStatChevron_"]').forEach(function (c) {
      c.textContent = '▶';
    });
  };

  window.vtScrollToOp = function (opSafe) {
    var el = document.getElementById('vtOpSection_' + opSafe);
    if (!el) return;
    var body    = document.getElementById('vtStatsSectionBody_' + opSafe);
    var chevron = document.getElementById('vtStatChevron_' + opSafe);
    if (body && body.classList.contains('vtCollapsed')) {
      body.classList.remove('vtCollapsed');
      if (chevron) { chevron.textContent = '▼'; }
    }
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  function _renderStatsTab() {
    _renderReportTable();
    var ops        = oOpSelect.getItems().map(function (it) { return it.getKey(); });
    var target     = _jobState.target_cycle_time || 0;
    var opSections = document.getElementById('vtStatsOpSections');
    if (!opSections) return;

    // Inject job-level canvas elements dynamically so the browser lays them
    // out before Chart.js measures them (same pattern as per-op charts).
    var jobBody = document.getElementById('vtStatsSectionBody_job');
    if (jobBody) {
      ['vtJobCTSCanvas', 'vtJobCTCanvas', 'vtJobResCanvas'].forEach(_destroyChart);
      jobBody.innerHTML =
        '<div id="vtJobPlotsNote" style="font-size:0.78rem;color:#888;padding:0 2px 6px;font-family:72,Arial,sans-serif;"></div>' +
        '<div class="vtPlotsGrid">' +
          '<div class="vtPlotCard vtCardFull"><div class="vtPlotTitle">Cycle Time Per Op</div>' +
            '<div style="position:relative;height:200px;"><canvas id="vtJobCTSCanvas"></canvas></div></div>' +
          '<div class="vtPlotCard vtCardMd"><div class="vtPlotTitle">Job Cycle Type Summary</div>' +
            '<div style="position:relative;height:200px;"><canvas id="vtJobCTCanvas"></canvas></div></div>' +
          '<div class="vtPlotCard vtCardLg"><div class="vtPlotTitle">Job Resource Usage Summary</div>' +
            '<div style="position:relative;height:200px;"><canvas id="vtJobResCanvas"></canvas></div></div>' +
        '</div>';
      setTimeout(_renderJobPlots, 0);
    }

    // Destroy all op-specific charts before rebuilding
    Object.keys(_chartInstances).forEach(function (id) {
      if (id.indexOf('vtOpPieCanvas_') === 0 ||
          id.indexOf('vtOpCTCanvas_')  === 0 ||
          id.indexOf('vtOpResCanvas_') === 0) {
        _destroyChart(id);
      }
    });
    opSections.innerHTML = '';
    ops.forEach(function (op) {
      var opSafe     = op.replace(/[^a-zA-Z0-9]/g, '_');
      var m          = _opMetaMap[op] || {};
      var items      = _opTreeCache[op] || [];
      var numOfParts = m.num_of_parts || 1;
      var titleText  = m.op_title ? ' — ' + m.op_title : '';
      var loaded     = items.length > 0;
      var bodyHtml;
      if (!loaded) {
        bodyHtml = '<div style="padding:12px;color:#aaa;font-family:72,Arial,sans-serif;font-size:0.82rem;">'
                 + 'Not loaded — open this op in the Design tab first.</div>';
      } else {
        bodyHtml =
          '<div class="vtPlotsGrid">' +
            '<div class="vtPlotCard vtCardSm"><div class="vtPlotTitle">Cycle Time</div>' +
              '<div style="position:relative;height:180px;"><canvas id="vtOpPieCanvas_' + opSafe + '"></canvas></div></div>' +
            '<div class="vtPlotCard vtCardMd"><div class="vtPlotTitle">Cycle Type Summary</div>' +
              '<div style="position:relative;height:180px;"><canvas id="vtOpCTCanvas_' + opSafe + '"></canvas></div></div>' +
            '<div class="vtPlotCard vtCardLg"><div class="vtPlotTitle">Resource Usage</div>' +
              '<div style="position:relative;height:180px;"><canvas id="vtOpResCanvas_' + opSafe + '"></canvas></div></div>' +
          '</div>' +
          '<div id="vtStSubTabBar_' + opSafe + '" class="vtStSubTabBar"></div>' +
          '<div id="vtStContent_' + opSafe + '"></div>';
      }
      var section = document.createElement('div');
      section.className = 'vtStatSection';
      section.id = 'vtOpSection_' + opSafe;
      section.innerHTML =
        '<div class="vtStatSectionHeader" onclick="vtToggleSection(\'' + opSafe + '\')">' +
          '<span id="vtStatChevron_' + opSafe + '">▼</span> Op ' + op + titleText +
        '</div>' +
        '<div id="vtStatsSectionBody_' + opSafe + '" class="vtStatSectionBody">' + bodyHtml + '</div>';
      opSections.appendChild(section);
      if (loaded) {
        (function (o, os, itms, n, t) {
          setTimeout(function () {
            _renderOpPlots(itms, n, t, o, '_' + os);
            _renderStationPlots(itms, n, t, os);
          }, 0);
        })(op, opSafe, items, numOfParts, target);
      }
    });
  }

  function syncStatsTab() {
    var content = document.getElementById('vtRptContent');
    if (!content) return;
    var st = document.getElementById('vtRptStatus');
    if (st) st.style.display = 'none';
    var ops      = oOpSelect.getItems().map(function (it) { return it.getKey(); });
    var uncached = ops.filter(function (op) { return !_opTreeCache[op]; });
    if (!uncached.length) {
      _renderStatsTab();
      return;
    }
    content.innerHTML = '<div style="font-family:72,Arial,sans-serif;font-size:0.82rem;color:#09528A;padding:4px 0;">'
                      + 'Loading data… <span id="vtRptLoadProgress">0 / ' + uncached.length + '</span></div>';
    var done  = 0;
    var chain = Promise.resolve();
    uncached.forEach(function (op) {
      chain = chain.then(function () {
        return _fetchTreeToCache(op).then(function () {
          done++;
          var prog = document.getElementById('vtRptLoadProgress');
          if (prog) prog.textContent = done + ' / ' + uncached.length;
        });
      });
    });
    chain
      .then(function () { _renderStatsTab(); })
      .catch(function (err) {
        if (content) {
          content.innerHTML = '<em style="color:#cc0000;font-family:72,Arial,sans-serif;font-size:0.82rem;">'
                            + 'Error loading op data: ' + err.message + '</em>';
        }
      });
  }

  window.vtExportExcel = function () {
    var btn    = document.getElementById('vtExportExcelBtn');
    var status = document.getElementById('vtRptStatus');
    if (btn)    { btn.disabled = true; btn.textContent = 'Generating…'; }
    if (status) { status.style.display='block'; status.style.background='#eaf3fb'; status.style.color='#09528A'; status.textContent='Generating report — this may take a moment…'; }
    fetch(API_BASE + '/report/excel', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        proj_number: _jobState.job_number || '',
        proj_title:  _jobState.job_title  || ''
      })
    })
    .then(function (r) {
      if (!r.ok) return r.json().then(function (e) { throw new Error(e.detail || e.message || 'HTTP ' + r.status); });
      return r.json();
    })
    .then(function (res) {
      var msg = (res && res.message) ? res.message : 'Report generated and opened.';
      if (status) { status.style.background='#f0faf0'; status.style.color='#1a7a1a'; status.textContent=msg; }
    })
    .catch(function (err) {
      if (status) { status.style.background='#fff0f0'; status.style.color='#cc0000'; status.textContent='Error: ' + err.message; }
      sap.m.MessageToast.show('Export failed: ' + err.message);
    })
    .finally(function () { if (btn) { btn.disabled=false; btn.textContent='Export Excel'; } });
  };

  // ── Tab Bar ───────────────────────────────────────────────────────────────
  var oIconTabBar = new sap.m.IconTabBar({
    expandable:           false,
    stretchContentHeight: true,
    selectedKey:          "design",
    items: [
      new sap.m.IconTabFilter({
        key: "home", text: "Home",
        content: [new sap.ui.core.HTML({
          content:         '<div style="padding:48px;color:#aaa;font-family:72,Arial,sans-serif;font-size:15px;">Home — coming soon</div>',
          sanitizeContent: false
        })]
      }),
      new sap.m.IconTabFilter({
        key: "design", text: "Design",
        content: [oDesignLayout]
      }),
      new sap.m.IconTabFilter({
        key: "stats", text: "Statistics & Report",
        content: [new sap.ui.core.HTML({
          sanitizeContent: false,
          content: [
            '<div id="vtStatsRoot" style="height:calc(100vh - 110px);display:flex;flex-direction:column;background:#f5f5f5;">',

              // Action bar
              '<div style="padding:8px 16px;border-bottom:1px solid #e0e0e0;background:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">',
                '<span style="font-size:0.9rem;font-weight:600;font-family:72,Arial,sans-serif;color:#32363a;">Statistics &amp; Report</span>',
                '<div style="display:flex;gap:6px;align-items:center;">',
                  '<button onclick="vtExpandAll()" style="padding:4px 12px;background:#f5f7fa;color:#32363a;border:1px solid #d0d0d0;border-radius:4px;font-size:0.78rem;font-family:72,Arial,sans-serif;cursor:pointer;" title="Expand all sections">Expand All</button>',
                  '<button onclick="vtCollapseAll()" style="padding:4px 12px;background:#f5f7fa;color:#32363a;border:1px solid #d0d0d0;border-radius:4px;font-size:0.78rem;font-family:72,Arial,sans-serif;cursor:pointer;" title="Collapse all sections">Collapse All</button>',
                  '<button id="vtExportExcelBtn" onclick="vtExportExcel()" style="padding:5px 16px;background:#09528A;color:#fff;border:none;border-radius:4px;font-size:0.82rem;font-family:72,Arial,sans-serif;cursor:pointer;font-weight:600;">Export Excel</button>',
                '</div>',
              '</div>',

              // Scrollable content
              '<div id="vtStatsContent" style="flex:1;min-height:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;">',

                // Summary table
                '<div id="vtRptContent" style="font-family:72,Arial,sans-serif;font-size:0.82rem;color:#555;">',
                  '<em style="color:#aaa;">Open this tab after loading ops in the Design tab.</em>',
                '</div>',
                '<div id="vtRptStatus" style="padding:8px 14px;font-size:0.81rem;font-family:72,Arial,sans-serif;border-radius:6px;display:none;"></div>',

                // Job Overview section
                '<div class="vtStatSection">',
                  '<div class="vtStatSectionHeader" onclick="vtToggleSection(\'job\')">',
                    '<span id="vtStatChevron_job">&#9660;</span>&nbsp;Job Overview',
                  '</div>',
                  '<div id="vtStatsSectionBody_job" class="vtStatSectionBody"></div>',
                '</div>',

                // Per-op sections (dynamically generated)
                '<div id="vtStatsOpSections" style="display:flex;flex-direction:column;gap:12px;"></div>',

              '</div>',

            '</div>'
          ].join('')
        })]
      })
    ],
    select: function (oEvent) {
      var key = oEvent.getParameter("key");
      if (key === "design") {
        setTimeout(function () { oTable.invalidate(); }, 0);
      } else if (key === "stats") {
        setTimeout(syncStatsTab, 60);
      }
    }
  });

  // ── Page / App ────────────────────────────────────────────────────────────
  var oPage = new sap.m.Page({
    title:         "ValiantTMS — Cycle Chart Management",
    showNavButton: false,
    headerContent: [
      new sap.ui.core.HTML({
        content:         '<img src="https://www.valianttms.com/wp-content/uploads/2021/09/valianttms-logo-298x92-1.png" height="36" style="vertical-align:middle;display:block;" />',
        sanitizeContent: false
      })
    ],
    content: [oIconTabBar]
  });

  new sap.m.App({ pages: [oPage] }).placeAt("content");

  // ── Global keyboard + background-click handlers ───────────────────────────
  // Capture phase fires before SAPUI5 processes the click, so __vtOnItemClick
  // can read _ctrlKeyHeld reliably.
  document.addEventListener('click', function (e) { _ctrlKeyHeld = e.ctrlKey; _shiftKeyHeld = e.shiftKey; }, true);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && oRcState.waitPhase) { e.preventDefault(); commitRcWait(); return; }
    if (e.key === 'Escape') {
      if (oRcState.waitPhase) { cancelRcWait(); }
      else { clearRowHighlight(); }
    }
    if (e.shiftKey && e.key === 'P') { e.preventDefault(); addNewProcess(); return; }
    var mod = e.ctrlKey || e.metaKey;
    if (mod && e.key === 'c') { e.preventDefault(); copyToClipboard(); }
    if (mod && e.key === 'x') { e.preventDefault(); cutToClipboard(); }
    if (mod && e.key === 'v') { e.preventDefault(); pasteFromClipboard('subprocess'); }
  });

  document.addEventListener('click', function (e) {
    // Row click already handled by __vtOnItemClick — skip this tick
    if (_rowClickHandled) { _rowClickHandled = false; return; }
    if (!oRcState.activeItemIds.length && !oRcState.waitPhase) return;
    // Only clear when clicking INSIDE the table body (not toolbars, RC panels, or any overlay
    // popup — SAPUI5 Select/Popover overlays are appended to <body>, outside the table DOM)
    var tableDom = oTable.getDomRef ? oTable.getDomRef() : null;
    if (!tableDom || !tableDom.contains(e.target)) return;
    // Don't clear when clicking on an actual data row
    if (e.target.closest('tr.sapUiTableRow')) return;
    clearRowHighlight();
  });

  // Initial ruler render, then load data
  // _jobState is populated from project_metadata arriving in the /updateTree response
  updateRuler();
  loadOpNumbers();
});
</script>
</body>
</html>
